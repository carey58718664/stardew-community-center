<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社区中心献祭助手</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f0e8;
      --wood: #8a5a35;
      --wood-dark: #5f3a22;
      --paper: #fffaf0;
      --paper-deep: #f4e7c9;
      --ink: #2b2118;
      --muted: #746657;
      --line: #d8c59e;
      --green: #2d8a5f;
      --green-soft: #e8f6e8;
      --gold: #d89b2b;
      --blue: #2f6fb0;
      --red: #b84532;
      --shadow: 0 16px 38px rgba(76, 49, 29, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 250, 240, 0.82), rgba(243, 240, 232, 0.96)),
        repeating-linear-gradient(90deg, rgba(138, 90, 53, 0.035) 0 1px, transparent 1px 18px),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    [hidden] {
      display: none !important;
    }

    .page {
      width: min(1180px, calc(100% - 18px));
      margin: 0 auto;
      padding: 14px 0 34px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 10px;
      padding: 16px 18px;
      border: 2px solid var(--wood-dark);
      border-radius: 8px;
      background: linear-gradient(180deg, #a66f42, var(--wood));
      color: #fff7e8;
      box-shadow: var(--shadow);
    }

    .hero p,
    .hero h1 {
      margin: 0;
    }

    .hero-kicker {
      margin-bottom: 4px !important;
      font-size: 13px;
      font-weight: 800;
      color: #ffe0a2;
    }

    h1 {
      font-size: clamp(24px, 5vw, 40px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .button {
      min-height: 40px;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.16);
      color: #fff7e8;
      padding: 0 14px;
      font-weight: 800;
    }

    .button:hover {
      background: rgba(255, 250, 240, 0.24);
    }

    .assistant-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .search-panel,
    .progress-panel,
    .center-map-panel,
    .room-map {
      border: 1px solid #e8d8b8;
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.92);
      box-shadow: 0 10px 24px rgba(76, 49, 29, 0.08);
    }

    .search-panel {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 17px;
      font-weight: 900;
    }

    .search-panel .panel-title {
      margin: 0;
      white-space: nowrap;
    }

    .search-box {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      margin-bottom: 0;
    }

    .search-input {
      width: 100%;
      min-height: 42px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47, 111, 176, 0.16);
    }

    .clear-button,
    .search-button {
      min-width: 44px;
      border-radius: 8px;
      font-weight: 950;
    }

    .clear-button {
      border: 2px solid var(--line);
      background: var(--paper-deep);
      color: var(--ink);
    }

    .search-button {
      border: 2px solid #d39c5f;
      background: #f4c77f;
      color: #5f3a22;
      font-size: 20px;
    }

    .result-list {
      display: grid;
      gap: 8px;
      grid-column: 2 / 3;
      max-height: 178px;
      overflow: auto;
      padding-right: 3px;
    }

    .empty-state {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .result-card {
      border: 2px solid #e4d3ae;
      border-radius: 8px;
      background: #fffdf8;
      padding: 10px;
      cursor: pointer;
    }

    .result-card.done {
      border-color: #b8d6ad;
      background: var(--green-soft);
    }

    .result-head {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 6px;
    }

    .result-title {
      margin: 0;
      font-weight: 900;
    }

    .result-path {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status.need {
      background: #fff0d2;
      color: #9c620e;
    }

    .status.done {
      background: #dff3e4;
      color: #1c6f45;
    }

    .progress-panel {
      margin-bottom: 10px;
      padding: 12px;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .category {
      border: 1px solid #e2d0aa;
      border-radius: 8px;
      background: #fffdf8;
      padding: 9px;
    }

    .category-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 900;
    }

    .category-count {
      color: var(--muted);
      white-space: nowrap;
    }

    .bar {
      overflow: hidden;
      height: 10px;
      border-radius: 999px;
      background: #eadfc9;
    }

    .fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), var(--green));
      transition: width 0.2s ease;
    }

    .center-map-panel {
      margin-bottom: 10px;
      padding: 12px;
    }

    .center-map-frame {
      position: relative;
      overflow: hidden;
      border: 1px solid #e0c89b;
      border-radius: 8px;
      background: #fff6df;
      min-height: 280px;
    }

    .center-map-image {
      display: block;
      width: 100%;
      min-height: 280px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: saturate(1.02) contrast(1.02);
    }

    .center-room-pin {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 2;
      width: 0;
      height: 0;
      color: #5c3b20;
    }

    .center-pin-label {
      position: absolute;
      left: var(--dx);
      top: var(--dy);
      transform: translate(-50%, -50%);
      display: grid;
      justify-items: center;
      min-width: 76px;
      border: 1px solid rgba(128, 92, 48, 0.28);
      border-radius: 11px;
      background: rgba(255, 252, 242, 0.9);
      padding: 4px 9px 5px;
      text-align: center;
      box-shadow: 0 6px 14px rgba(76, 49, 29, 0.16);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(1px);
    }

    .center-pin-name {
      color: #5f3518;
      font-size: 13px;
      font-weight: 950;
      line-height: 1.12;
    }

    .center-pin-note {
      color: #7b5a36;
      font-size: 10px;
      font-weight: 850;
      line-height: 1.15;
      white-space: nowrap;
    }

    .center-pin-line {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--line-l);
      height: 0;
      border-top: 1px solid rgba(112, 78, 42, 0.42);
      transform: translate(-50%, -50%) rotate(var(--line-a));
      transform-origin: left center;
      pointer-events: none;
    }

    .center-pin-dot {
      position: absolute;
      left: 0;
      top: 0;
      width: 9px;
      height: 9px;
      border: 2px solid rgba(255, 252, 242, 0.95);
      border-radius: 50%;
      background: #ba6b16;
      box-shadow: 0 2px 6px rgba(76, 49, 29, 0.3);
      transform: translate(-50%, -50%);
    }

    .room-map {
      padding: 12px;
    }

    .rooms {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .room {
      position: relative;
      border: 1px solid #e8d8b8;
      border-radius: 8px;
      background: linear-gradient(180deg, #fffaf0, #f7ebd1);
      box-shadow: 0 12px 26px rgba(76, 49, 29, 0.1);
    }

    .room-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(138, 90, 53, 0.1);
    }

    .room-title {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 0 0 5px;
      font-size: 19px;
      font-weight: 950;
    }

    .room-meta {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .room-badge {
      color: var(--green);
      font-size: 13px;
      font-weight: 950;
      white-space: nowrap;
    }

    .room-body {
      display: grid;
      grid-template-columns: 1fr;
      padding: 10px;
    }

    .room-scene-card {
      min-width: 0;
      margin: 0;
      border: 2px solid #e1cea8;
      border-radius: 8px;
      background: #fffdf8;
      padding: 10px;
      overflow: hidden;
    }

    .room-scene {
      position: relative;
      overflow: hidden;
      min-height: 640px;
      aspect-ratio: 16 / 9.4;
      border: 2px solid #d9bf8b;
      border-radius: 8px;
      background:
        radial-gradient(ellipse at center, rgba(255, 229, 174, 0.22), transparent 58%),
        linear-gradient(180deg, rgba(255, 246, 220, 0.68), rgba(242, 217, 171, 0.54));
      isolation: isolate;
    }

    .room-scene::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(255, 242, 202, 0.18), rgba(138, 90, 53, 0.1));
      pointer-events: none;
    }

    .room-scene::after {
      content: "";
      position: absolute;
      inset: 12px;
      z-index: 1;
      border: 2px solid rgba(154, 104, 45, 0.34);
      border-radius: 8px;
      pointer-events: none;
    }

    .room-scene-bg {
      position: absolute;
      inset: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      opacity: 0.72;
      filter: saturate(0.98) contrast(1) brightness(1.02);
    }

    .map-bundle-grid {
      position: absolute;
      inset: 22px;
      z-index: 3;
    }

    .map-bundle-node {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: clamp(220px, 30%, 370px);
      transform: translate(-50%, -50%);
      display: grid;
      align-content: center;
      gap: 6px;
      min-height: 128px;
      border: 2px solid rgba(197, 159, 97, 0.72);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.94);
      padding: 10px;
      color: #2b2118;
      box-shadow: 0 10px 18px rgba(76, 49, 29, 0.16);
    }

    .map-bundle-node.done {
      border-color: rgba(45, 138, 95, 0.74);
      background: rgba(232, 246, 232, 0.9);
    }

    .map-bundle-node[data-slot="a"] { box-shadow: inset 5px 0 0 #8f67cf, 0 10px 18px rgba(76, 49, 29, 0.16); }
    .map-bundle-node[data-slot="b"] { box-shadow: inset 5px 0 0 #389d62, 0 10px 18px rgba(76, 49, 29, 0.16); }
    .map-bundle-node[data-slot="c"] { box-shadow: inset 5px 0 0 #d88d32, 0 10px 18px rgba(76, 49, 29, 0.16); }
    .map-bundle-node[data-slot="d"] { box-shadow: inset 5px 0 0 #2f6fb0, 0 10px 18px rgba(76, 49, 29, 0.16); }
    .map-bundle-node[data-slot="e"] { box-shadow: inset 5px 0 0 #b84532, 0 10px 18px rgba(76, 49, 29, 0.16); }
    .map-bundle-node[data-slot="f"] { box-shadow: inset 5px 0 0 #6f4b22, 0 10px 18px rgba(76, 49, 29, 0.16); }

    .map-bundle-name {
      font-size: 15px;
      font-weight: 950;
      line-height: 1.18;
      text-align: center;
    }

    .map-bundle-meta {
      color: #7d674f;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .map-item-strip {
      display: grid;
      grid-template-columns: repeat(var(--item-cols), minmax(0, 1fr));
      gap: 5px;
      min-width: 0;
    }

    .map-item {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 2px;
      min-width: 0;
      min-height: 54px;
      border: 1px solid #e4cda2;
      border-radius: 7px;
      background: rgba(255, 250, 240, 0.92);
      padding: 4px 3px;
      color: #2b2118;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .map-item:hover {
      border-color: #cda766;
      background: #fff6df;
    }

    .map-item.checked {
      border-color: #9ccc98;
      background: rgba(232, 246, 232, 0.96);
    }

    .map-item.highlight {
      outline: 3px solid rgba(47, 111, 176, 0.3);
      border-color: var(--blue);
    }

    .map-item input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .map-item.checked::after {
      content: "✓";
      position: absolute;
      right: 3px;
      bottom: 1px;
      color: var(--green);
      font-size: 13px;
      font-weight: 950;
    }

    .map-item-name {
      max-width: 100%;
      overflow: hidden;
      color: #4e3828;
      font-size: 10px;
      font-weight: 850;
      line-height: 1.12;
      text-align: center;
      white-space: normal;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .map-item-count {
      color: var(--red);
      font-size: 9px;
      font-weight: 950;
      line-height: 1;
    }

    .map-item .icon-wrap {
      width: 26px;
      height: 26px;
    }

    .map-item .icon,
    .map-item .fallback-icon {
      width: 26px;
      height: 26px;
    }

    .map-item .quality {
      width: 13px;
      height: 13px;
    }

    .map-tree-lines {
      position: absolute;
      inset: 22px;
      z-index: 2;
      width: calc(100% - 44px);
      height: calc(100% - 44px);
      pointer-events: none;
    }

    .map-tree-lines line {
      stroke: rgba(255, 250, 240, 0.88);
      stroke-width: 1.6;
      stroke-linecap: round;
      filter: drop-shadow(0 1px 1px rgba(76, 49, 29, 0.4));
    }

    .map-room-core {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 4;
      transform: translate(-50%, -50%);
      min-width: 112px;
      border: 2px solid rgba(145, 97, 44, 0.5);
      border-radius: 999px;
      background: rgba(255, 250, 240, 0.92);
      color: #6f4b22;
      padding: 10px 16px;
      font-size: 18px;
      font-weight: 950;
      text-align: center;
      box-shadow: 0 8px 18px rgba(76, 49, 29, 0.12);
    }

    .image-fallback {
      display: grid;
      place-items: center;
      min-height: 74px;
      border: 2px dashed #d9bf8b;
      border-radius: 8px;
      background: #f5e7c9;
      color: #6f4b22;
      padding: 8px;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .visual-caption {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .icon-wrap {
      position: relative;
      width: 28px;
      height: 28px;
    }

    .icon {
      width: 28px;
      height: 28px;
      image-rendering: pixelated;
      object-fit: contain;
    }

    .quality {
      position: absolute;
      right: -5px;
      bottom: -5px;
      width: 15px;
      height: 15px;
      image-rendering: pixelated;
    }

    .fallback-icon {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: #f0dfbd;
      color: #6c4b28;
      font-size: 14px;
      font-weight: 950;
    }

    @media (max-width: 980px) {
      .hero,
      .assistant-panel,
      .rooms,
      .room-body {
        grid-template-columns: 1fr;
      }

      .hero-actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 520px) {
      .page {
        width: calc(100% - 10px);
        padding: 6px 0 18px;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 7px;
        margin-bottom: 8px;
        padding: 9px 10px;
        border-radius: 8px;
      }

      .hero-kicker {
        display: none;
      }

      h1 {
        font-size: 24px;
      }

      .hero-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px;
      }

      .button {
        min-height: 34px;
        padding: 0 8px;
        border-radius: 7px;
        font-size: 13px;
      }

      .assistant-panel,
      .progress-panel,
      .center-map-panel {
        margin-bottom: 8px;
      }

      .search-panel,
      .progress-panel,
      .center-map-panel,
      .room-map {
        border-color: #efc477;
        border-radius: 10px;
        background: rgba(255, 249, 233, 0.95);
        box-shadow: 0 6px 14px rgba(126, 80, 26, 0.08);
      }

      .search-panel {
        grid-template-columns: 1fr;
        gap: 7px;
        padding: 8px;
      }

      .panel-title {
        margin-bottom: 7px;
        font-size: 17px;
        line-height: 1.2;
      }

      .search-panel .panel-title {
        margin: 0;
      }

      .search-box,
      .result-list {
        grid-column: auto;
      }

      .search-box {
        grid-template-columns: 1fr 36px 36px;
        gap: 5px;
      }

      .search-input {
        min-height: 40px;
        border-width: 1px;
        border-radius: 8px;
        padding: 0 10px;
        font-size: 14px;
      }

      .clear-button,
      .search-button {
        min-width: 36px;
        border-width: 1px;
        border-radius: 8px;
      }

      .result-list {
        max-height: 146px;
      }

      .result-head {
        grid-template-columns: 34px 1fr auto;
        gap: 7px;
      }

      .result-title {
        font-size: 13px;
      }

      .result-path {
        font-size: 11px;
      }

      .status {
        padding: 2px 6px;
        font-size: 10px;
      }

      .progress-panel,
      .center-map-panel,
      .room-map {
        padding: 8px;
      }

      .progress-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .category {
        position: relative;
        min-height: 86px;
        border: 1px solid #efc477;
        border-radius: 9px;
        background:
          radial-gradient(circle at 26px 23px, rgba(255, 255, 255, 0.92), transparent 28px),
          linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 244, 212, 0.76));
        padding: 8px 7px 8px 42px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
      }

      .category::before {
        content: "";
        position: absolute;
        left: 7px;
        top: 10px;
        width: 29px;
        height: 29px;
        background-position: center;
        background-repeat: no-repeat;
        background-size: contain;
        image-rendering: pixelated;
      }

      .category:nth-child(1)::before { background-image: url("https://stardewvalleywiki.com/mediawiki/index.php?title=Special:Redirect/file/Parsnip.png"); }
      .category:nth-child(2)::before { background-image: url("https://stardewvalleywiki.com/mediawiki/index.php?title=Special:Redirect/file/Leek.png"); }
      .category:nth-child(3)::before { background-image: url("https://stardewvalleywiki.com/mediawiki/index.php?title=Special:Redirect/file/Sunfish.png"); }
      .category:nth-child(4)::before { background-image: url("https://stardewvalleywiki.com/mediawiki/index.php?title=Special:Redirect/file/Oyster.png"); }
      .category:nth-child(5)::before { background-image: url("https://stardewvalleywiki.com/mediawiki/index.php?title=Special:Redirect/file/Large_Milk.png"); }
      .category:nth-child(6)::before { background-image: url("https://stardewvalleywiki.com/mediawiki/index.php?title=Special:Redirect/file/Stone.png"); }
      .category:nth-child(7)::before { background-image: url("https://stardewvalleywiki.com/mediawiki/index.php?title=Special:Redirect/file/Blackberry.png"); }
      .category:nth-child(8)::before { background-image: url("https://stardewvalleywiki.com/mediawiki/index.php?title=Special:Redirect/file/Gold.png"); }

      .category-top {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 950;
        line-height: 1.15;
      }

        bundle("quality-crops", "优质作物收集包", "4选3", "", [
          item("防风草", "crop", 5, "gold"), item("甜瓜", "crop", 5, "gold"), item("南瓜", "crop", 5, "gold"), item("玉米", "crop", 5, "gold")
        ]),
        bundle("animal", "动物收集包", "6选5", "", [
          item("大壶牛奶", "animal"), item("大鸡蛋(白)", "animal"), item("大鸡蛋(棕)", "animal"), item("大瓶羊奶", "animal"), item("羊毛", "animal"), item("鸭蛋", "animal")
        ]),
        bundle("artisan", "工匠收集包", "12选6", "", [
          item("松露油", "animal"), item("布料", "animal"), item("山羊奶酪", "animal"), item("奶酪", "animal"), item("蜂蜜", "animal"), item("果酱", "animal"),
          item("苹果", "crop"), item("杏子", "crop"), item("橙子", "crop"), item("桃子", "crop"), item("石榴", "crop"), item("樱桃", "crop")
        ])
      ]),
      room("fish", "🐟", "鱼缸", "完成任意工艺室包后解锁", "移除巨大闪石", [
        bundle("river-fish", "河鱼收集包", "4选4", "", [
          item("太阳鱼", "fish"), item("鲶鱼", "fish"), item("西鲱", "fish"), item("虎纹鳟鱼", "fish")
        ]),
        bundle("lake-fish", "湖鱼收集包", "4选4", "", [
          item("大嘴鲈鱼", "fish"), item("鲤鱼", "fish"), item("大头鱼", "fish"), item("鲟鱼", "fish")
        ]),
        bundle("ocean-fish", "海鱼收集包", "4选4", "", [
          item("沙丁鱼", "fish"), item("金枪鱼", "fish"), item("红鲫鱼", "fish"), item("罗非鱼", "fish")
        ]),
        bundle("night-fish", "夜间垂钓收集包", "3选3", "", [
          item("大眼鱼", "fish"), item("鲷鱼", "fish"), item("鳗鱼", "fish")
        ]),
        bundle("crab-pot", "蟹笼收集包", "10选5", "", [
          item("龙虾", "shellfish"), item("小龙虾", "shellfish"), item("螃蟹", "shellfish"), item("鸟蛤", "shellfish"), item("蚌", "shellfish"),
          item("虾", "shellfish"), item("蜗牛", "shellfish"), item("玉黍螺", "shellfish"), item("牡蛎", "shellfish"), item("蛤", "shellfish")
        ]),
        bundle("specialty-fish", "特色鱼类收集包", "4选4", "", [
          item("河豚", "fish"), item("鬼鱼", "fish"), item("沙鱼", "fish"), item("木跃鱼", "fish")
        ])
      ]),
      room("boiler", "⚡", "锅炉房", "完成任意茶水间包后解锁", "修复矿车", [
        bundle("blacksmith", "铁匠收集包", "3选3", "", [
          item("铜锭", "mine"), item("铁锭", "mine"), item("金锭", "mine")
        ]),
        bundle("geologist", "地理学家收集包", "4选4", "", [
          item("石英", "mine"), item("泪晶", "mine"), item("地晶", "mine"), item("火水晶", "mine")
        ]),
        bundle("adventurer", "冒险家收集包", "4选4", "", [
          item("史莱姆", "mine", 99), item("蝙蝠翅膀", "mine", 10), item("太阳精华", "mine"), item("虚空精华", "mine")
        ])
      ]),
      room("board", "📋", "布告栏", "完成任意鱼缸包后解锁", "友谊+2全体村民", [
        bundle("chef", "厨师收集包", "6选6", "需烹饪/产出", [
          item("枫糖浆", "forage"), item("蕨菜", "forage"), item("松露", "animal"), item("罂粟", "crop"), item("鲭鱼", "animal"), item("蜗牛", "shellfish")
        ]),
        bundle("dye", "染料收集包", "6选6", "", [
          item("红蘑菇", "forage"), item("海胆", "shellfish"), item("向日葵", "crop"), item("羽毛", "animal"), item("蓝莓", "crop"), item("葡萄", "crop")
        ]),
        bundle("field-research", "土地研究收集包", "4选4", "", [
          item("紫蘑菇", "forage"), item("鹦鹉螺化石", "shellfish"), item("山洞萝卜", "forage"), item("石英", "mine")
        ]),
        bundle("fodder", "饲料收集包", "3选3", "", [
          item("小麦", "crop", 10), item("干草", "resource", 10), item("苹果", "crop", 3)
        ]),
        bundle("enchanter", "魔法师收集包", "4选4", "", [
          item("橡树树脂", "forage"), item("葡萄酒", "animal"), item("兔子脚", "animal"), item("石榴", "crop")
        ])
      ]),
      room("vault", "💰", "金库", "完成任意鱼缸包后解锁", "修复巴士→沙漠", [
        bundle("vault-2500", "2,500G 收集包", "1选1", "", [item("金币", "money", 2500, "", "2,500G")]),
        bundle("vault-5000", "5,000G 收集包", "1选1", "", [item("金币", "money", 5000, "", "5,000G")]),
        bundle("vault-10000", "10,000G 收集包", "1选1", "", [item("金币", "money", 10000, "", "10,000G")]),
        bundle("vault-25000", "25,000G 收集包", "1选1", "总计: 42,500G", [item("金币", "money", 25000, "", "25,000G")])
      ])
    ];

    const state = {
      checked: loadCheckedItems(),
      showMissingOnly: false,
      query: ""
    };

    const flatItems = flattenItems();

    document.addEventListener("error", handleImageError, true);
    render();
    bindEvents();

    function room(id, icon, name, unlock, reward, bundles) {
      return { id, icon, name, unlock, reward, bundles };
    }

    function bundle(id, name, rule, reward, items) {
      const required = Number(rule.match(/选(\d+)/)?.[1] || items.length);
      return { id, name, rule, reward, required, items };
    }

    function item(name, category, count = 1, quality = "", displayName = "") {
      return { name, category, count, quality, displayName };
    }

    function bindEvents() {
      document.addEventListener("change", (event) => {
        const checkbox = event.target.closest("[data-item-id]");
        if (!checkbox) return;
        setChecked(checkbox.dataset.itemId, checkbox.checked);
      });

      document.addEventListener("click", (event) => {
        if (event.target.closest("#resetChecks")) {
          if (!confirm("确定要清空所有勾选吗？")) return;
          state.checked.clear();
          saveCheckedItems();
          render();
          return;
        }

        if (event.target.closest("#showMissing")) {
          state.showMissingOnly = !state.showMissingOnly;
          document.getElementById("showMissing").textContent = state.showMissingOnly ? "显示全部" : "只看未完成";
          applyVisibility();
          return;
        }

        const result = event.target.closest("[data-jump-id]");
        if (result) focusItem(result.dataset.jumpId);

        if (event.target.closest("#jumpSearch")) jumpToFirstSearchResult();
      });

      document.getElementById("itemSearch").addEventListener("input", (event) => {
        state.query = event.target.value.trim();
        renderSearchResults();
        markHighlights();
      });

      document.getElementById("itemSearch").addEventListener("keydown", (event) => {
        if (event.key === "Enter") jumpToFirstSearchResult();
      });

      document.getElementById("clearSearch").addEventListener("click", () => {
        state.query = "";
        document.getElementById("itemSearch").value = "";
        renderSearchResults();
        markHighlights();
      });
    }

    function handleImageError(event) {
      const image = event.target;
      if (!(image instanceof HTMLImageElement)) return;
      if (image.dataset.failed) return;
      image.dataset.failed = "true";
      if (image.classList.contains("quality")) {
        image.remove();
        return;
      }

      const label = image.dataset.fallback || image.alt || "图片暂不可用";
      const fallbackClass = image.classList.contains("icon") ? "fallback-icon" : "image-fallback";
      image.replaceWith(fallbackNode(label, fallbackClass));
    }

    function render() {
      document.getElementById("rooms").innerHTML = rooms.map(renderRoom).join("");
      renderCenterMap();
      renderProgress();
      renderSearchResults();
      applyVisibility();
      markHighlights();
    }

    function renderRoom(roomData) {
      const checked = countCheckedInRoom(roomData);
      const total = roomData.bundles.reduce((sum, bundleData) => sum + bundleData.required, 0);
      return `
        <article class="room" data-room-id="${roomData.id}">
          <header class="room-header">
            <div>
              <h2 class="room-title"><span>${roomData.icon}</span><span>${escapeHtml(roomData.name)}</span></h2>
              <p class="room-meta">${escapeHtml(roomData.unlock)} · 奖励：${escapeHtml(roomData.reward)}</p>
            </div>
            <div class="room-badge">${checked} / ${total}</div>
          </header>
          <div class="room-body">
            ${renderRoomVisuals(roomData)}
          </div>
        </article>
      `;
    }

    function renderRoomVisuals(roomData) {
      const roomImage = roomImages[roomData.id];
      const mapLayout = getBundleMapLayout(roomData);
      const core = mapLayout.core;
      return `
        <figure class="room-scene-card">
          <div class="room-scene">
            ${roomImage ? renderExternalImage("room-scene-bg", roomImage, `${roomData.name}房间背景`) : renderImageFallback(`${roomData.name}房间背景`)}
            ${renderMapLines(mapLayout)}
            <div class="map-room-core" style="--x:${core.x}%;--y:${core.y}%">${escapeHtml(roomData.name)}</div>
            <div class="map-bundle-grid" data-count="${roomData.bundles.length}">
              ${roomData.bundles.map((bundleData, bundleIndex) => {
                const checked = bundleData.items.filter((entry) => isChecked(entry.uid)).length;
                const complete = checked >= bundleData.required;
                const done = Math.min(checked, bundleData.required);
                const slot = getSlot(bundleIndex);
                const point = mapLayout.points[bundleData.id] || { x: 50, y: 50 };
                return `
                  <div class="map-bundle-node ${complete ? "done" : ""}" data-bundle-id="${bundleData.id}" data-item-count="${bundleData.items.length}" data-slot="${slot}" style="--x:${point.x}%;--y:${point.y}%" title="${escapeAttribute(bundleData.name)}">
                    <div class="map-bundle-name">${escapeHtml(bundleData.name)}</div>
                    ${renderMapBundleItems(bundleData)}
                    <div class="map-bundle-meta">${escapeHtml(bundleData.rule)} · ${done}/${bundleData.required}</div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
          <figcaption class="visual-caption">${escapeHtml(roomData.name)}房间位置与收集包分支</figcaption>
        </figure>
      `;
    }

    function renderExternalImage(className, fileName, alt) {
      return `<img class="${className}" src="${iconUrl(fileName)}" alt="${escapeAttribute(alt)}" loading="lazy" data-fallback="${escapeAttribute(alt)}" />`;
    }

    function getBundleMapLayout(roomData) {
      const configured = bundleLayoutByRoom[roomData.id];
      if (configured) return configured;

      const fallbackPoints = {};
      roomData.bundles.forEach((bundleData, index) => {
        fallbackPoints[bundleData.id] = {
          x: 20 + (index % 3) * 30,
          y: index < 3 ? 28 : 76
        };
      });
      return { core: { x: 50, y: 52 }, points: fallbackPoints };
    }

    function renderMapLines(layout) {
      const core = layout.core;
      return `
        <svg class="map-tree-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          ${Object.values(layout.points).map((point) => `<line x1="${core.x}" y1="${core.y}" x2="${point.x}" y2="${point.y}" />`).join("")}
        </svg>
      `;
    }

    function renderMapBundleItems(bundleData) {
      const columns = getMapItemColumns(bundleData);
      return `
        <div class="map-item-strip" style="--item-cols:${columns}">
          ${bundleData.items.map((entry) => renderMapItem(entry)).join("")}
        </div>
      `;
    }

    function renderMapItem(entry) {
      const checked = isChecked(entry.uid);
      const title = describeItem(entry);
      return `
        <label class="map-item ${checked ? "checked" : ""}" data-item-card="${entry.uid}" title="${escapeAttribute(title)}">
          <input type="checkbox" data-item-id="${entry.uid}" ${checked ? "checked" : ""} aria-label="${escapeAttribute(title)}" />
          ${renderIcon(entry)}
          <span class="map-item-name">${escapeHtml(entry.displayName || entry.name)}</span>
          ${entry.count > 1 && !entry.displayName ? `<span class="map-item-count">×${entry.count}</span>` : ""}
        </label>
      `;
    }

    function getMapItemColumns(bundleData) {
      const count = bundleData.items.length;
      if (bundleData.id === "summer-forage") return 3;
      if (count <= 8) return 4;
      if (count === 9) return 5;
      if (count === 10) return 5;
      if (count === 12) return 4;
      return Math.min(6, Math.ceil(count / 2));
    }

    function renderImageFallback(label) {
      return `<span class="image-fallback">${escapeHtml(label)}</span>`;
    }

    function renderIcon(entry) {
      const fileName = iconFiles[entry.name] || iconFiles[entry.displayName] || "";
      const image = fileName
        ? `<img class="icon" src="${iconUrl(fileName)}" alt="" loading="lazy" data-fallback="${escapeAttribute(entry.name)}" />`
        : `<span class="fallback-icon">${escapeHtml((entry.name || "?").slice(0, 1))}</span>`;
      const quality = entry.quality && QUALITY_ICON[entry.quality]
        ? `<img class="quality" src="${iconUrl(QUALITY_ICON[entry.quality])}" alt="金星" loading="lazy" />`
        : "";
      return `<span class="icon-wrap">${image}${quality}</span>`;
    }

    function renderProgress() {
      const grid = document.getElementById("progressGrid");
      grid.innerHTML = categories.map(([key, label]) => {
        const entries = flatItems.filter((entry) => entry.category === key);
        const total = entries.length;
        const checked = entries.filter((entry) => isChecked(entry.uid)).length;
        const percent = total ? Math.round((checked / total) * 100) : 0;
        return `
          <div class="category">
            <div class="category-top">
              <span>${escapeHtml(label)}</span>
              <span class="category-count">${checked} / ${total}</span>
            </div>
            <div class="bar"><div class="fill" style="width:${percent}%"></div></div>
          </div>
        `;
      }).join("");
    }

    function renderCenterMap() {
      document.getElementById("centerMap").innerHTML = `
        ${renderExternalImage("center-map-image", CENTER_MAP_IMAGE, "社区中心整体地图")}
        ${centerRoomPins.map((pin) => `
          <div class="center-room-pin" style="--x:${pin.x}%;--y:${pin.y}%;--dx:${pin.dx}px;--dy:${pin.dy}px;--line-l:${pin.line}px;--line-a:${pin.angle}deg">
            <span class="center-pin-line" aria-hidden="true"></span>
            <span class="center-pin-dot" aria-hidden="true"></span>
            <span class="center-pin-label">
              <span class="center-pin-name">${escapeHtml(pin.name)}</span>
              <span class="center-pin-note">${escapeHtml(pin.note)}</span>
            </span>
          </div>
        `).join("")}
      `;
    }

    function renderSearchResults() {
      const list = document.getElementById("resultList");
      if (!state.query) {
        list.innerHTML = "";
        return;
      }

      const query = normalize(state.query);
      const matches = flatItems.filter((entry) => {
        const haystack = [
          entry.name,
          entry.displayName,
          entry.quality === "gold" ? `金星${entry.name}` : "",
          `${entry.name}×${entry.count}`,
          entry.roomName,
          entry.bundleName
        ].map(normalize).join(" ");
        return haystack.includes(query);
      });

      if (!matches.length) {
        list.innerHTML = `<p class="empty-state">这个物品不在当前献祭清单里，可以放心处理。</p>`;
        return;
      }

      list.innerHTML = matches.map((entry) => {
        const checked = isChecked(entry.uid);
        return `
          <article class="result-card ${checked ? "done" : ""}" data-jump-id="${entry.uid}">
            <div class="result-head">
              ${renderIcon(entry)}
              <div>
                <p class="result-title">${escapeHtml(describeItem(entry))}</p>
                <p class="result-path">${escapeHtml(entry.roomName)} → ${escapeHtml(entry.bundleName)}</p>
              </div>
              <span class="status ${checked ? "done" : "need"}">${checked ? "已献祭" : "要保留"}</span>
            </div>
          </article>
        `;
      }).join("");
    }

    function applyVisibility() {
      document.querySelectorAll("[data-bundle-id]").forEach((node) => {
        const hasMissing = Boolean(node.querySelector("[data-item-id]:not(:checked)"));
        node.hidden = state.showMissingOnly && !hasMissing;
      });

      document.querySelectorAll("[data-room-id]").forEach((node) => {
        const hasVisibleBundle = Boolean(node.querySelector("[data-bundle-id]:not([hidden])"));
        node.hidden = state.showMissingOnly && !hasVisibleBundle;
      });
    }

    function markHighlights() {
      document.querySelectorAll("[data-item-card]").forEach((node) => node.classList.remove("highlight"));
      if (!state.query) return;

      const query = normalize(state.query);
      flatItems.forEach((entry) => {
        const name = normalize(`${entry.name} ${entry.displayName} ${entry.quality === "gold" ? `金星${entry.name}` : ""}`);
        if (!name.includes(query)) return;
        const node = document.querySelector(`[data-item-card="${entry.uid}"]`);
        node?.classList.add("highlight");
      });
    }

    function focusItem(uid) {
      const node = document.querySelector(`[data-item-card="${uid}"]`);
      if (!node) return;
      node.scrollIntoView({ behavior: "smooth", block: "center" });
      node.classList.add("highlight");
    }

    function jumpToFirstSearchResult() {
      if (!state.query) return;
      const query = normalize(state.query);
      const match = flatItems.find((entry) => {
        const haystack = [
          entry.name,
          entry.displayName,
          entry.quality === "gold" ? `金星${entry.name}` : "",
          `${entry.name}×${entry.count}`,
          entry.roomName,
          entry.bundleName
        ].map(normalize).join(" ");
        return haystack.includes(query);
      });
      if (match) focusItem(match.uid);
    }

    function setChecked(uid, checked) {
      if (checked) {
        state.checked.add(uid);
      } else {
        state.checked.delete(uid);
      }
      saveCheckedItems();
      render();
    }

    function flattenItems() {
      const entries = [];
      rooms.forEach((roomData) => {
        roomData.bundles.forEach((bundleData) => {
          bundleData.items.forEach((entry, index) => {
            entry.uid = `${roomData.id}:${bundleData.id}:${index}`;
            entry.roomName = roomData.name;
            entry.bundleName = bundleData.name;
            entries.push(entry);
          });
        });
      });
      return entries;
    }

    function countCheckedInRoom(roomData) {
      return roomData.bundles.reduce((sum, bundleData) => {
        const checked = bundleData.items.filter((entry) => isChecked(entry.uid)).length;
        return sum + Math.min(checked, bundleData.required);
      }, 0);
    }

    function describeItem(entry) {
      const quality = entry.quality === "gold" ? "金星" : "";
      if (entry.displayName) return entry.displayName;
      return `${quality}${entry.name}${entry.count > 1 ? ` ×${entry.count}` : ""}`;
    }

    function isChecked(uid) {
      return state.checked.has(uid);
    }

    function iconUrl(fileName) {
      return `${WIKI_FILE_BASE}${encodeURIComponent(fileName.replaceAll(" ", "_"))}`;
    }

    function getSlot(index) {
      return ["a", "b", "c", "d", "e", "f"][index] || "f";
    }

    function fallbackNode(label, className) {
      const span = document.createElement("span");
      span.className = className;
      span.textContent = label;
      return span;
    }

    function normalize(value) {
      return String(value || "").toLowerCase().replace(/\s+/g, "");
    }

    function loadCheckedItems() {
      try {
        return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []);
      } catch {
        return new Set();
      }
    }

    function saveCheckedItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(state.checked)));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
