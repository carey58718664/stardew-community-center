<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社区中心献祭清单</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #1f2937;
      --muted: #687386;
      --line: #dce3ec;
      --green: #1f9d68;
      --green-soft: #e8f7ef;
      --amber: #b86b00;
      --amber-soft: #fff3d6;
      --blue: #2d6cdf;
      --blue-soft: #eaf1ff;
      --shadow: 0 14px 34px rgba(29, 41, 57, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(245, 247, 251, 0.96)),
        radial-gradient(circle at 16% 10%, rgba(45, 108, 223, 0.12), transparent 30%),
        radial-gradient(circle at 84% 0%, rgba(31, 157, 104, 0.12), transparent 26%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      line-height: 1.55;
    }

    button,
    input {
      font: inherit;
    }

    .static-page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .guide-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 760px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
    }

    .tool-button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 0 14px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(29, 41, 57, 0.05);
    }

    .tool-button:hover {
      border-color: #b8c4d4;
      background: var(--panel-soft);
    }

    .progress-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .progress-title {
      margin: 0 0 8px;
      font-weight: 800;
    }

    .progress-bar {
      overflow: hidden;
      height: 12px;
      border-radius: 999px;
      background: #e7edf5;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2d6cdf, #1f9d68);
      transition: width 0.22s ease;
    }

    .progress-number {
      min-width: 110px;
      color: var(--green);
      font-size: 24px;
      font-weight: 900;
      text-align: right;
    }

    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .room {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .room-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }

    .room h2 {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 0 0 8px;
      font-size: 20px;
      letter-spacing: 0;
    }

    .room-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 2px 9px;
      background: var(--blue-soft);
      color: #234f9f;
      font-weight: 700;
    }

    .reward-pill {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .room-progress {
      color: var(--green);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .bundle-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 14px;
      list-style: none;
    }

    .bundle {
      border: 1px solid #e6ebf2;
      border-radius: 8px;
      background: #ffffff;
    }

    .bundle-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 12px 12px 8px;
    }

    .bundle-title {
      margin: 0;
      font-size: 15px;
      font-weight: 850;
      letter-spacing: 0;
    }

    .search-link {
      border: 0;
      background: transparent;
      color: var(--blue);
      font-weight: 850;
      padding: 0;
      cursor: pointer;
      text-align: left;
    }

    .search-link:hover {
      text-decoration: underline;
    }

    .bundle-rule {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .bundle-reward {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .item-check {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      min-height: 34px;
      border: 1px solid #dce3ec;
      border-radius: 8px;
      background: var(--panel-soft);
      padding: 5px 9px 5px 7px;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }

    .item-check:hover {
      border-color: #b8c4d4;
      background: #ffffff;
    }

    .item-check input {
      width: 16px;
      height: 16px;
      accent-color: var(--green);
      cursor: pointer;
    }

    .item-check:has(input:checked) {
      border-color: #a6ddc0;
      background: var(--green-soft);
      color: #12623f;
    }

    .item-check:has(input:checked) .item-name {
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: rgba(31, 157, 104, 0.45);
    }

    .item-name {
      font-size: 14px;
      white-space: nowrap;
    }

    .item-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .tips {
      margin-top: 18px;
      border-left: 4px solid var(--green);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.84);
      padding: 14px 16px;
      box-shadow: 0 8px 22px rgba(29, 41, 57, 0.06);
    }

    .tips p {
      margin: 0;
      color: var(--muted);
    }

    .tips strong {
      color: var(--text);
    }

    @media (max-width: 840px) {
      .guide-header,
      .progress-card,
      .rooms-grid {
        grid-template-columns: 1fr;
      }

      .toolbar,
      .progress-number {
        justify-content: flex-start;
        text-align: left;
      }
    }

    @media (max-width: 520px) {
      .static-page {
        width: min(100% - 22px, 1180px);
        padding-top: 18px;
      }

      .room-header,
      .bundle-top {
        grid-template-columns: 1fr;
      }

      .room-progress,
      .bundle-rule {
        white-space: normal;
      }

      .item-check {
        width: 100%;
      }

      .item-name {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main class="static-page">
    <header class="guide-header">
      <div>
        <p class="eyebrow">Stardew Valley Community Center</p>
        <h1>🎁 社区中心献祭清单</h1>
        <p class="subtitle">每献祭一个物品就勾掉一个，页面会自动保存进度。蓝色收集包名称可以继续触发你原来的搜索逻辑。</p>
      </div>
      <div class="toolbar">
        <button class="tool-button" type="button" id="showMissing">只看未完成</button>
        <button class="tool-button" type="button" id="resetChecks">清空勾选</button>
      </div>
    </header>

    <section class="progress-card" aria-label="总进度">
      <div>
        <p class="progress-title">总进度</p>
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
      <div class="progress-number" id="progressNumber">0 / 0</div>
    </section>

    <section class="rooms-grid" id="roomsGrid"></section>

    <section class="tips">
      <p><strong>解锁流程提示：</strong>完成任意工艺室包→解锁茶水间+鱼缸 → 完成茶水间包→解锁锅炉房 → 完成鱼缸包→解锁布告栏+金库。建议优先做春季作物和蟹笼包，早期快速推进。</p>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "stardew.communityCenter.checkedItems.v1";

    const rooms = [
      {
        icon: "🏠",
        name: "工艺室",
        unlock: "初始开放",
        reward: "修复采石场桥梁",
        bundles: [
          bundle("春季采集收集包", "4选4", ["野山葵", "黄水仙", "韭葱", "蒲公英"], "春季种子×30", "野山葵"),
          bundle("夏季采集收集包", "3选3", ["葡萄", "香味浆果", "甜豌豆"], "夏季种子×30", "葡萄"),
          bundle("秋季采集收集包", "4选4", ["普通蘑菇", "野李子", "榛子", "黑莓"], "秋季种子×30", "普通蘑菇"),
          bundle("冬季采集收集包", "4选4", ["冬根", "水晶果", "雪山药", "番红花"], "冬季种子×30"),
          bundle("建筑收集包", "4选4", ["木材×99", "木材×99", "石头×99", "硬木×10"], "煤炭窑"),
          bundle("异国情调采集收集包", "9选5", ["椰子", "仙人掌果子", "山洞萝卜", "红蘑菇", "紫蘑菇", "龙葵", "枫糖浆", "松焦油", "橡树树脂"], "", "椰子")
        ]
      },
      {
        icon: "🍴",
        name: "茶水间",
        unlock: "完成任意工艺室包后解锁",
        reward: "温室",
        bundles: [
          bundle("春季作物收集包", "4选4", ["防风草", "青豆", "花椰菜", "土豆"], "", "防风草"),
          bundle("夏季作物收集包", "4选4", ["番茄", "辣椒", "蓝莓", "甜瓜"], "", "番茄"),
          bundle("秋季作物收集包", "4选4", ["玉米", "茄子", "南瓜", "山药"], "", "玉米"),
          bundle("优质作物收集包", "4选3", ["金星防风草×5", "金星甜瓜×5", "金星南瓜×5", "金星玉米×5"]),
          bundle("动物收集包", "6选5", ["大壶牛奶", "大鸡蛋(白)", "大鸡蛋(棕)", "大瓶羊奶", "羊毛", "鸭蛋"]),
          bundle("工匠收集包", "12选6", ["松露油", "布料", "山羊奶酪", "奶酪", "蜂蜜", "果酱", "苹果", "杏子", "橙子", "桃子", "石榴", "樱桃"])
        ]
      },
      {
        icon: "🐟",
        name: "鱼缸",
        unlock: "完成任意工艺室包后解锁",
        reward: "移除巨大闪石",
        bundles: [
          bundle("河鱼收集包", "4选4", ["太阳鱼", "鲶鱼", "西鲱", "虎纹鳟鱼"], "", "太阳鱼"),
          bundle("湖鱼收集包", "4选4", ["大嘴鲈鱼", "鲤鱼", "大头鱼", "鲟鱼"], "", "大嘴鲈鱼"),
          bundle("海鱼收集包", "4选4", ["沙丁鱼", "金枪鱼", "红鲫鱼", "罗非鱼"], "", "沙丁鱼"),
          bundle("夜间垂钓收集包", "3选3", ["大眼鱼", "鲷鱼", "鳗鱼"]),
          bundle("蟹笼收集包", "10选5", ["龙虾", "小龙虾", "螃蟹", "鸟蛤", "蚌", "虾", "蜗牛", "玉黍螺", "牡蛎", "蛤"]),
          bundle("特色鱼类收集包", "4选4", ["河豚", "鬼鱼", "沙鱼", "木跃鱼"])
        ]
      },
      {
        icon: "⚡",
        name: "锅炉房",
        unlock: "完成任意茶水间包后解锁",
        reward: "修复矿车",
        bundles: [
          bundle("铁匠收集包", "3选3", ["铜锭", "铁锭", "金锭"]),
          bundle("地理学家收集包", "4选4", ["石英", "泪晶", "地晶", "火水晶"]),
          bundle("冒险家收集包", "4选4", ["史莱姆×99", "蝙蝠翅膀×10", "太阳精华", "虚空精华"])
        ]
      },
      {
        icon: "📋",
        name: "布告栏",
        unlock: "完成任意鱼缸包后解锁",
        reward: "友谊+2❤️全体村民",
        bundles: [
          bundle("厨师收集包", "6选6", ["枫糖浆", "蕨菜", "松露", "罂粟", "鲭鱼", "蜗牛"], "需烹饪产出"),
          bundle("染料收集包", "6选6", ["红蘑菇", "海胆", "向日葵", "羽毛", "蓝莓", "葡萄"]),
          bundle("土地研究收集包", "4选4", ["紫蘑菇", "鹦鹉螺化石", "山洞萝卜", "石英"]),
          bundle("饲料收集包", "3选3", ["小麦×10", "干草×10", "苹果×3"]),
          bundle("魔法师收集包", "4选4", ["橡树树脂", "葡萄酒", "兔子脚", "石榴"])
        ]
      },
      {
        icon: "💰",
        name: "金库",
        unlock: "完成任意鱼缸包后解锁",
        reward: "修复巴士→沙漠",
        bundles: [
          bundle("2,500G 收集包", "1选1", ["缴纳 2,500 金币"]),
          bundle("5,000G 收集包", "1选1", ["缴纳 5,000 金币"]),
          bundle("10,000G 收集包", "1选1", ["缴纳 10,000 金币"]),
          bundle("25,000G 收集包", "1选1", ["缴纳 25,000 金币"], "总计: 42,500G")
        ]
      }
    ];

    const state = {
      checked: loadCheckedItems(),
      showMissingOnly: false
    };

    render();

    document.addEventListener("change", (event) => {
      const checkbox = event.target.closest("[data-item-id]");
      if (!checkbox) return;

      if (checkbox.checked) {
        state.checked.add(checkbox.dataset.itemId);
      } else {
        state.checked.delete(checkbox.dataset.itemId);
      }

      saveCheckedItems();
      updateProgress();
      applyVisibilityFilter();
    });

    document.addEventListener("click", (event) => {
      const searchButton = event.target.closest("[data-search]");
      if (searchButton) {
        const keyword = searchButton.dataset.search;
        if (typeof window.searchAndShow === "function") {
          window.searchAndShow(keyword);
        } else {
          alert(`搜索：${keyword}`);
        }
        return;
      }

      if (event.target.id === "showMissing") {
        state.showMissingOnly = !state.showMissingOnly;
        event.target.textContent = state.showMissingOnly ? "显示全部" : "只看未完成";
        applyVisibilityFilter();
      }

      if (event.target.id === "resetChecks") {
        if (!confirm("确定要清空所有勾选吗？")) return;
        state.checked.clear();
        saveCheckedItems();
        render();
      }
    });

    function bundle(name, rule, items, reward = "", search = "") {
      return { name, rule, items, reward, search };
    }

    function render() {
      document.getElementById("roomsGrid").innerHTML = rooms.map(renderRoom).join("");
      updateProgress();
      applyVisibilityFilter();
    }

    function renderRoom(room, roomIndex) {
      return `
        <article class="room" data-room-index="${roomIndex}">
          <header class="room-header">
            <div>
              <h2><span>${room.icon}</span><span>${escapeHtml(room.name)}</span></h2>
              <p class="room-meta">
                <span class="pill">${escapeHtml(room.unlock)}</span>
                <span class="pill reward-pill">奖励：${escapeHtml(room.reward)}</span>
              </p>
            </div>
            <div class="room-progress" data-room-progress="${roomIndex}">0 / 0</div>
          </header>
          <ul class="bundle-list">
            ${room.bundles.map((item, bundleIndex) => renderBundle(item, roomIndex, bundleIndex)).join("")}
          </ul>
        </article>
      `;
    }

    function renderBundle(item, roomIndex, bundleIndex) {
      const title = item.search
        ? `<button class="search-link" type="button" data-search="${escapeAttribute(item.search)}">${escapeHtml(item.name)}</button>`
        : escapeHtml(item.name);

      return `
        <li class="bundle" data-bundle>
          <div class="bundle-top">
            <div>
              <p class="bundle-title">${title}</p>
              ${item.reward ? `<p class="bundle-reward">奖励：${escapeHtml(item.reward)}</p>` : ""}
            </div>
            <div class="bundle-rule">${escapeHtml(item.rule)}</div>
          </div>
          <div class="items">
            ${item.items.map((name, itemIndex) => renderItem(name, roomIndex, bundleIndex, itemIndex)).join("")}
          </div>
        </li>
      `;
    }

    function renderItem(name, roomIndex, bundleIndex, itemIndex) {
      const id = `${roomIndex}-${bundleIndex}-${itemIndex}`;
      const checked = state.checked.has(id) ? "checked" : "";
      const parsed = parseItemName(name);

      return `
        <label class="item-check" data-item>
          <input type="checkbox" data-item-id="${id}" ${checked} />
          <span class="item-name">${escapeHtml(parsed.name)}</span>
          ${parsed.count ? `<span class="item-count">${escapeHtml(parsed.count)}</span>` : ""}
        </label>
      `;
    }

    function parseItemName(rawName) {
      const parts = rawName.match(/^(.*?)(×\d+)$/);
      if (!parts) return { name: rawName, count: "" };
      return { name: parts[1], count: parts[2] };
    }

    function updateProgress() {
      const checkboxes = Array.from(document.querySelectorAll("[data-item-id]"));
      const checkedCount = checkboxes.filter((item) => item.checked).length;
      const totalCount = checkboxes.length;
      const percentage = totalCount ? Math.round((checkedCount / totalCount) * 100) : 0;

      document.getElementById("progressNumber").textContent = `${checkedCount} / ${totalCount}`;
      document.getElementById("progressFill").style.width = `${percentage}%`;

      rooms.forEach((room, roomIndex) => {
        const roomItems = checkboxes.filter((item) => item.dataset.itemId.startsWith(`${roomIndex}-`));
        const roomChecked = roomItems.filter((item) => item.checked).length;
        const progressNode = document.querySelector(`[data-room-progress="${roomIndex}"]`);
        if (progressNode) {
          progressNode.textContent = `${roomChecked} / ${roomItems.length}`;
        }
      });
    }

    function applyVisibilityFilter() {
      document.querySelectorAll("[data-bundle]").forEach((node) => {
        const hasMissing = Boolean(node.querySelector("[data-item-id]:not(:checked)"));
        node.hidden = state.showMissingOnly && !hasMissing;
      });

      document.querySelectorAll("[data-room-index]").forEach((room) => {
        const hasVisibleBundle = Boolean(room.querySelector("[data-bundle]:not([hidden])"));
        room.hidden = state.showMissingOnly && !hasVisibleBundle;
      });
    }

    function loadCheckedItems() {
      try {
        return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []);
      } catch {
        return new Set();
      }
    }

    function saveCheckedItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(state.checked)));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
