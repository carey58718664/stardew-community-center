      ]),
      room("vault", "💰", "金库", "完成任意鱼缸包后解锁", "修复巴士→沙漠", [
        bundle("vault-2500", "2,500G 收集包", "1选1", "", [item("金币", "money", 2500, "", "2,500G")]),
        bundle("vault-5000", "5,000G 收集包", "1选1", "", [item("金币", "money", 5000, "", "5,000G")]),
        bundle("vault-10000", "10,000G 收集包", "1选1", "", [item("金币", "money", 10000, "", "10,000G")]),
        bundle("vault-25000", "25,000G 收集包", "1选1", "总计: 42,500G", [item("金币", "money", 25000, "", "25,000G")])
      ]),
      room("missing", "🎬", "废弃Joja超市", "社区中心全部完成后，首个雨天或雷雨日前夜解锁（Joja路线无）", "电影院", [
        bundle("missing-bundle", "失踪收集包", "6选5", "电影院", [
          item("葡萄酒", "animal", 1, "silver"),
          item("恐龙蛋黄酱", "animal"),
          item("五彩碎片", "mine"),
          item("上古水果", "crop", 5, "gold"),
          item("虚空鲑鱼", "fish", 1, "gold"),
          item("鱼子酱", "animal")
        ])
      ])
    ];

    const state = {
      checked: loadCheckedItems(),
      showMissingOnly: false,
      query: ""
    };

    const flatItems = flattenItems();
    let layoutTimerIds = [];

    document.addEventListener("error", handleImageError, true);
    render();
    bindEvents();

    function room(id, icon, name, unlock, reward, bundles) {
      return { id, icon, name, unlock, reward, bundles };
    }

    function bundle(id, name, rule, reward, items) {
      const required = Number(rule.match(/选(\d+)/)?.[1] || items.length);
      return { id, name, rule, reward, required, items };
    }

    function item(name, category, count = 1, quality = "", displayName = "") {
      return { name, category, count, quality, displayName };
    }

    function bindEvents() {
      document.addEventListener("change", (event) => {
        const checkbox = event.target.closest("[data-item-id]");
        if (!checkbox) return;
        setChecked(checkbox.dataset.itemId, checkbox.checked);
      });

      document.addEventListener("click", (event) => {
        if (event.target.closest("#resetChecks")) {
          if (!confirm("确定要清空所有勾选吗？")) return;
          state.checked.clear();
          saveCheckedItems();
          render();
          return;
        }

        if (event.target.closest("#showMissing")) {
          state.showMissingOnly = !state.showMissingOnly;
          document.getElementById("showMissing").textContent = state.showMissingOnly ? "显示全部" : "只看未完成";
          applyVisibility();
          scheduleLayout();
          return;
        }

        const result = event.target.closest("[data-jump-id]");
        if (result) focusItem(result.dataset.jumpId);

        const mapBundle = event.target.closest(".map-bundle-node[data-bundle-id]");
        if (mapBundle) {
          activateBundleDetail(mapBundle.closest(".room"), mapBundle.dataset.bundleId);
          return;
        }

        if (event.target.closest("#jumpSearch")) jumpToFirstSearchResult();
      });

      document.getElementById("itemSearch").addEventListener("input", (event) => {
        state.query = event.target.value.trim();
        renderSearchResults();
        markHighlights();
      });

      document.getElementById("itemSearch").addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;
        jumpToFirstSearchResult();
      });

      document.getElementById("clearSearch").addEventListener("click", () => {
        state.query = "";
        document.getElementById("itemSearch").value = "";
        renderSearchResults();
        markHighlights();
      });

      window.addEventListener("resize", scheduleLayout);
      window.addEventListener("load", scheduleLayout);
      bindLayoutImages(document);
    }

    function handleImageError(event) {
      const image = event.target;
      if (!(image instanceof HTMLImageElement)) return;
      if (image.dataset.failed) return;
      image.dataset.failed = "true";
      if (image.classList.contains("quality")) {
        image.remove();
        return;
      }

      const label = image.dataset.fallback || image.alt || "图片暂不可用";
      const fallbackClass = image.classList.contains("icon") ? "fallback-icon" : "image-fallback";
      image.replaceWith(fallbackNode(label, fallbackClass));
      scheduleLayout();
    }

    function render() {
      document.getElementById("rooms").innerHTML = rooms.map(renderRoom).join("");
      renderCenterMap();
      renderProgress();
      renderSearchResults();
      applyVisibility();
      markHighlights();
      bindLayoutImages(document.getElementById("rooms"));
      scheduleLayout();
    }

    function renderRoom(roomData) {
      const checked = countCheckedInRoom(roomData);
      const total = roomData.bundles.reduce((sum, bundleData) => sum + bundleData.required, 0);
      return `
        <article class="room" id="room-${roomData.id}" data-room-id="${roomData.id}">
          <header class="room-header">
            <div>
              <h2 class="room-title"><a class="room-title-link" href="#center-map-section" aria-label="返回社区中心地图"><span>${roomData.icon}</span><span class="room-title-text">${escapeHtml(roomData.name)}</span></a></h2>
              <p class="room-meta">${escapeHtml(roomData.unlock)} · 奖励：${escapeHtml(roomData.reward)}</p>
            </div>
            <div class="room-badge">${checked} / ${total}</div>
          </header>
          <div class="room-body">
            ${renderRoomVisuals(roomData)}
          </div>
        </article>
      `;
    }

    function renderRoomVisuals(roomData) {
      const roomImage = roomImages[roomData.id];
      const mapLayout = getBundleMapLayout(roomData);
      const core = mapLayout.core;
      return `
        <figure class="room-scene-card">
          <div class="room-scene">
            ${roomImage ? renderExternalImage("room-scene-bg", roomImage, `${roomData.name}房间背景`) : renderImageFallback(`${roomData.name}房间背景`)}
            ${renderMapLines(mapLayout)}
            <div class="map-room-core" style="--x:${core.x}%;--y:${core.y}%">${escapeHtml(roomData.name)}</div>
            <div class="map-bundle-grid" data-count="${roomData.bundles.length}">
              ${roomData.bundles.map((bundleData, bundleIndex) => renderMapBundle(roomData, bundleData, bundleIndex, mapLayout)).join("")}
            </div>
          </div>
          <figcaption class="visual-caption">${escapeHtml(roomData.name)}房间位置与收集包分支</figcaption>
        </figure>
        ${renderRoomBundleDetails(roomData)}
      `;
    }

    function renderMapBundle(roomData, bundleData, bundleIndex, mapLayout) {
      const checked = bundleData.items.filter((entry) => isChecked(entry.uid)).length;
      const complete = checked >= bundleData.required;
      const done = Math.min(checked, bundleData.required);
      const slot = getSlot(bundleIndex);
      const point = mapLayout.points[bundleData.id] || { x: 50, y: 50 };
      return `
        <div class="map-bundle-node ${complete ? "done" : ""} ${bundleIndex === 0 ? "active" : ""}" data-bundle-id="${bundleData.id}" data-item-count="${bundleData.items.length}" data-slot="${slot}" style="--x:${point.x}%;--y:${point.y}%" title="${escapeAttribute(bundleData.name)}">
          <div class="map-bundle-name">${escapeHtml(bundleData.name)}</div>
          ${renderMapBundleItems(bundleData)}
          <div class="map-bundle-meta">${escapeHtml(bundleData.rule)} · ${done}/${bundleData.required}</div>
        </div>
      `;
    }

    function renderRoomBundleDetails(roomData) {
      if (roomData.id === "vault") return renderVaultBundleDetail(roomData);

      return `
        <div class="room-detail-list" aria-label="${escapeAttribute(roomData.name)}收集包明细">
          ${roomData.bundles.map((bundleData, bundleIndex) => renderBundleDetail(roomData, bundleData, bundleIndex)).join("")}
        </div>
      `;
    }

    function renderVaultBundleDetail(roomData) {
      const entries = roomData.bundles.flatMap((bundleData) => bundleData.items);
      const checked = entries.filter((entry) => isChecked(entry.uid)).length;
      const total = entries.length;
      return `
        <div class="room-detail-list" aria-label="${escapeAttribute(roomData.name)}收集包明细">
          <section class="bundle-detail-card active" data-detail-bundle-id="vault-summary" data-slot="a">
            <header class="bundle-detail-head">
              <div>
                <h3 class="bundle-detail-title">金库收集包</h3>
                <p class="bundle-detail-sub">总计：42,500G</p>
              </div>
              <div class="bundle-detail-rule">${total}选${total} · ${checked}/${total}</div>
            </header>
            <div class="detail-items">
              ${entries.map((entry) => renderDetailItem(entry)).join("")}
            </div>
          </section>
        </div>
      `;
    }

    function renderBundleDetail(roomData, bundleData, bundleIndex) {
      const checked = bundleData.items.filter((entry) => isChecked(entry.uid)).length;
      const complete = checked >= bundleData.required;
      const done = Math.min(checked, bundleData.required);
      const slot = getSlot(bundleIndex);
      const rewardText = cleanRewardText(bundleData.reward);
      const reward = rewardText ? `<p class="bundle-detail-sub">奖励：${escapeHtml(rewardText)}</p>` : "";
      return `
        <section class="bundle-detail-card ${complete ? "done" : ""} ${bundleIndex === 0 ? "active" : ""}" data-detail-bundle-id="${bundleData.id}" data-slot="${slot}">
          <header class="bundle-detail-head">
            <div>
              <h3 class="bundle-detail-title">${escapeHtml(bundleData.name)}</h3>
              ${reward}
            </div>
            <div class="bundle-detail-rule">${escapeHtml(bundleData.rule)} · ${done}/${bundleData.required}</div>
          </header>
          <div class="detail-items">
            ${bundleData.items.map((entry) => renderDetailItem(entry)).join("")}
          </div>
        </section>
      `;
    }

    function renderDetailItem(entry) {
      const checked = isChecked(entry.uid);
      const title = describeItem(entry);
      return `
        <label class="detail-item ${checked ? "checked" : ""}" data-item-card="${entry.uid}" title="${escapeAttribute(title)}">
          <input type="checkbox" data-item-id="${entry.uid}" ${checked ? "checked" : ""} aria-label="${escapeAttribute(title)}" />
          ${renderIcon(entry)}
          <span class="detail-item-name">
            ${escapeHtml(entry.displayName || entry.name)}
            ${entry.count > 1 && !entry.displayName ? `<span class="detail-item-count">×${entry.count}</span>` : ""}
          </span>
        </label>
      `;
    }

    function activateBundleDetail(roomNode, bundleId) {
      if (!roomNode) return null;
      const targetId = roomNode.dataset.roomId === "vault" ? "vault-summary" : bundleId;
      let activeDetail = null;
      roomNode.querySelectorAll("[data-detail-bundle-id]").forEach((node) => {
        const active = node.dataset.detailBundleId === targetId;
        node.classList.toggle("active", active);
        if (active) activeDetail = node;
      });
      roomNode.querySelectorAll(".map-bundle-node[data-bundle-id]").forEach((node) => {
        node.classList.toggle("active", node.dataset.bundleId === bundleId);
      });
      return activeDetail;
    }

    function cleanRewardText(value) {
      const text = String(value || "")
        .replace(/奖\s*励[:：]\s*/g, "")
        .trim();
      return text === "电影院" ? "" : text;
    }

    function renderExternalImage(className, fileName, alt) {
      return `<img class="${className}" src="${iconUrl(fileName)}" alt="${escapeAttribute(alt)}" loading="lazy" data-fallback="${escapeAttribute(alt)}" />`;
    }

    function getBundleMapLayout(roomData) {
      return bundleLayoutByRoom[roomData.id] || { core: { x: 50, y: 52 }, points: {} };
    }

    function renderMapLines(layout) {
      const origin = layout.linkFrom && layout.points[layout.linkFrom]
        ? layout.points[layout.linkFrom]
        : layout.core;
      const points = Object.entries(layout.points)
        .filter(([id]) => id !== layout.linkFrom)
        .map(([, point]) => point);
      return `
        <svg class="map-tree-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          ${points.map((point) => `<line x1="${origin.x}" y1="${origin.y}" x2="${point.x}" y2="${point.y}" />`).join("")}
        </svg>
      `;
    }

    function renderMapBundleItems(bundleData) {
      const columns = getMapItemColumns(bundleData);
      return `
        <div class="map-item-strip" style="--item-cols:${columns}">
          ${bundleData.items.map((entry) => renderMapItem(entry)).join("")}
        </div>
      `;
    }

    function renderMapItem(entry) {
      const checked = isChecked(entry.uid);
      const title = describeItem(entry);
      return `
        <span class="map-item ${checked ? "checked" : ""}" data-item-card="${entry.uid}" title="${escapeAttribute(title)}" aria-label="${escapeAttribute(title)}">
          ${renderIcon(entry)}
          <span class="map-item-name">${escapeHtml(entry.displayName || entry.name)}</span>
          ${entry.count > 1 && !entry.displayName ? `<span class="map-item-count">×${entry.count}</span>` : ""}
        </span>
      `;
    }

    function getMapItemColumns(bundleData) {
      const count = bundleData.items.length;
      if (bundleData.id === "summer-forage") return 3;
      if (bundleData.id === "missing-bundle") return 3;
      if (count <= 8) return 4;
      if (count === 9) return 3;
      if (count === 10) return 4;
      if (count === 12) return 4;
      return Math.min(6, Math.ceil(count / 2));
    }

    function renderImageFallback(label) {
      return `<span class="image-fallback">${escapeHtml(label)}</span>`;
    }

    function renderIcon(entry) {
      const fileName = iconFiles[entry.name] || iconFiles[entry.displayName] || "";
      const image = fileName
        ? `<img class="icon" src="${iconUrl(fileName)}" alt="" loading="lazy" onerror="this.replaceWith(fallbackIcon('${escapeAttribute(entry.name)}'))" />`
        : `<span class="fallback-icon">${escapeHtml((entry.name || "?").slice(0, 1))}</span>`;
      const quality = entry.quality && QUALITY_ICON[entry.quality]
        ? `<img class="quality" src="${iconUrl(QUALITY_ICON[entry.quality])}" alt="金星" loading="lazy" />`
        : "";
      return `<span class="icon-wrap">${image}${quality}</span>`;
    }

    function renderProgress() {
      const grid = document.getElementById("progressGrid");
      grid.innerHTML = categories.map(([key, label]) => {
        const entries = flatItems.filter((entry) => entry.category === key);
        const total = entries.length;
        const checked = entries.filter((entry) => isChecked(entry.uid)).length;
        const percent = total ? Math.round((checked / total) * 100) : 0;
        return `
          <div class="category">
            <div class="category-top">
              <span>${escapeHtml(label)}</span>
              <span class="category-count">${checked} / ${total}</span>
            </div>
            <div class="bar"><div class="fill" style="width:${percent}%"></div></div>
          </div>
        `;
      }).join("");
    }

    function renderCenterMap() {
      document.getElementById("centerMap").innerHTML = `
        <div class="center-map-stage center-map-stage-ref">
          ${renderExternalImage("center-map-image center-map-image-ref", CENTER_MAP_IMAGE, "社区中心整体地图")}
          ${centerRoomPins.map((pin) => `
            <a class="center-ref-title-dom" href="#room-${pin.id}" aria-label="跳转到${escapeHtml(pin.name)}" style="--box-x:${pin.boxX}%;--box-y:${pin.boxY}%;--box-w:${pin.boxW}%;--box-h:${pin.boxH}%">${escapeHtml(pin.name)}</a>
            <div class="center-ref-note-dom" style="--note-x:${pin.boxX + pin.boxW / 2}%;--note-y:${pin.noteY}%;--note-w:${pin.boxW}%">${escapeHtml(pin.note)}</div>
          `).join("")}
          <svg class="center-map-overlay-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            ${centerRoomPins.map((pin) => `
              <polyline class="center-route" points="${pin.path}" />
            `).join("")}
          </svg>
        </div>
      `;
    }

    function renderSearchResults() {
      const list = document.getElementById("resultList");
      if (!state.query) {
        list.innerHTML = "";
        return;
      }

      const query = normalize(state.query);
      const matches = flatItems.filter((entry) => {
        const haystack = [
          entry.name,
          entry.displayName,
          (entry.quality === "gold" ? `金星${entry.name}` : entry.quality === "silver" ? `银星${entry.name}` : ""),
          `${entry.name}×${entry.count}`,
          entry.roomName,
          entry.bundleName
        ].map(normalize).join(" ");
        return haystack.includes(query);
      });

      if (!matches.length) {
        list.innerHTML = `<p class="empty-state">这个物品不在当前献祭清单里，可以放心处理。</p>`;
        return;
      }

      list.innerHTML = matches.map((entry) => {
        const checked = isChecked(entry.uid);
        return `
          <article class="result-card ${checked ? "done" : ""}" data-jump-id="${entry.uid}">
            <div class="result-head">
              ${renderIcon(entry)}
              <div>
                <p class="result-title">${escapeHtml(describeItem(entry))}</p>
                <p class="result-path">${escapeHtml(entry.roomName)} → ${escapeHtml(entry.bundleName)}</p>
              </div>
              <span class="status ${checked ? "done" : "need"}">${checked ? "已献祭" : "要保留"}</span>
            </div>
          </article>
        `;
      }).join("");
    }

    function applyVisibility() {
      document.querySelectorAll("[data-bundle-id]").forEach((node) => {
        const hasMissing = hasMissingInBundleNode(node);
        node.hidden = state.showMissingOnly && !hasMissing;
      });

      document.querySelectorAll("[data-detail-bundle-id]").forEach((node) => {
        const hasMissing = Boolean(node.querySelector("[data-item-id]:not(:checked)"));
        node.hidden = state.showMissingOnly && !hasMissing;
      });

      document.querySelectorAll("[data-room-id]").forEach((node) => {
        const hasVisibleBundle = Boolean(node.querySelector("[data-bundle-id]:not([hidden]), [data-detail-bundle-id]:not([hidden])"));
        node.hidden = state.showMissingOnly && !hasVisibleBundle;
      });

      document.querySelectorAll(".map-tree-lines line").forEach((line) => {
        line.style.display = state.showMissingOnly ? "none" : "";
      });
    }

    function hasMissingInBundleNode(node) {
      const checkbox = node.querySelector("[data-item-id]");
      if (checkbox) return Boolean(node.querySelector("[data-item-id]:not(:checked)"));

      const roomNode = node.closest("[data-room-id]");
      const roomData = rooms.find((entry) => entry.id === roomNode?.dataset.roomId);
      const bundleData = roomData?.bundles.find((entry) => entry.id === node.dataset.bundleId);
      if (!bundleData) return false;
      return bundleData.items.some((entry) => !isChecked(entry.uid));
    }

    function markHighlights() {
      document.querySelectorAll("[data-item-card]").forEach((node) => node.classList.remove("highlight"));
      if (!state.query) return;

      const query = normalize(state.query);
      flatItems.forEach((entry) => {
        const name = normalize(`${entry.name} ${entry.displayName} ${entry.quality === "gold" ? `金星${entry.name}` : entry.quality === "silver" ? `银星${entry.name}` : ""}`);
        if (!name.includes(query)) return;
        document.querySelectorAll(`[data-item-card="${entry.uid}"]`).forEach((node) => node.classList.add("highlight"));
      });
    }

    function focusItem(uid) {
      const [roomId, bundleId] = uid.split(":");
      activateBundleDetail(document.querySelector(`.room[data-room-id="${roomId}"]`), bundleId);
      const node = document.querySelector(`.detail-item[data-item-card="${uid}"]`) || document.querySelector(`[data-item-card="${uid}"]`);
      if (!node) return;
      node.scrollIntoView({ behavior: "smooth", block: "center" });
      document.querySelectorAll(`[data-item-card="${uid}"]`).forEach((entryNode) => entryNode.classList.add("highlight"));
    }

    function jumpToFirstSearchResult() {
      if (!state.query) return;
      const query = normalize(state.query);
      const match = flatItems.find((entry) => {
        const haystack = [
          entry.name,
          entry.displayName,
          (entry.quality === "gold" ? `金星${entry.name}` : entry.quality === "silver" ? `银星${entry.name}` : ""),
          `${entry.name}×${entry.count}`,
          entry.roomName,
          entry.bundleName
        ].map(normalize).join(" ");
        return haystack.includes(query);
      });
      if (match) focusItem(match.uid);
    }

    function setChecked(uid, checked) {
      if (checked) state.checked.add(uid);
      else state.checked.delete(uid);
      saveCheckedItems();

      syncCheckedItem(uid, checked);
      updateRoomStats();
      renderProgress();
      renderSearchResults();
      markHighlights();
      scheduleLayout();
    }

    function syncCheckedItem(uid, checked) {
      document.querySelectorAll("[data-item-id]").forEach((input) => {
        if (input.dataset.itemId !== uid) return;
        input.checked = checked;
      });

      document.querySelectorAll("[data-item-card]").forEach((card) => {
        if (card.dataset.itemCard !== uid) return;
        card.classList.toggle("checked", checked);
      });
    }

    function updateRoomStats() {
      rooms.forEach((roomData) => {
        const roomNode = document.querySelector(`.room[data-room-id="${roomData.id}"]`);
        if (!roomNode) return;

        const checked = countCheckedInRoom(roomData);
        const total = roomData.bundles.reduce((sum, bundleData) => sum + bundleData.required, 0);
        const badge = roomNode.querySelector(".room-badge");
        if (badge) badge.textContent = `${checked} / ${total}`;

        roomData.bundles.forEach((bundleData) => {
          const bundleChecked = bundleData.items.filter((entry) => isChecked(entry.uid)).length;
          const complete = bundleChecked >= bundleData.required;
          const done = Math.min(bundleChecked, bundleData.required);

          roomNode.querySelectorAll(`[data-bundle-id="${bundleData.id}"], [data-detail-bundle-id="${bundleData.id}"]`).forEach((bundleNode) => {
            bundleNode.classList.toggle("done", complete);

            const mapMeta = bundleNode.querySelector(".map-bundle-meta");
            if (mapMeta) mapMeta.textContent = `${bundleData.rule} · ${done}/${bundleData.required}`;

            const detailRule = bundleNode.querySelector(".bundle-detail-rule");
            if (detailRule) detailRule.textContent = `${bundleData.rule} · ${done}/${bundleData.required}`;
          });
        });

        if (roomData.id === "vault") {
          const entries = roomData.bundles.flatMap((bundleData) => bundleData.items);
          const checkedEntries = entries.filter((entry) => isChecked(entry.uid)).length;
          const summary = roomNode.querySelector('[data-detail-bundle-id="vault-summary"]');
          if (summary) {
            summary.classList.toggle("done", checkedEntries >= entries.length);
            const detailRule = summary.querySelector(".bundle-detail-rule");
            if (detailRule) detailRule.textContent = `${entries.length}选${entries.length} · ${checkedEntries}/${entries.length}`;
          }
        }
      });
    }

    function flattenItems() {
      const entries = [];
      rooms.forEach((roomData) => {
        roomData.bundles.forEach((bundleData) => {
          bundleData.items.forEach((entry, index) => {
            entry.uid = `${roomData.id}:${bundleData.id}:${index}`;
            entry.roomName = roomData.name;
            entry.bundleName = bundleData.name;
            entries.push(entry);
          });
        });
      });
      return entries;
    }

    function countCheckedInRoom(roomData) {
      return roomData.bundles.reduce((sum, bundleData) => {
        const checked = bundleData.items.filter((entry) => isChecked(entry.uid)).length;
        return sum + Math.min(checked, bundleData.required);
      }, 0);
    }

    function describeItem(entry) {
      const quality = entry.quality === "gold" ? "金星" : entry.quality === "silver" ? "银星" : "";
      if (entry.displayName) return entry.displayName;
      return `${quality}${entry.name}${entry.count > 1 ? ` ×${entry.count}` : ""}`;
    }

    function isChecked(uid) {
      return state.checked.has(uid);
    }

    function bindLayoutImages(root = document) {
      root.querySelectorAll("img").forEach((image) => {
        if (image.dataset.layoutBound) return;
        image.dataset.layoutBound = "true";
        image.addEventListener("load", scheduleLayout, { once: true });
        image.addEventListener("error", scheduleLayout, { once: true });
      });
    }

    function scheduleLayout() {
      requestAnimationFrame(() => requestAnimationFrame(layoutMobileRoomVisuals));
      layoutTimerIds.forEach((timerId) => clearTimeout(timerId));
      layoutTimerIds = [80, 240, 700, 1600].map((delay) => setTimeout(layoutMobileRoomVisuals, delay));
    }

    function layoutMobileRoomVisuals() {
      const isMobile = window.matchMedia("(max-width: 520px)").matches;
      Object.keys(mobileRowsByRoom).forEach((roomId) => layoutRoomRows(roomId, isMobile));
    }

    function layoutRoomRows(roomId, isMobile) {
      const scene = document.querySelector(`.room[data-room-id="${roomId}"] .room-scene`);
      if (!scene) return;

      const grid = scene.querySelector(".map-bundle-grid");
      const lines = scene.querySelector(".map-tree-lines");
      const rows = mobileRowsByRoom[roomId];
      const config = mobileLayoutConfig[roomId] || {};
      const flatIds = rows.flat();
      const cards = Object.fromEntries(flatIds.map((id) => [id, scene.querySelector(`[data-bundle-id="${id}"]`)]));

      if (!grid || !lines || Object.values(cards).some((card) => !card)) return;

      if (!isMobile) {
        scene.style.removeProperty("height");
        scene.style.removeProperty("min-height");
        scene.style.removeProperty("aspect-ratio");

        [grid, lines].forEach((layer) => {
          layer.style.removeProperty("display");
          layer.style.removeProperty("inset");
          layer.style.removeProperty("left");
          layer.style.removeProperty("top");
          layer.style.removeProperty("width");
          layer.style.removeProperty("height");
        });

        Object.values(cards).forEach((card) => {
          card.style.removeProperty("left");
          card.style.removeProperty("top");
          card.style.removeProperty("transform");
          card.style.removeProperty("transform-origin");
        });
        return;
      }

      const sceneWidth = scene.clientWidth;
      if (!sceneWidth) return;

      const visibleRows = rows
        .map((row) => row.filter((id) => cards[id] && !cards[id].hidden))
        .filter((row) => row.length);

      if (!visibleRows.length) {
        lines.querySelectorAll("line").forEach((line) => { line.style.display = "none"; });
        return;
      }

      grid.style.setProperty("inset", "0", "important");
      grid.style.setProperty("left", "0", "important");
      grid.style.setProperty("top", "0", "important");
      grid.style.setProperty("width", "100%", "important");

      const shouldHideLines = roomId === "vault" || roomId === "missing";
      lines.style.setProperty("display", shouldHideLines ? "none" : "block", "important");
      lines.style.setProperty("inset", "0", "important");
      lines.style.setProperty("left", "0", "important");
      lines.style.setProperty("top", "0", "important");
      lines.style.setProperty("width", "100%", "important");

      Object.values(cards).forEach((card) => {
        card.style.setProperty("left", "0px", "important");
        card.style.setProperty("top", "0px", "important");
        card.style.setProperty("transform", "none", "important");
        card.style.setProperty("transform-origin", "top left", "important");
      });

      const minGap = config.minGap ?? 6;
      const wantedScale = config.wantedScale ?? 1;
      const minScale = config.minScale ?? 0.82;
      const vGapBase = config.vGap ?? minGap;

      const rowBaseWidths = visibleRows.map((row) => row.reduce((sum, id) => sum + cards[id].offsetWidth, 0));
      const scaleCandidates = visibleRows.map((row, index) => {
        const available = sceneWidth - minGap * (row.length + 1);
        return available / Math.max(1, rowBaseWidths[index]);
      });

      let scale = Math.min(wantedScale, ...scaleCandidates);
      scale = Math.max(minScale, scale);

      const vGap = Math.max(vGapBase, minGap * scale);
      const rowHeights = visibleRows.map((row) => Math.max(...row.map((id) => cards[id].offsetHeight * scale)));
      const contentHeight = rowHeights.reduce((sum, height) => sum + height, 0) + vGap * Math.max(0, rowHeights.length - 1);
      let sceneHeight = Math.ceil(Math.max(
        contentHeight + minGap * 2,
        config.sceneHeight ?? sceneWidth * (config.heightRatio ?? 0.68)
      ));
      const topBase = config.topOffset ?? Math.max(minGap, (sceneHeight - contentHeight) / 2);
      sceneHeight = Math.ceil(Math.max(sceneHeight, topBase + contentHeight + minGap));
      let top = topBase;
      const positioned = {};

      visibleRows.forEach((row, rowIndex) => {
        const scaledWidth = row.reduce((sum, id) => sum + cards[id].offsetWidth * scale, 0);
        const gap = Math.max(minGap, (sceneWidth - scaledWidth) / (row.length + 1));
        const rowHeight = rowHeights[rowIndex];
        const xOverrides = config.xByRow?.[rowIndex] || {};
        let left = gap;

        row.forEach((id) => {
          const card = cards[id];
          const cardWidth = card.offsetWidth * scale;
          const customX = xOverrides[id];
          const currentLeft = typeof customX === "number"
            ? clamp(sceneWidth * customX - cardWidth / 2, minGap, sceneWidth - cardWidth - minGap)
            : left;

          placeMapCard(card, currentLeft, top, scale);
          positioned[id] = {
            x: currentLeft + cardWidth / 2,
            y: top + card.offsetHeight * scale / 2
          };
          left += cardWidth + gap;
        });

        top += rowHeight + vGap;
      });

      scene.style.setProperty("height", `${sceneHeight}px`, "important");
      scene.style.setProperty("min-height", "0", "important");
      scene.style.setProperty("aspect-ratio", "auto", "important");
      grid.style.setProperty("height", `${sceneHeight}px`, "important");
      lines.style.setProperty("height", `${sceneHeight}px`, "important");

      if (shouldHideLines) {
        lines.querySelectorAll("line").forEach((line) => { line.style.display = "none"; });
      } else {
        updateRoomLines(roomId, lines, positioned, sceneWidth, sceneHeight);
      }
    }

    function placeMapCard(card, left, top, scale) {
      card.style.setProperty("left", `${Math.round(left)}px`, "important");
      card.style.setProperty("top", `${Math.round(top)}px`, "important");
      card.style.setProperty("transform", `scale(${scale})`, "important");
      card.style.setProperty("transform-origin", "top left", "important");
    }

    function updateRoomLines(roomId, lines, positioned, width, height) {
      const layout = bundleLayoutByRoom[roomId];
      if (!layout) return;

      const allLines = Array.from(lines.querySelectorAll("line"));
      allLines.forEach((line) => { line.style.display = "none"; });

      // 只看未完成时，已完成的卡片会隐藏。此时保留树线会指向空位置，干脆隐藏线条，避免画面乱飞。
      if (state.showMissingOnly) return;

      const visibleIds = Object.keys(positioned);
      const originId = positioned[layout.linkFrom] ? layout.linkFrom : visibleIds[0];
      const origin = positioned[originId];
      if (!origin) return;

      const targetIds = Object.keys(layout.points).filter((id) => id !== originId && positioned[id]);
      targetIds.forEach((id, index) => {
        const line = allLines[index];
        const target = positioned[id];
        if (!line || !target) return;

        line.style.display = "";
        line.setAttribute("x1", (origin.x / width) * 100);
        line.setAttribute("y1", (origin.y / height) * 100);
        line.setAttribute("x2", (target.x / width) * 100);
        line.setAttribute("y2", (target.y / height) * 100);
      });
    }

    /* ── localStorage ── */
    const APP_KEY = "stardew.app.v1";
    function loadApp() {
      try { return JSON.parse(localStorage.getItem(APP_KEY)) || {}; } catch { return {}; }
    }
    function saveApp() {
      const { pendingInventoryDelete, ...persistedState } = appState;
      localStorage.setItem(APP_KEY, JSON.stringify(persistedState));
    }

    const _appLoaded = loadApp();
    const appState = {
      season: _appLoaded.season || "spring",
      day: _appLoaded.day || 1,
      weather: _appLoaded.weather || "sunny",
      goals: _appLoaded.goals || [],
      inventory: _appLoaded.inventory || {},   // { 玉米: 8, 铜矿石: 25, ... }
      tools: _appLoaded.tools || {},           // { pickaxe: "铜", ... }
      equipment: _appLoaded.equipment || {},   // { preserves_jar: 3, ... }
      buildings: _appLoaded.buildings || {},   // { silo: true, ... }
      pendingInventoryDelete: "",
    };

    const APP_SEASON_BACKGROUNDS = {
      spring: "Flower Festival.jpg",
      summer: "Standard Farm World Map.png",
      fall: "StardewValleyFair.png",
      winter: "Festival of Ice.png"
    };

    /* ── 渲染主入口 ── */
    function renderApp() {
      renderSeasonBar();
      renderQuests();
      renderGoals();
      renderInventorySummary();
      renderSuggestions();
      saveApp();
    }

    /* ── 季节天气栏 ── */
    function renderSeasonBar() {
      document.querySelectorAll("[data-season]").forEach(b => {
        b.classList.toggle("active", b.dataset.season === appState.season);
      });
      document.getElementById("dayInput").value = appState.day;
      const seasonLabel = { spring: "春", summer: "夏", fall: "秋", winter: "冬" }[appState.season];
      const seasonIcon = { spring: "🌸", summer: "🌿", fall: "🍂", winter: "❄️" }[appState.season];
      document.getElementById("seasonLabel").textContent = `${seasonLabel}季`;
      document.getElementById("seasonTitleIcon").textContent = seasonIcon;
      const seasonPanel = document.getElementById("seasonPanel");
      if (seasonPanel) {
        const bgFile = APP_SEASON_BACKGROUNDS[appState.season] || APP_SEASON_BACKGROUNDS.spring;
        seasonPanel.dataset.season = appState.season;
        seasonPanel.style.setProperty("--season-bg", `url("${iconUrl(bgFile)}")`);
      }
      const wt = document.getElementById("weatherToggle");
      wt.textContent = appState.weather === "rainy" ? "🌧️ 雨" : "☀️ 晴";
      wt.classList.toggle("rainy", appState.weather === "rainy");
    }

    function setSeason(s) { appState.season = s; renderApp(); }
    function setDay(d) {
      d = Math.max(1, Math.min(28, parseInt(d) || 1));
      appState.day = d;
      renderApp();
    }
    function stepDay(delta) {
      let d = appState.day + delta;
      if (d > 28) {
        const order = ["spring", "summer", "fall", "winter"];
        const i = order.indexOf(appState.season);
        appState.season = order[(i + 1) % 4];
        d = 1;
      } else if (d < 1) {
        const order = ["spring", "summer", "fall", "winter"];
        const i = order.indexOf(appState.season);
        appState.season = order[(i + 3) % 4];
        d = 28;
      }
      appState.day = d;
      renderApp();
    }
    function toggleWeather() {
      appState.weather = appState.weather === "rainy" ? "sunny" : "rainy";
      renderApp();
    }

    /* ── 当季主线 ── */
    function renderQuests() {
      const list = SEASON_QUESTS[appState.season] || [];
      const grid = document.getElementById("questGrid");
      grid.innerHTML = list.map(q => {
        const added = q.goal && appState.goals.some(g => g.id === q.goal);
        const theme = getQuestTheme(q);
        return `
          <div class="quest-card ${added ? "added" : ""}" data-priority="${q.priority}" data-theme="${theme}">
            <div class="quest-card-head">
              <div class="quest-title">${escapeHtml(q.title)}</div>
              <div class="quest-day">${escapeHtml(q.day)}</div>
            </div>
            <div class="quest-reason">
              <span class="quest-reason-text">${escapeHtml(q.reason)}</span>
              ${q.goal ? `<button class="quest-add-btn ${added ? "added" : ""}" type="button" ${added ? "disabled" : `data-add-goal="${q.goal}"`} aria-label="${added ? "已加入目标" : `加入${escapeAttribute(q.title)}目标`}">${added ? "✓" : "+"}</button>` : ""}
            </div>
          </div>
        `;
      }).join("");
    }

    function getQuestTheme(q) {
      const text = `${q.title || ""} ${q.reason || ""}`;
      if (/及时收获|最晚播种/.test(text)) return "harvest";
      if (/收集包|茶水间|社区中心/.test(text)) return "bundle";
      if (/种.*作物|作物|蓝莓|草莓|蔓越莓|上古水果/.test(text)) return "crop";
      if (/月光水母|水母/.test(text)) return "jelly";
      if (/展览会/.test(text)) return "fair";
      if (/万圣|冬星/.test(text)) return "spirit";
      if (/冰雪|冰钓/.test(text)) return "winter-festival";
      if (/蛋蛋节|花舞节|节|舞会/.test(text)) return "festival";
      if (/矿洞|挖矿|铱矿/.test(text)) return "mine";
      if (/升级|工具|镐|锄|斧|壶|铁匠/.test(text)) return "tool";
      if (/整理农场|农场/.test(text)) return "farm";
      if (/种子|组合包/.test(text)) return "seed";
      return q.priority || "info";
    }

    /* ── 目标 ── */
    function renderGoals() {
      const list = document.getElementById("goalsList");
      document.getElementById("goalsCount").textContent = appState.goals.length ? `${appState.goals.length} 个进行中` : "";
      if (appState.goals.length === 0) {
        list.innerHTML = `<div class="goals-empty">从当季主线一键加入目标，或点下方按钮浏览模板。</div>`;
        return;
      }
      list.innerHTML = appState.goals.map(goal => {
        const tpl = findGoalTemplate(goal.id) || goal;
        const steps = (goal.steps || tpl.steps).map((step, idx) => {
          const have = step.invKey ? (appState.inventory[step.invKey] || 0) : 0;
          const auto = step.invNeed && have >= step.invNeed;
          const checked = step.checked || auto;
          return `
            <button class="goal-step ${checked ? "done" : ""}" data-toggle-step="${goal.id}|${idx}" type="button">
              <span class="goal-step-check">${checked ? "✓" : ""}</span>
              <div style="flex:1; min-width:0;">
                <div class="goal-step-text">${escapeHtml(step.label)}</div>
                ${step.sub ? `<div class="goal-step-sub">${escapeHtml(step.sub)}</div>` : ""}
                ${step.invKey && step.invNeed ? `<div class="goal-step-have">背包中：${have} / ${step.invNeed}${auto ? " ✓ 已凑齐" : ""}</div>` : ""}
              </div>
            </button>
          `;
        }).join("");
        const total = (goal.steps || tpl.steps).length;
        const done = (goal.steps || tpl.steps).filter((s, i) => {
          const have = s.invKey ? (appState.inventory[s.invKey] || 0) : 0;
          return s.checked || (s.invNeed && have >= s.invNeed);
        }).length;
        const pct = total ? Math.round(done / total * 100) : 0;
        const complete = pct === 100;
        const howLabel = { craft: "🔨 合成菜单", build: "🏡 找Robin", upgrade: "⚒️ 找Clint", self: "💪 自行" }[tpl.how] || "";
        const isOpen = goal.expanded !== false;
        return `
          <div class="goal-card-container">
            <button class="goal-delete-btn" data-delete-goal="${goal.id}" type="button">🗑️<br/>删除</button>
            <div class="goal-card ${complete ? "complete" : ""}" data-swipe-goal="${goal.id}">
              <button type="button" class="goal-head" data-toggle-goal="${goal.id}">
                <span class="goal-emoji">${renderGoalIcon(tpl)}</span>
                <div class="goal-info">
                  <div class="goal-title">${escapeHtml(tpl.title)}</div>
                  ${tpl.note ? `<div class="goal-meta">${escapeHtml(tpl.note)}</div>` : ""}
                  ${howLabel ? `<span class="goal-how ${tpl.how}">${howLabel}</span>` : ""}
                </div>
                <div class="goal-progress">
                  <div class="goal-frac">${done}/${total}</div>
                  <div class="goal-bar"><div class="goal-bar-fill" style="width:${pct}%"></div></div>
                </div>
              </button>
              ${isOpen ? `
                <div class="goal-body">
                  ${steps}
                </div>
              ` : ""}
            </div>
          </div>
        `;
      }).join("");
      // 绑定左滑删除
      list.querySelectorAll("[data-swipe-goal]").forEach(card => {
        if (!card.dataset.swipeBound) {
          attachGoalSwipe(card, card.dataset.swipeGoal);
          card.dataset.swipeBound = "1";
        }
      });
    }

    function findGoalTemplate(id) {
      for (const cat of GOAL_TEMPLATES) {
        for (const g of cat.goals) if (g.id === id) return g;
      }
      return null;
    }
    function addGoal(id) {
      if (appState.goals.some(g => g.id === id)) { toast("已经在目标列表里"); return; }
      const tpl = findGoalTemplate(id);
      if (!tpl) return;
      appState.goals.push({ id, steps: tpl.steps.map(s => ({ ...s, checked: false })), expanded: true });
      renderApp();
      toast("🎯 已加入目标");
    }
    function toggleGoalExpand(id) {
      const g = appState.goals.find(x => x.id === id);
      if (g) g.expanded = g.expanded === false;
      renderGoals();
      saveApp();
    }
    function toggleGoalStep(id, idx) {
      const g = appState.goals.find(x => x.id === id);
      if (!g) return;
      g.steps[idx].checked = !g.steps[idx].checked;
      renderApp();
    }
    function removeGoal(id) {
      if (!confirm("确定移除这个目标吗？")) return;
      appState.goals = appState.goals.filter(g => g.id !== id);
      renderApp();
    }

    /* ── 背包 ── */
    function renderInventorySummary() {
      const div = document.getElementById("invSummary");
      const inventoryEntries = Object.entries(appState.inventory)
        .filter(([, qty]) => qty > 0)
        .sort((a, b) => b[1] - a[1])
        .map(([name, qty]) => ({ type: "inventory", key: name, name, iconName: name, count: `×${qty}` }));
      const toolEntries = TOOLS
        .map((tool) => {
          const level = appState.tools[tool.id] || "初始";
          if (level === "初始") return null;
          const name = getToolIconName(tool, level);
          return { type: "tool", key: tool.id, name, iconName: name, count: "" };
        })
        .filter(Boolean);
      const equipmentEntries = EQUIPMENT
        .map((entry) => {
          const qty = appState.equipment[entry.id] || 0;
          return qty > 0 ? { type: "equipment", key: entry.id, name: entry.name, iconName: entry.name, count: `×${qty}` } : null;
        })
        .filter(Boolean);
      const buildingEntries = BUILDINGS
        .filter((entry) => appState.buildings[entry.id])
        .map((entry) => ({ type: "building", key: entry.id, name: entry.name, iconName: entry.name, count: "已建" }));
      const entries = [...inventoryEntries, ...toolEntries, ...equipmentEntries, ...buildingEntries];
      if (entries.length === 0) {
        div.innerHTML = `<div class="inventory-empty">点下方按钮录入物品，录入后会自动生成处置建议。</div>`;
        return;
      }
      div.innerHTML = entries.map((entry) => {
        const token = `${entry.type}:${entry.key}`;
        const armed = appState.pendingInventoryDelete === token;
        return `
          <span class="inv-chip ${entry.count ? "has" : ""} ${armed ? "delete-armed" : ""}" data-inv-chip="${escapeAttribute(token)}" title="${escapeAttribute(entry.name)}">
            ${renderInvIcon(entry.iconName)}<span class="inv-name">${escapeHtml(entry.name)}</span>${entry.count ? `<span class="inv-count">${escapeHtml(entry.count)}</span>` : ""}
            ${armed ? `<button class="inv-chip-remove" type="button" data-remove-inv-chip="${escapeAttribute(token)}" aria-label="删除${escapeAttribute(entry.name)}">×</button>` : ""}
          </span>
        `;
      }).join("");
    }

    function renderInvIcon(name) {
      const fileName = iconFiles[name];
      if (fileName) {
        return `<img src="${iconUrl(fileName)}" alt="" onerror="this.replaceWith(fallbackIcon('${escapeAttribute(name)}'))" />`;
      }
      return `<span class="fallback-icon">${escapeHtml(name.slice(0, 1))}</span>`;
    }

    function getToolIconName(tool, level) {
      if (level === "初始") return tool.name;
      if (tool.id === "rod") {
        if (level === "训练") return "训练渔竿";
        if (level === "玻璃纤维") return "玻璃纤维渔竿";
        return "铱渔竿";
      }
      return `${level}${tool.name}`;
    }

    function goalIconName(goal) {
      if (goal.iconName) return goal.iconName;
      const title = goal.title || "";
      if (title.startsWith("做")) return title.slice(1);
      if (title.startsWith("建")) return title.slice(1);
      if (title.startsWith("升级")) return title.slice(2);
      return title;
    }

    function renderGoalIcon(goal) {
      const name = goalIconName(goal);
      if (name && iconFiles[name]) return renderInvIcon(name);
      return `<span>${escapeHtml(goal.emoji || "🎯")}</span>`;
    }

    function setInvQty(name, qty, options = {}) {
      qty = Math.max(0, parseInt(qty) || 0);
      if (qty === 0) {
        delete appState.inventory[name];
        if (appState.pendingInventoryDelete === `inventory:${name}`) appState.pendingInventoryDelete = "";
      }
      else appState.inventory[name] = qty;
      syncBundleChecksFromInventory();
      renderApp();
      if (!options.skipModalRefresh && document.getElementById("invModalBody")) renderInvTab();
    }

    function removeInventorySummaryEntry(token) {
      const [type, ...rest] = String(token || "").split(":");
      const key = rest.join(":");
      if (!type || !key) return;

      if (type === "inventory") delete appState.inventory[key];
      if (type === "tool") delete appState.tools[key];
      if (type === "equipment") delete appState.equipment[key];
      if (type === "building") delete appState.buildings[key];

      appState.pendingInventoryDelete = "";
      syncBundleChecksFromInventory();
      renderApp();
      if (document.getElementById("invModalBody")) renderInvTab();
    }

    /* ── 联动：背包变化 → 自动勾选/取消勾选献祭 ── */
    function syncBundleChecksFromInventory() {
      let changed = false;
      flatItems.forEach(entry => {
        const name = entry.name;
        const need = entry.count || 1;
        const have = appState.inventory[name] || 0;
        const shouldBeChecked = have >= need;
        const isCheckedNow = isChecked(entry.uid);
        // 只在背包驱动的情况下自动勾选
        if (shouldBeChecked && !isCheckedNow) {
          state.checked.add(entry.uid);
          changed = true;
        }
        // 不主动取消，因为玩家可能已经把物品交给收集包
      });
      if (changed) {
        saveCheckedItems();
        // 如果献祭overlay开着，刷新它
        if (!document.getElementById("bundle-overlay").hidden) {
          render();
        }
      }
    }

    /* ── 智能建议 ── */
    function renderSuggestions() {
      const sugs = [];
      // 1. 现有作物的加工建议
      Object.entries(appState.inventory).forEach(([name, qty]) => {
        if (qty === 0) return;
        const procs = PROCESS_MAP[name];
        if (procs && procs.length > 0) {
          const best = procs[0];
          const sell = SELL_PRICES[name];
          if (sell && best.price > sell) {
            sugs.push({
              kind: "recommend",
              title: `${name} ×${qty}`,
              desc: `${best.method}加工成${best.out}更赚`,
              value: `${sell}g→${best.price}g, ${best.gain}`
            });
          }
        }
      });
      // 2. 接近完成的目标
      appState.goals.forEach(goal => {
        const tpl = findGoalTemplate(goal.id);
        if (!tpl) return;
        const total = tpl.steps.length;
        const done = tpl.steps.filter(s => {
          const have = s.invKey ? (appState.inventory[s.invKey] || 0) : 0;
          return s.invNeed && have >= s.invNeed;
        }).length;
        const remaining = tpl.steps.filter(s => {
          const have = s.invKey ? (appState.inventory[s.invKey] || 0) : 0;
          return s.invKey && s.invNeed && have < s.invNeed;
        });
        if (done > 0 && remaining.length > 0 && remaining.length <= 2) {
          const need = remaining.map(s => `${s.invKey}×${s.invNeed - (appState.inventory[s.invKey] || 0)}`).join("、");
          sugs.push({ kind: "goal", text: `「${tpl.title}」差 ${need} 就能完成` });
        }
      });
      // 2.5 没在目标里的模板可加入（基于背包反推）
      function recommendGoal(id) {
        if (appState.goals.some(g => g.id === id)) return null;
        const tpl = findGoalTemplate(id);
        return tpl ? id : null;
      }
      // 3. 反推下一步建筑/设备/工具（带 goalId 可一键加入）
      const tryRec = (cond, goalId, text) => {
        if (!cond) return;
        const canAdd = goalId && !appState.goals.some(g => g.id === goalId);
        sugs.push({ kind: "bundle", text, addGoalId: canAdd ? goalId : null });
      };
      tryRec(appState.buildings.coop && !appState.buildings.silo, "build-silo",
        `已有鸡舍但没建筒仓 → 推荐先建筒仓以储存干草（鸡舍前建更划算）`);
      tryRec(appState.buildings.coop && !appState.buildings.barn, "build-barn",
        `有鸡舍了，可以考虑建畜棚扩展畜牧业`);
      const px = appState.tools.pickaxe;
      tryRec(px === "铜", "upgrade-pickaxe-steel", `铜镐已有 → 下一步升级钢镐（到矿洞40层挖铁）`);
      const ax = appState.tools.axe;
      tryRec(ax === "铜", "upgrade-axe-steel", `铜斧已有 → 升级钢斧可以砍硬木`);
      tryRec(appState.equipment.preserves_jar > 0 && !appState.equipment.keg, "craft-keg",
        `有罐头瓶但没小桶 → 耕种8级后做小桶（水果做酒收益更高）`);
      tryRec((appState.equipment.bee_house || 0) === 0 && (appState.tools.hoe || appState.equipment.preserves_jar > 0), "craft-bee-house",
        `还没蜂房 → 蜂房性价比极高，旁边种花做花蜜赚钱`);
      tryRec((appState.buildings.coop || appState.buildings.barn) && !appState.equipment.mayonnaise_machine, "craft-mayo-machine",
        `有动物棚但没蛋黄酱机 → 推荐做蛋黄酱机（鸡蛋加工翻倍）`);
      tryRec((appState.inventory["小麦"] || 0) >= 10 && !appState.buildings.mill, "build-mill",
        `小麦${appState.inventory["小麦"] || 0}个 → 建磨坊可磨成面粉（解锁烹饪配方）`);
      tryRec((appState.inventory["羊毛"] || 0) > 0 && !appState.equipment.loom, null,
        `有羊毛但没织布机 → 织布机可把羊毛做成布料（+58%）`);
      // 4. 提示献祭物品
      const bundleHints = [];
      flatItems.forEach(entry => {
        if (isChecked(entry.uid)) return;
        const have = appState.inventory[entry.name] || 0;
        const need = entry.count || 1;
        if (have > 0 && have < need) {
          // 已经在路上
        } else if (have >= need) {
          // 已经够了（会自动勾选）
        }
      });

      const div = document.getElementById("invSuggestions");
      const countEl = document.getElementById("suggestionsCount");
      if (sugs.length === 0) {
        const isEmptyInv = Object.keys(appState.inventory).filter(k => appState.inventory[k] > 0).length === 0;
        div.innerHTML = `<div class="inv-empty">${isEmptyInv ? "录入物品后显示加工建议、目标推荐和下一步策略。" : "暂时没有建议。继续录入更多物品试试～"}</div>`;
        if (countEl) countEl.textContent = "";
        return;
      }
      if (countEl) countEl.textContent = `${sugs.length} 条`;
      div.innerHTML = sugs.slice(0, 10).map(s => {
        const label = s.kind === "recommend" ? "加工" : s.kind === "goal" ? "目标" : "推荐";
        let title = s.title || s.text || "";
        let desc = s.desc || "";
        if (!s.title && !s.desc) {
          const colonIndex = title.indexOf("：");
          const arrowIndex = title.indexOf(" → ");
          if (colonIndex > -1) {
            desc = title.slice(colonIndex + 1);
            title = title.slice(0, colonIndex);
          } else if (arrowIndex > -1) {
            desc = title.slice(arrowIndex + 3);
            title = title.slice(0, arrowIndex);
          }
        }
        const value = s.value ? `<span class="inv-suggestion-value">${escapeHtml(s.value).replaceAll("\n", " ")}</span>` : "";
        const descLine = desc ? `<span class="inv-suggestion-desc">${escapeHtml(desc)}</span>` : "";
        const action = s.addGoalId ? `<button class="sug-add-btn" data-add-goal-sug="${s.addGoalId}" title="加入目标">+</button>` : "";
        return `
          <div class="inv-suggestion ${s.addGoalId ? "actionable" : ""} ${s.value ? "has-value" : ""}">
            <span class="badge ${s.kind}">${label}</span>
            <span class="inv-suggestion-copy">
              <span class="inv-suggestion-title">${escapeHtml(title)}</span>
              ${descLine}
            </span>
            ${value}
            ${action}
          </div>
        `;
      }).join("");
    }

    /* ── 物品查询（覆盖所有物品/设备/建筑/加工产物） ── */
    function renderLookup(q) {
      const div = document.getElementById("lookupResult");
      q = (q || "").trim();
      if (!q) { div.innerHTML = ""; return; }
      // 汇总所有候选
      const all = new Set();
      INV_CATEGORIES.forEach(c => c.items.forEach(n => all.add(n)));
      EQUIPMENT.forEach(e => all.add(e.name));
      BUILDINGS.forEach(b => all.add(b.name));
      Object.keys(SELL_PRICES).forEach(n => all.add(n));
      Object.keys(PROCESS_MAP).forEach(n => all.add(n));
      const matches = [...all].filter(n => {
        if (!n.includes(q)) return false;
        return SELL_PRICES[n] != null || (PROCESS_MAP[n] || []).length > 0;
      }).slice(0, 8);
      if (matches.length === 0) {
        div.innerHTML = `<div style="padding:10px;color:var(--muted);font-size:13px;">没有「${escapeHtml(q)}」的售价或加工建议</div>`;
        return;
      }
      div.innerHTML = matches.map(name => {
        const sell = SELL_PRICES[name];
        const procs = PROCESS_MAP[name] || [];
        const rows = [];
        if (sell != null) rows.push(`<div class="decision-row">💰 直接卖 <span class="decision-price">${sell}g</span></div>`);
        procs.forEach((p, i) => {
          rows.push(`<div class="decision-row ${i === 0 ? "best" : ""}">${p.method} → ${p.out} <span style="color:var(--muted);font-size:11px;">${p.gain}</span>${i === 0 ? ' <span class="badge">最优</span>' : ""}<span class="decision-price">${p.price}g</span></div>`);
        });
        if (rows.length === 0) return "";
        return `<div style="margin-bottom:8px;padding:8px;background:#fffdf6;border:1.5px solid #e2d0aa;border-radius:8px;">
          <div style="display:flex;align-items:center;gap:8px;font-weight:900;margin-bottom:6px;">${renderInvIcon(name)}${escapeHtml(name)}</div>
          ${rows.join("")}
        </div>`;
      }).join("");
    }

    /* ── 录入浮层 ── */
    let currentInvTab = "crop";
    function openInventoryModal() {
      document.body.classList.add("modal-open");
      const modal = document.createElement("div");
      modal.className = "modal-backdrop";
      modal.id = "invModal";
      modal.innerHTML = `
        <div class="modal-sheet">
          <div class="modal-grip"></div>
          <div class="modal-head">
            <h3 class="modal-title">🎒 录入背包</h3>
            <button class="modal-close" onclick="closeInvModal()">×</button>
          </div>
          <div class="item-cat-tabs" id="invTabs">
            ${INV_CATEGORIES.map(c => `<button class="item-cat-tab ${c.id === currentInvTab ? "active" : ""}" data-cat-tab="${c.id}">${c.label}</button>`).join("")}
            <button class="item-cat-tab" data-cat-tab="_tools">🔨 工具</button>
            <button class="item-cat-tab" data-cat-tab="_equipment">🏭 设备</button>
            <button class="item-cat-tab" data-cat-tab="_buildings">🏡 建筑</button>
          </div>
          <div id="invModalBody"></div>
        </div>
      `;
      modal.addEventListener("click", e => {
        if (e.target === modal) { closeInvModal(); return; }
        if (handleInventoryModalClick(e)) {
          e.preventDefault();
          e.stopPropagation();
        }
      });
      document.body.appendChild(modal);
      attachSheetSwipe(modal, closeInvModal);
      renderInvTab();
    }
    function closeInvModal() {
      const m = document.getElementById("invModal");
      if (m) m.remove();
      closeQtyPopover();
      document.body.classList.remove("modal-open");
    }
    function handleInventoryModalClick(e) {
      const catTab = e.target.closest("[data-cat-tab]");
      if (catTab) {
        currentInvTab = catTab.dataset.catTab;
        document.querySelectorAll("[data-cat-tab]").forEach(b => b.classList.toggle("active", b === catTab));
        renderInvTab();
        return true;
      }

      const invStep = e.target.closest("[data-inv-step]");
      if (invStep) {
        const [name, delta] = invStep.dataset.invStep.split("|");
        const cur = appState.inventory[name] || 0;
        const v = Math.max(0, cur + parseInt(delta));
        setInvQty(name, v, { skipModalRefresh: true });
        updateVisibleInvTile(name, v);
        requestAnimationFrame(() => updateVisibleInvTile(name, appState.inventory[name] || 0));
        return true;
      }

      const itemTile = e.target.closest("[data-add-inv]");
      if (itemTile) {
        openQtyPopover(itemTile.dataset.addInv, itemTile);
        return true;
      }

      const equipStep = e.target.closest("[data-equip-step]");
      if (equipStep) {
        const [id, delta] = equipStep.dataset.equipStep.split("|");
        const cur = appState.equipment[id] || 0;
        const v = Math.max(0, cur + parseInt(delta));
        if (v === 0) delete appState.equipment[id];
        else appState.equipment[id] = v;
        renderApp();
        renderInvTab();
        return true;
      }

      const bldTile = e.target.closest("[data-toggle-bld]");
      if (bldTile) {
        const id = bldTile.dataset.toggleBld;
        if (appState.buildings[id]) delete appState.buildings[id];
        else appState.buildings[id] = true;
        renderApp();
        renderInvTab();
        return true;
      }

      const toolBtn = e.target.closest("[data-set-tool]");
      if (toolBtn) {
        const [tid, lv] = toolBtn.dataset.setTool.split("|");
        if (lv === "初始") delete appState.tools[tid];
        else appState.tools[tid] = lv;
        renderApp();
        renderInvTab();
        return true;
      }

      return false;
    }
    function renderInvTab() {
      const body = document.getElementById("invModalBody");
      if (!body) return;
      if (currentInvTab === "_tools") { body.innerHTML = renderToolsTabOnly(); return; }
      if (currentInvTab === "_equipment") { body.innerHTML = renderEquipTabOnly(); return; }
      if (currentInvTab === "_buildings") { body.innerHTML = renderBuildingsTabOnly(); return; }
      const cat = INV_CATEGORIES.find(c => c.id === currentInvTab);
      if (!cat) return;
      body.innerHTML = `<div class="item-grid">${cat.items.map(name => {
        const qty = appState.inventory[name] || 0;
        return `<div class="item-tile ${qty > 0 ? "has" : ""}" data-inv-name="${escapeAttribute(name)}">
          <div class="item-tile-icon">${renderInvIcon(name)}</div>
          <span class="item-tile-name">${escapeHtml(name)}</span>
          <div class="item-tile-ctrl">
            <button class="item-tile-btn minus" data-inv-step="${escapeAttribute(name)}|-1" type="button">−</button>
            <span class="item-tile-num">${qty}</span>
            <button class="item-tile-btn plus" data-inv-step="${escapeAttribute(name)}|+1" type="button">+</button>
          </div>
        </div>`;
      }).join("")}</div>`;
    }
    function updateVisibleInvTile(name, qty) {
      const body = document.getElementById("invModalBody");
      if (!body) return;
      body.querySelectorAll("[data-inv-name]").forEach(tile => {
        if (tile.dataset.invName !== name) return;
        tile.classList.toggle("has", qty > 0);
        const num = tile.querySelector(".item-tile-num");
        if (num) num.textContent = qty;
      });
    }

    /* 设备 - +/- 加减 */

          <div class="item-tile-ctrl">
            <button class="item-tile-btn minus" data-equip-step="${e.id}|-1" type="button">−</button>
            <span class="item-tile-num">${qty}</span>
            <button class="item-tile-btn plus" data-equip-step="${e.id}|+1" type="button">+</button>
          </div>

          <div class="item-tile-icon">${renderInvIcon(b.name)}</div>

    /* ── 数量编辑弹窗 - 居中紧凑 ── */
    let qtyPop = null;
    function openQtyPopover(name, anchor) {
      closeQtyPopover();
      const current = appState.inventory[name] || 0;
      // 默认值：当前没有时默认 1
      const initialValue = current === 0 ? 1 : current;
      const hint = getItemHint(name);
      qtyPop = document.createElement("div");
      qtyPop.className = "qty-backdrop";
      qtyPop.innerHTML = `
        <div class="qty-popover">
          <div class="qty-title">${renderInvIcon(name)}<span>${escapeHtml(name)}</span></div>
          ${hint ? `<div class="qty-hint">${hint}</div>` : ""}
          <div class="qty-row">
            <button class="qty-btn minus" data-qty="-10">−10</button>
            <button class="qty-btn minus" data-qty="-1">−</button>
            <input class="qty-input" id="qtyInput" type="number" min="0" value="${initialValue}" />
            <button class="qty-btn plus" data-qty="+1">+</button>
            <button class="qty-btn plus" data-qty="+10">+10</button>
          </div>
          <div class="qty-row">
            <button class="qty-btn plus" data-qty="+50">+50</button>
            <button class="qty-btn plus" data-qty="+100">+100</button>
            <button class="qty-btn minus" data-qty="clear">归零</button>
          </div>
          <div class="qty-actions">
            <button class="qty-cancel" data-qty="cancel">取消</button>
            <button class="qty-confirm" data-qty="confirm">确定</button>
          </div>
        </div>
      `;
      qtyPop.addEventListener("click", e => { if (e.target === qtyPop) closeQtyPopover(); });
      document.body.appendChild(qtyPop);
      qtyPop.dataset.itemName = name;
      const input = qtyPop.querySelector("#qtyInput");
      input.focus();
      input.select();
    }
    function closeQtyPopover() {
      if (qtyPop) { qtyPop.remove(); qtyPop = null; }
    }
    /* 物品处置提示生成（在数量弹窗里看到） */
    function getItemHint(name) {
      const sell = SELL_PRICES[name];
      const procs = PROCESS_MAP[name];
      if (!sell && !procs) return null;
      const parts = [];
      if (procs && procs.length > 0) {
        const best = procs[0];
        if (sell && best.price > sell) {
          parts.push(`<b>${best.method}</b>加工成 ${best.out} <b>${best.price}g</b>（直卖${sell}g · ${best.gain}）`);
        } else {
          parts.push(`${best.method} → ${best.out} <b>${best.price}g</b>`);
        }
      } else if (sell) {
        parts.push(`直接卖 <b>${sell}g</b>`);
      }
      return parts.join("");
    }
    function handleQtyAction(act) {
      if (!qtyPop) return;
      const input = qtyPop.querySelector("#qtyInput");
      const name = qtyPop.dataset.itemName;
      if (act === "cancel") { closeQtyPopover(); return; }
      if (act === "confirm") {
        setInvQty(name, parseInt(input.value) || 0);
        closeQtyPopover();
        renderInvTab();
        return;
      }
      if (act === "clear") { input.value = "0"; return; }
      const delta = parseInt(act);
      if (!isNaN(delta)) {
        let v = (parseInt(input.value) || 0) + delta;
        if (v < 0) v = 0;
        input.value = v;
      }
    }

    /* ── 添加目标浮层 ── */
    let expandedGoalTileId = null;
    function openAddGoalModal() {
      document.body.classList.add("modal-open");
      expandedGoalTileId = null;
      const modal = document.createElement("div");
      modal.className = "modal-backdrop";
      modal.id = "addGoalModal";
      modal.innerHTML = `
        <div class="modal-sheet">
          <div class="modal-grip"></div>
          <div class="modal-head">
            <h3 class="modal-title">🎯 添加目标 <span style="font-weight:600;font-size:11px;color:var(--muted);margin-left:4px;">点击查看材料</span></h3>
            <button class="modal-close" onclick="closeAddGoalModal()">×</button>
          </div>
          <div id="addGoalBody">${renderAddGoalContent()}</div>
        </div>
      `;
      modal.addEventListener("click", e => { if (e.target === modal) closeAddGoalModal(); });
      document.body.appendChild(modal);
      attachSheetSwipe(modal, closeAddGoalModal);
    }
    function renderAddGoalContent() {
      return GOAL_TEMPLATES.map(cat => `
        <div style="margin-bottom:13px;">
          <div style="font-weight:900;font-size:13px;margin-bottom:5px;color:var(--wood-dark);">${escapeHtml(cat.cat)}</div>
          <div class="goal-tile-grid">
            ${cat.goals.map(g => {
              const exists = appState.goals.some(x => x.id === g.id);
              const isExpanded = expandedGoalTileId === g.id;
              return `
                <div class="goal-tile-wrap ${exists ? "has" : ""}">
                  <div class="goal-tile">
                    <button class="goal-tile-main" data-toggle-goal-tile="${g.id}" type="button">
                      <span class="tool-icon">${renderGoalIcon(g)}</span>
                      <span class="tool-name">${escapeHtml(g.title)}</span>
                    </button>
                    ${exists
                      ? `<span class="tool-level goal-tile-status">✓ 已加</span>`
                      : `<button class="goal-tile-add" data-add-goal="${g.id}" type="button" aria-label="加入${escapeAttribute(g.title)}">+</button>`}
                  </div>
                  ${isExpanded ? `
                    <div class="goal-tile-detail">
                      ${g.note ? `<div class="goal-tile-note">${escapeHtml(g.note)}</div>` : ""}
                      ${g.steps.map(s => {
                        const have = s.invKey ? (appState.inventory[s.invKey] || 0) : 0;
                        const enough = s.invNeed && have >= s.invNeed;
                        return `<div class="goal-tile-step ${enough ? "ok" : ""}">
                          <span style="flex-shrink:0;">${enough ? "✓" : "·"}</span>
                          <span style="flex:1;">${escapeHtml(s.label)}${s.sub ? `<span class="have"> — ${escapeHtml(s.sub)}</span>` : ""}</span>
                          ${s.invKey && s.invNeed ? `<span class="have">背包${have}/${s.invNeed}</span>` : ""}
                        </div>`;
                      }).join("")}
                    </div>
                  ` : ""}
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `).join("");
    }
    function toggleGoalTileExpand(id) {
      expandedGoalTileId = expandedGoalTileId === id ? null : id;
      const body = document.getElementById("addGoalBody");
      if (body) body.innerHTML = renderAddGoalContent();
    }
    function closeAddGoalModal() {
      const m = document.getElementById("addGoalModal");
      if (m) m.remove();
      document.body.classList.remove("modal-open");
    }

    /* 左滑显示删除按钮，点击按钮才真删 */
    let _revealedGoalCard = null;
    function attachGoalSwipe(card, goalId) {
      let startX = 0, startY = 0, currentX = 0, currentY = 0;
      let isDragging = false;
      let direction = null;
      let baseX = 0; // 当前已显示删除按钮的位置：0 或 -80
      card.addEventListener("touchstart", (e) => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        currentX = startX;
        currentY = startY;
        isDragging = true;
        direction = null;
        baseX = card.classList.contains("revealed") ? -80 : 0;
        card.style.transition = "none";
      }, { passive: true });
      card.addEventListener("touchmove", (e) => {
        if (!isDragging) return;
        currentX = e.touches[0].clientX;
        currentY = e.touches[0].clientY;
        const dx = currentX - startX;
        const dy = currentY - startY;
        if (direction === null) {
          if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
            direction = (Math.abs(dx) > Math.abs(dy)) ? "horizontal" : "vertical";
            if (direction === "vertical") { isDragging = false; card.style.transform = baseX === -80 ? "translateX(-80px)" : ""; return; }
          } else { return; }
        }
        if (direction === "horizontal") {
          if (e.cancelable) e.preventDefault();
          const target = Math.max(-80, Math.min(0, baseX + dx));
          card.style.transform = "translateX(" + target + "px)";
        }
      }, { passive: false });
      const endHandler = () => {
        if (!isDragging) return;
        isDragging = false;
        const dx = currentX - startX;
        card.style.transition = "transform 0.2s ease";
        if (direction === "horizontal") {
          // 切换到 revealed 状态
          if (baseX === 0 && dx < -30) {
            card.classList.add("revealed");
            card.style.transform = "";
            if (_revealedGoalCard && _revealedGoalCard !== card) _revealedGoalCard.classList.remove("revealed");
            _revealedGoalCard = card;
          } else if (baseX === -80 && dx > 30) {
            card.classList.remove("revealed");
            card.style.transform = "";
            if (_revealedGoalCard === card) _revealedGoalCard = null;
          } else {
            card.style.transform = "";
          }
        }
        direction = null;
      };
      card.addEventListener("touchend", endHandler);
      card.addEventListener("touchcancel", endHandler);
    }
    function removeGoalSilent(id) {
      _revealedGoalCard = null;
      appState.goals = appState.goals.filter(g => g.id !== id);
      renderApp();
      toast("已移除目标");
    }
    /* 点击页面其他地方，收回已展开的删除按钮 */
    document.addEventListener("touchstart", (e) => {
      if (_revealedGoalCard && !_revealedGoalCard.closest(".goal-card-container").contains(e.target)) {
        _revealedGoalCard.classList.remove("revealed");
        _revealedGoalCard = null;
      }
    }, { passive: true });

    /* 浮窗下滑关闭手势 - 仅在 grip 触发，避免误触 */
    function attachSheetSwipe(modal, closeFn) {
      const sheet = modal.querySelector(".modal-sheet");
      const grip = modal.querySelector(".modal-grip");
      if (!sheet || !grip) return;
      let startY = 0, currentY = 0, isDragging = false;
      grip.addEventListener("touchstart", (e) => {
        startY = e.touches[0].clientY;
        currentY = startY;
        isDragging = true;
        sheet.style.transition = "none";
      }, { passive: true });
      grip.addEventListener("touchmove", (e) => {
        if (!isDragging) return;
        currentY = e.touches[0].clientY;
        const delta = currentY - startY;
        if (delta > 0) {
          if (e.cancelable) e.preventDefault();
          sheet.style.transform = "translateY(" + delta + "px)";
        }
      }, { passive: false });
      const onEnd = () => {
        if (!isDragging) return;
        isDragging = false;
        const delta = currentY - startY;
        sheet.style.transition = "transform 0.22s ease";
        if (delta > 60) {
          sheet.style.transform = "translateY(100%)";
          setTimeout(closeFn, 220);
        } else {
          sheet.style.transform = "";
        }
      };
      grip.addEventListener("touchend", onEnd);
      grip.addEventListener("touchcancel", onEnd);
    }

    /* ── Toast ── */
    let toastTimer = null;
    function toast(msg) {
      let t = document.getElementById("appToast");
      if (!t) {
        t = document.createElement("div");
        t.id = "appToast";
        t.style.cssText = "position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--wood);color:#fff7e8;padding:8px 18px;border-radius:999px;font-weight:900;z-index:200;font-size:13px;box-shadow:0 4px 14px rgba(0,0,0,0.2);";
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.display = "block";
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.style.display = "none"; }, 1700);
    }

    /* ── 献祭overlay切换 ── */
    /* ResizeObserver 监听所有 .room-scene，宽度从 0 → 非 0 时立刻触发原代码 layout */
    let _bundleResizeObs = null;
    function ensureBundleResizeObserver() {
      if (_bundleResizeObs) return;
      if (typeof ResizeObserver === "undefined") return;
      _bundleResizeObs = new ResizeObserver((entries) => {
        let anyHasWidth = false;
        for (const entry of entries) {
          if (entry.contentRect.width > 0) { anyHasWidth = true; break; }
        }
        if (anyHasWidth && typeof layoutMobileRoomVisuals === "function") {
          // 触发 reflow 后立刻 layout，再 raf 一次保险
          layoutMobileRoomVisuals();
          requestAnimationFrame(() => layoutMobileRoomVisuals());
        }
      });
    }
    function observeAllRoomScenes() {
      ensureBundleResizeObserver();
      if (!_bundleResizeObs) return;
      document.querySelectorAll(".bundle-overlay .room-scene").forEach((el) => {
        try { _bundleResizeObs.observe(el); } catch {}
      });
    }

    function openBundle() {
      const ov = document.getElementById("bundle-overlay");
      ov.hidden = false;
      // 强制 reflow，让浏览器真正开始计算 layout
      void ov.offsetHeight;
      window.scrollTo(0, 0);
      // 触发 window resize 让原代码自己响应（这是最准确的入口）
      window.dispatchEvent(new Event("resize"));
      // 重渲染献祭页面（背包可能变化了）
      render();
      // 重新 observe 所有 room-scene（render() 会把 DOM 重建）
      observeAllRoomScenes();
      // 兜底连续 5 次重试，覆盖 iOS Safari 的奇怪渲染时序
      if (typeof layoutMobileRoomVisuals === "function") {
        [16, 80, 200, 500, 1000, 1800].forEach((delay) => {
          setTimeout(() => {
            const anyScene = document.querySelector(".bundle-overlay .room-scene");
            if (anyScene && anyScene.clientWidth > 0) {
              layoutMobileRoomVisuals();
            }
          }, delay);
        });
      }
    }
    function closeBundle() {
      document.getElementById("bundle-overlay").hidden = true;
      window.scrollTo(0, 0);
    }

    /* ── 全局事件 ── */
    document.addEventListener("click", (e) => {
      // 季节切换
      const seasonBtn = e.target.closest("[data-season]");
      if (seasonBtn) { setSeason(seasonBtn.dataset.season); return; }
      // 天气
      if (e.target.closest("#weatherToggle")) { toggleWeather(); return; }
      // 日期±
      if (e.target.closest("#dayMinus")) { stepDay(-1); return; }
      if (e.target.closest("#dayPlus")) { stepDay(1); return; }
      // 建议中"+加入目标"按钮
      const sugAddBtn = e.target.closest("[data-add-goal-sug]");
      if (sugAddBtn) { addGoal(sugAddBtn.dataset.addGoalSug); return; }
      // 添加目标弹窗右侧"+"按钮
      const addGoalBtn = e.target.closest("[data-add-goal]");
      if (addGoalBtn && !addGoalBtn.disabled) { addGoal(addGoalBtn.dataset.addGoal); closeAddGoalModal(); return; }
      // 添加目标 tile 展开
      const goalTileToggle = e.target.closest("[data-toggle-goal-tile]");
      if (goalTileToggle) { toggleGoalTileExpand(goalTileToggle.dataset.toggleGoalTile); return; }
      // 当季任务-加入目标
      // 目标展开/折叠
      const toggleGoal = e.target.closest("[data-toggle-goal]");
      if (toggleGoal) { toggleGoalExpand(toggleGoal.dataset.toggleGoal); return; }
      // 目标步骤勾选
      const toggleStep = e.target.closest("[data-toggle-step]");
      if (toggleStep) {
        const [gid, idx] = toggleStep.dataset.toggleStep.split("|");
        toggleGoalStep(gid, parseInt(idx));
        return;
      }
      // 左滑后点删除
      const delBtn = e.target.closest("[data-delete-goal]");
      if (delBtn) { removeGoalSilent(delBtn.dataset.deleteGoal); return; }
      // (旧)移除目标按钮 - 已移除但保留兜底
      const removeBtn = e.target.closest("[data-remove-goal]");
      if (removeBtn) { removeGoal(removeBtn.dataset.removeGoal); return; }
      // 打开献祭
      if (e.target.closest("#openBundleBtn")) { openBundle(); return; }
      if (e.target.closest("#closeBundleBtn")) { closeBundle(); return; }
      // 打开录入
      if (e.target.closest("#openInventoryBtn")) { openInventoryModal(); return; }
      // 打开加目标
      if (e.target.closest("#openAddGoalBtn")) { openAddGoalModal(); return; }
      // 分类tab
      const catTab = e.target.closest("[data-cat-tab]");
      if (catTab) {
        currentInvTab = catTab.dataset.catTab;
        document.querySelectorAll("[data-cat-tab]").forEach(b => b.classList.toggle("active", b === catTab));
        renderInvTab();
        return;
      }
      // 物品 +/- 加减
      const invStep = e.target.closest("[data-inv-step]");
      if (invStep) {
        const [name, delta] = invStep.dataset.invStep.split("|");
        const cur = appState.inventory[name] || 0;
        const v = Math.max(0, cur + parseInt(delta));
        setInvQty(name, v, { skipModalRefresh: true });
        updateVisibleInvTile(name, v);
        requestAnimationFrame(() => updateVisibleInvTile(name, appState.inventory[name] || 0));
        return;
      }
      // 长按物品图标直接编辑（保留旧入口给少数情况）
      const itemTile = e.target.closest("[data-add-inv]");
      if (itemTile) {
        openQtyPopover(itemTile.dataset.addInv, itemTile);
        return;
      }
      // 数量编辑按钮
      const qtyBtn = e.target.closest("[data-qty]");
      if (qtyBtn) { handleQtyAction(qtyBtn.dataset.qty); return; }
      // 设备数量 +/-
      const equipStep = e.target.closest("[data-equip-step]");
      if (equipStep) {
        const [id, delta] = equipStep.dataset.equipStep.split("|");
        const cur = appState.equipment[id] || 0;
        const v = Math.max(0, cur + parseInt(delta));
        if (v === 0) delete appState.equipment[id];
        else appState.equipment[id] = v;
        renderApp();
        renderInvTab();
        return;
      }
      // 建筑勾选
      const bldTile = e.target.closest("[data-toggle-bld]");
      if (bldTile) {
        const id = bldTile.dataset.toggleBld;
        if (appState.buildings[id]) delete appState.buildings[id];
        else appState.buildings[id] = true;
        renderApp();
        renderInvTab();
        return;
      }
      // 工具等级
      const toolBtn = e.target.closest("[data-set-tool]");
      if (toolBtn) {
        const [tid, lv] = toolBtn.dataset.setTool.split("|");
        if (lv === "初始") delete appState.tools[tid];
        else appState.tools[tid] = lv;
        renderApp();
        renderInvTab();
        return;
      }
    });

    /* 微瑕修复：地图卡片任何位置点击都跳转，不勾选 */
    document.addEventListener("click", (e) => {
      const mapItem = e.target.closest(".map-item");
      if (!mapItem) return;
      e.preventDefault();
      const mapBundle = mapItem.closest(".map-bundle-node[data-bundle-id]");
      if (mapBundle) {
        activateBundleDetail(mapBundle.closest(".room"), mapBundle.dataset.bundleId);
      }
    }, true);

    /* 日期输入 */
    document.getElementById("dayInput").addEventListener("change", e => setDay(e.target.value));
    /* 物品查询 */
    document.getElementById("itemLookup").addEventListener("input", e => renderLookup(e.target.value));

    /* 启动 */
    renderApp();
    syncBundleChecksFromInventory();
  </script>

</body>
</html>
