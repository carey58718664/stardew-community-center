        throw new Error("当前浏览器不支持自动解压，请升级 Safari/Chrome 后再打开。也可以先用电脑打开本地 index.html。");

      const raw = atob(PAGE_GZIP_BASE64);
      const bytes = Uint8Array.from(raw, (char) => char.charCodeAt(0));
      const stream = new Response(bytes).body.pipeThrough(new DecompressionStream("gzip"));
      return await new Response(stream).text();
    }
    decodePage().then((html) => {
      document.open();
      document.write(html);
      document.close();
    }).catch((error) => {
      document.getElementById("status").innerHTML = `<h1>加载失败</h1><p>${error.message}</p>`;
    });
  </script>
</body>
</html>
