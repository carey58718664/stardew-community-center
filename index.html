ce:nowrap}.items{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px}.item{position:relative;display:grid;grid-template-columns:28px 1fr;gap:6px;align-items:center;min-height:46px;border:2px solid #e6d7b8;border-radius:8px;background:#fffaf0;padding:5px 7px 5px 5px;user-select:none}.item input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}.item.checked{border-color:#a9d6a6;background:#edf8e8}.item.highlight{outline:3px solid #2f6fb052;border-color:var(--blue)}.item.checked:after{content:"✓";position:absolute;right:5px;top:3px;color:var(--green);font-weight:950}.icoWrap{position:relative;width:28px;height:28px}.ico,.quality{image-rendering:pixelated;object-fit:contain}.ico{width:28px;height:28px}.quality{position:absolute;right:-5px;bottom:-5px;width:15px;height:15px}.fallback{display:grid;place-items:center;width:28px;height:28px;border-radius:6px;background:#f0dfbd;color:#6c4b28;font-weight:950}.txt{min-width:0;font-size:12px;font-weight:850;line-height:1.2}.name{overflow-wrap:anywhere}.num{display:inline-block;margin-top:2px;color:var(--red);font-size:11px;font-weight:950}.checked .name{color:#2a6c41;text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:#2d8a5f80}@media(max-width:980px){.hero,.top,.rooms{grid-template-columns:1fr}.actions{justify-content:flex-start}}@media(max-width:560px){.page{width:min(100% - 18px,1220px);padding-top:10px}.hero{padding:14px}.progress{grid-template-columns:1fr}.items{grid-template-columns:repeat(2,minmax(0,1fr))}}</style></head><body><main class="page"><header class="hero"><div><p class="kicker">Community Center Bundle Helper</p><h1>社区中心献祭助手</h1><p class="note">拿到物品先搜一下：马上知道它是否需要献祭、是否已经献过、要几个、献到哪个房间的哪个收集包。下面的房间分支按游戏里的结构展开，物品不用点开也能直接勾。</p></div><div class="actions"><button class="btn" id="showMissing">只看未完成</button><button class="btn" id="resetChecks">清空勾选</button></div></header><section class="top"><div class="panel"><h2 class="title">手里有什么？</h2><di Rabbit's Foot.png",'animal'),i('石榴','Pomegranate.png','crop')])]),rm('vault','💰','金库','完成任意鱼缸包后解锁','修复巴士→沙漠',[b('v25','2,500G 收集包','1选1','',[i('金币','Gold.png','money',2500,'','2,500G')]),b('v50','5,000G 收集包','1选1','',[i('金币','Gold.png','money',5000,'','5,000G')]),b('v100','10,000G 收集包','1选1','',[i('金币','Gold.png','money',10000,'','10,000G')]),b('v250','25,000G 收集包','1选1','总计: 42,500G',[i('金币','Gold.png','money',25000,'','25,000G')])])];const flat=[];rooms.forEach(r=>r.bundles.forEach(bu=>bu.items.forEach((it,k)=>{it.uid=`${r.id}:${bu.id}:${k}`;it.room=r.n;it.bundle=bu.n;flat.push(it)})));const $=s=>document.querySelector(s),esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])),norm=s=>String(s||'').toLowerCase().replace(/\s+/g,''),done=id=>E.checked.has(id),save=()=>localStorage.setItem(S,JSON.stringify([...E.checked])),url=f=>W+encodeURIComponent(f),label=it=>(it.show||`${it.q==='gold'?'金星':''}${it.n}${it.num>1?' ×'+it.num:''}`);function icon(it){return `<span class="icoWrap"><img class="ico" src="${url(it.f)}" alt="" loading="lazy" onerror="this.replaceWith(fallback('${esc(it.n)}'))">${it.q==='gold'?`<img class="quality" src="${url(G)}" alt="金星" loading="lazy">`:''}</span>`}function fallback(n){let s=document.createElement('span');s.className='fallback';s.textContent=String(n||'?').slice(0,1);return s}function render(){roomsEl();progress();results();visible();high()}function roomsEl(){$('#rooms').innerHTML=rooms.map(r=>{let c=r.bundles.reduce((a,bu)=>a+Math.min(bu.items.filter(x=>done(x.uid)).length,bu.need),0),t=r.bundles.reduce((a,bu)=>a+bu.need,0);return `<article class="room" data-room><header class="roomHead"><div><h2><span>${r.ico}</span><span>${esc(r.n)}</span></h2><p class="meta">${esc(r.u)} · 奖励：${esc(r.re)}</p></div><div class="badge">${c} / ${t}</div></header><div class="branches">${r.bundles.map(bu=>{let c=bu.items.filter(x=>done(x.uid)).length;return `<section class="bundle" data-bundle><header clas ).forEach(n=>n.classList.remove('highlight'));let q=norm(E.q);if(!q)return;flat.forEach(it=>{if(norm(`${it.n} ${it.show} ${it.q==='gold'?'金星'+it.n:''}`).includes(q))document.querySelector(`[data-card="${it.uid}"]`)?.classList.add('highlight')})}document.addEventListener('change',e=>{let x=e.target.closest('[data-id]');if(!x)return;x.checked?E.checked.add(x.dataset.id):E.checked.delete(x.dataset.id);save();render()});document.addEventListener('click',e=>{if(e.target.closest('#resetChecks')){if(confirm('确定要清空所有勾选吗？')){E.checked.clear();save();render()}}let m=e.target.closest('#showMissing');if(m){E.missing=!E.missing;m.textContent=E.missing?'显示全部':'只看未完成';visible()}let j=e.target.closest('[data-jump]');if(j){let n=document.querySelector(`[data-card="${j.dataset.jump}"]`);n?.scrollIntoView({behavior:'smooth',block:'center'});n?.classList.add('highlight')}if(e.target.closest('#clear')){$('#q').value='';E.q='';results();high()}});$('#q').addEventListener('input',e=>{E.q=e.target.value.trim();results();high()});render();</script></body></html>
