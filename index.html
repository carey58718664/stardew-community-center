<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社区中心献祭助手</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f0e8;
      --wood: #8a5a35;
      --wood-dark: #5f3a22;
      --paper: #fffaf0;
      --paper-deep: #f4e7c9;
      --ink: #2b2118;
      --muted: #746657;
      --line: #d8c59e;
      --green: #2d8a5f;
      --green-soft: #e8f6e8;
      --gold: #d89b2b;
      --blue: #2f6fb0;
      --red: #b84532;
      --shadow: 0 16px 38px rgba(76, 49, 29, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 250, 240, 0.82), rgba(243, 240, 232, 0.96)),
        repeating-linear-gradient(90deg, rgba(138, 90, 53, 0.035) 0 1px, transparent 1px 18px),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    [hidden] {
      display: none !important;
    }

    .page {
      width: min(1180px, calc(100% - 18px));
      margin: 0 auto;
      padding: 14px 0 34px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 10px;
      padding: 16px 18px;
      border: 2px solid var(--wood-dark);
      border-radius: 8px;
      background: linear-gradient(180deg, #a66f42, var(--wood));
      color: #fff7e8;
      box-shadow: var(--shadow);
    }

    .hero p,
    .hero h1 {
      margin: 0;
    }

    .hero-kicker {
      margin-bottom: 4px !important;
      font-size: 13px;
      font-weight: 800;
      color: #ffe0a2;
    }

    h1 {
      font-size: clamp(24px, 5vw, 40px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .hero-note {
      max-width: 800px;
      margin-top: 8px !important;
      color: #ffeacf;
      font-size: 14px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .button {
      min-height: 40px;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.16);
      color: #fff7e8;
      padding: 0 14px;
      font-weight: 800;
    }

    .button:hover {
      background: rgba(255, 250, 240, 0.24);
    }

    .assistant-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .search-panel,
    .progress-panel,
    .center-map-panel,
    .room-map {
      border: 1px solid #e8d8b8;
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.92);
      box-shadow: 0 10px 24px rgba(76, 49, 29, 0.08);
    }

    .search-panel {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 17px;
      font-weight: 900;
    }

    .search-panel .panel-title {
      margin: 0;
      white-space: nowrap;
    }

    .search-box {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      margin-bottom: 0;
    }

    .search-input {
      width: 100%;
      min-height: 42px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47, 111, 176, 0.16);
    }

    .clear-button {
      min-width: 44px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--paper-deep);
      color: var(--ink);
      font-weight: 900;
    }

    .search-button {
      min-width: 44px;
      border: 2px solid #d39c5f;
      border-radius: 8px;
      background: #f4c77f;
      color: #5f3a22;
      font-size: 20px;
      font-weight: 950;
    }

    .result-list {
      display: grid;
      gap: 8px;
      grid-column: 2 / 3;
      max-height: 178px;
      overflow: auto;
      padding-right: 3px;
    }

    .empty-state {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .result-card {
      border: 2px solid #e4d3ae;
      border-radius: 8px;
      background: #fffdf8;
      padding: 10px;
    }

    .result-card.done {
      border-color: #b8d6ad;
      background: var(--green-soft);
    }

    .result-head {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 6px;
    }

    .result-title {
      margin: 0;
      font-weight: 900;
    }

    .result-path {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status.need {
      background: #fff0d2;
      color: #9c620e;
    }

    .status.done {
      background: #dff3e4;
      color: #1c6f45;
    }

    .progress-panel {
      margin-bottom: 10px;
      padding: 12px;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .category {
      border: 1px solid #e2d0aa;
      border-radius: 8px;
      background: #fffdf8;
      padding: 9px;
    }

    .category-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 900;
    }

    .category-count {
      color: var(--muted);
      white-space: nowrap;
    }

    .bar {
      overflow: hidden;
      height: 10px;
      border-radius: 999px;
      background: #eadfc9;
    }

    .fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), var(--green));
      transition: width 0.2s ease;
    }

    .center-map-panel {
      margin-bottom: 10px;
      padding: 12px;
    }

    .center-map-frame {
      position: relative;
      overflow: hidden;
      border: 1px solid #e0c89b;
      border-radius: 8px;
      background: #fff6df;
      min-height: 280px;
    }

    .center-map-image {
      display: block;
      width: 100%;
      min-height: 280px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: saturate(1.02) contrast(1.02);
    }

    .center-room-pin {
      position: absolute;
      left: var(--x);
      top: var(--y);
      transform: translate(-50%, -50%);
      display: grid;
      gap: 2px;
      justify-items: center;
      max-width: 112px;
      text-align: center;
      color: #5c3b20;
      text-shadow: 0 1px 0 rgba(255, 250, 240, 0.9);
    }

    .center-room-pin span {
      border-radius: 7px;
      background: #c96d00;
      color: #fffaf0;
      padding: 2px 9px;
      font-size: 13px;
      font-weight: 950;
      box-shadow: 0 3px 8px rgba(76, 49, 29, 0.18);
    }

    .center-room-pin small {
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
    }

    .room-map {
      padding: 12px;
    }

    .rooms {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .room {
      position: relative;
      border: 1px solid #e8d8b8;
      border-radius: 8px;
      background: linear-gradient(180deg, #fffaf0, #f7ebd1);
      box-shadow: 0 12px 26px rgba(76, 49, 29, 0.1);
    }

    .room-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(138, 90, 53, 0.1);
    }

    .room-title {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 0 0 5px;
      font-size: 19px;
      font-weight: 950;
    }

    .room-meta {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .room-badge {
      color: var(--green);
      font-size: 13px;
      font-weight: 950;
      white-space: nowrap;
    }

    .room-body {
      display: grid;
      grid-template-columns: 1fr;
      padding: 10px;
    }

    .room-scene-card {
      min-width: 0;
      margin: 0;
      border: 2px solid #e1cea8;
      border-radius: 8px;
      background: #fffdf8;
      padding: 10px;
      overflow: hidden;
    }

    .room-scene {
      position: relative;
      overflow: hidden;
      min-height: 640px;
      aspect-ratio: 16 / 9.4;
      border: 2px solid #d9bf8b;
      border-radius: 8px;
      background:
        radial-gradient(ellipse at center, rgba(255, 229, 174, 0.22), transparent 58%),
        linear-gradient(180deg, rgba(255, 246, 220, 0.68), rgba(242, 217, 171, 0.54));
      isolation: isolate;
    }

    .room-scene::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(255, 242, 202, 0.18), rgba(138, 90, 53, 0.1));
      pointer-events: none;
    }

    .room-scene::after {
      content: "";
      position: absolute;
      inset: 12px;
      z-index: 1;
      border: 2px solid rgba(154, 104, 45, 0.34);
      border-radius: 8px;
      pointer-events: none;
    }

    .room-scene-bg {
      position: absolute;
      inset: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      opacity: 0.72;
      filter: saturate(0.98) contrast(1) brightness(1.02);
    }

    .room-scene .image-fallback {
      position: absolute;
      inset: 16px;
      z-index: -2;
      min-height: auto;
      opacity: 0.5;
    }

    .map-bundle-grid {
      position: absolute;
      inset: 22px;
      z-index: 3;
    }

    .map-bundle-node {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: clamp(220px, 30%, 370px);
      transform: translate(-50%, -50%);
      display: grid;
      align-content: center;
      gap: 6px;
      min-height: 128px;
      border: 2px solid rgba(197, 159, 97, 0.72);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.94);
      padding: 10px;
      color: #2b2118;
      box-shadow: 0 10px 18px rgba(76, 49, 29, 0.16);
    }

    .map-bundle-node.done {
      border-color: rgba(45, 138, 95, 0.74);
      background: rgba(232, 246, 232, 0.9);
    }

    .map-bundle-node[data-slot="a"] { box-shadow: inset 5px 0 0 #8f67cf, 0 10px 18px rgba(76, 49, 29, 0.16); }
    .map-bundle-node[data-slot="b"] { box-shadow: inset 5px 0 0 #389d62, 0 10px 18px rgba(76, 49, 29, 0.16); }
    .map-bundle-node[data-slot="c"] { box-shadow: inset 5px 0 0 #d88d32, 0 10px 18px rgba(76, 49, 29, 0.16); }
    .map-bundle-node[data-slot="d"] { box-shadow: inset 5px 0 0 #2f6fb0, 0 10px 18px rgba(76, 49, 29, 0.16); }
    .map-bundle-node[data-slot="e"] { box-shadow: inset 5px 0 0 #b84532, 0 10px 18px rgba(76, 49, 29, 0.16); }
    .map-bundle-node[data-slot="f"] { box-shadow: inset 5px 0 0 #6f4b22, 0 10px 18px rgba(76, 49, 29, 0.16); }

    .map-bundle-name {
      font-size: 15px;
      font-weight: 950;
      line-height: 1.18;
      text-align: center;
    }

    .map-bundle-meta {
      color: #7d674f;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .map-item-strip {
      display: grid;
      grid-template-columns: repeat(var(--item-cols), minmax(0, 1fr));
      gap: 5px;
      min-width: 0;
    }

    .map-bundle-node[data-bundle-id="animal"] .map-item-strip,
    .map-bundle-node[data-bundle-id="chef"] .map-item-strip,
    .map-bundle-node[data-bundle-id="dye"] .map-item-strip {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    .map-item {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 2px;
      min-width: 0;
      min-height: 54px;
      border: 1px solid #e4cda2;
      border-radius: 7px;
      background: rgba(255, 250, 240, 0.92);
      padding: 4px 3px;
      color: #2b2118;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .map-item:hover {
      border-color: #cda766;
      background: #fff6df;
    }

    .map-item.checked {
      border-color: #9ccc98;
      background: rgba(232, 246, 232, 0.96);
    }

    .map-item.highlight {
      outline: 3px solid rgba(47, 111, 176, 0.3);
      border-color: var(--blue);
    }

    .map-item input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .map-item.checked::after {
      content: "✓";
      position: absolute;
      right: 3px;
      bottom: 1px;
      color: var(--green);
      font-size: 13px;
      font-weight: 950;
    }

    .map-mini-icon {
      width: 25px;
      height: 25px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .map-mini-more {
      display: grid;
      place-items: center;
      min-width: 24px;
      height: 24px;
      border-radius: 6px;
      background: rgba(232, 208, 161, 0.8);
      color: #6f4b22;
      font-size: 10px;
      font-weight: 950;
    }

    .map-item-name {
      max-width: 100%;
      overflow: hidden;
      color: #4e3828;
      font-size: 10px;
      font-weight: 850;
      line-height: 1.12;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .map-item-count {
      color: var(--red);
      font-size: 9px;
      font-weight: 950;
      line-height: 1;
    }

    .map-item .icon-wrap {
      width: 26px;
      height: 26px;
    }

    .map-item .icon,
    .map-item .fallback-icon {
      width: 26px;
      height: 26px;
    }

    .map-item .quality {
      width: 13px;
      height: 13px;
    }

    .map-tree-lines {
      position: absolute;
      inset: 22px;
      z-index: 2;
      width: calc(100% - 44px);
      height: calc(100% - 44px);
      pointer-events: none;
    }

    .map-tree-lines line {
      stroke: rgba(255, 250, 240, 0.88);
      stroke-width: 1.6;
      stroke-linecap: round;
      filter: drop-shadow(0 1px 1px rgba(76, 49, 29, 0.4));
    }

    .map-room-core {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 4;
      transform: translate(-50%, -50%);
      min-width: 112px;
      border: 2px solid rgba(145, 97, 44, 0.5);
      border-radius: 999px;
      background: rgba(255, 250, 240, 0.92);
      color: #6f4b22;
      padding: 10px 16px;
      font-size: 18px;
      font-weight: 950;
      text-align: center;
      box-shadow: 0 8px 18px rgba(76, 49, 29, 0.12);
    }

    .image-fallback {
      display: grid;
      place-items: center;
      min-height: 74px;
      border: 2px dashed #d9bf8b;
      border-radius: 8px;
      background: #f5e7c9;
      color: #6f4b22;
      padding: 8px;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .visual-caption,
    .bundle-thumb-name {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .bundle-thumb-name {
      margin: 0;
      color: #6f4b22;
    }

    .branches {
      display: grid;
      gap: 10px;
    }

    .bundle {
      position: relative;
      border: 2px solid #e1cea8;
      border-radius: 8px;
      background: #fffdf8;
      padding: 10px;
    }

    .bundle[data-slot] {
      border-left-width: 6px;
    }

    .bundle[data-slot="a"] { border-left-color: #8f67cf; }
    .bundle[data-slot="b"] { border-left-color: #389d62; }
    .bundle[data-slot="c"] { border-left-color: #d88d32; }
    .bundle[data-slot="d"] { border-left-color: #2f6fb0; }
    .bundle[data-slot="e"] { border-left-color: #b84532; }
    .bundle[data-slot="f"] { border-left-color: #6f4b22; }

    .bundle::before {
      content: "";
      position: absolute;
      left: -10px;
      top: 18px;
      width: 9px;
      border-top: 2px solid #b8925d;
    }

    .bundle-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
      margin-bottom: 8px;
    }

    .bundle-title {
      margin: 0;
      font-size: 15px;
      font-weight: 950;
    }

    .bundle-sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .bundle-place {
      color: #8b5b25;
      font-weight: 900;
    }

    .bundle-rule {
      border-radius: 999px;
      background: #f1e2bf;
      color: #6f4b22;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      gap: 8px;
    }

    .item {
      position: relative;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 6px;
      align-items: center;
      min-height: 46px;
      border: 2px solid #e6d7b8;
      border-radius: 8px;
      background: #fffaf0;
      padding: 5px 7px 5px 5px;
      user-select: none;
    }

    .item:hover {
      border-color: #cda766;
    }

    .item.checked {
      border-color: #a9d6a6;
      background: #edf8e8;
    }

    .item.highlight {
      outline: 3px solid rgba(47, 111, 176, 0.32);
      border-color: var(--blue);
    }

    .item input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .icon-wrap {
      position: relative;
      width: 28px;
      height: 28px;
    }

    .icon {
      width: 28px;
      height: 28px;
      image-rendering: pixelated;
      object-fit: contain;
    }

    .quality {
      position: absolute;
      right: -5px;
      bottom: -5px;
      width: 15px;
      height: 15px;
      image-rendering: pixelated;
    }

    .fallback-icon {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: #f0dfbd;
      color: #6c4b28;
      font-size: 14px;
      font-weight: 950;
    }

    .item-text {
      min-width: 0;
      font-size: 12px;
      font-weight: 850;
      line-height: 1.2;
    }

    .item-name {
      overflow-wrap: anywhere;
    }

    .item-count {
      display: inline-block;
      margin-top: 2px;
      color: var(--red);
      font-size: 11px;
      font-weight: 950;
    }

    .item.checked .item-name {
      color: #2a6c41;
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: rgba(45, 138, 95, 0.5);
    }

    .item.checked::after {
      content: "✓";
      position: absolute;
      right: 5px;
      top: 3px;
      color: var(--green);
      font-size: 14px;
      font-weight: 950;
    }

    @media (max-width: 980px) {
      .hero,
      .assistant-panel,
      .rooms,
      .room-body {
        grid-template-columns: 1fr;
      }

      .hero-actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 520px) {
      .page {
        width: min(100% - 10px, 1220px);
        padding-top: 6px;
      }

      .hero {
        padding: 12px;
      }

      .search-panel {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .search-box,
      .result-list {
        grid-column: auto;
      }

      .progress-panel,
      .center-map-panel,
      .room-map {
        padding: 8px;
      }

      .progress-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 5px;
      }

      .category {
        padding: 6px 5px;
      }

      .category-top {
        display: grid;
        gap: 2px;
        margin-bottom: 5px;
        font-size: 10px;
      }

      .bar {
        height: 7px;
      }

      .center-map-frame,
      .center-map-image {
        min-height: 160px;
      }

      .center-room-pin span {
        padding: 1px 5px;
        font-size: 10px;
      }

      .center-room-pin small {
        font-size: 8px;
      }

      .items {

        }

        const result = event.target.closest("[data-jump-id]");
        if (result) {
          focusItem(result.dataset.jumpId);
        }

        if (event.target.closest("#jumpSearch")) {
          jumpToFirstSearchResult();
        }
      });

      document.getElementById("itemSearch").addEventListener("input", (event) => {
        state.query = event.target.value.trim();
        renderSearchResults();
        markHighlights();
      });

      document.getElementById("itemSearch").addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;
        jumpToFirstSearchResult();
      });

      document.getElementById("clearSearch").addEventListener("click", () => {
        state.query = "";
        document.getElementById("itemSearch").value = "";
        renderSearchResults();
        markHighlights();
      });
    }

    function handleImageError(event) {
      const image = event.target;
      if (!(image instanceof HTMLImageElement)) return;
      if (image.dataset.failed) return;
      image.dataset.failed = "true";
      if (image.classList.contains("quality")) {
        image.remove();
        return;
      }

      const label = image.dataset.fallback || image.alt || "图片暂不可用";
      const fallbackClass = image.classList.contains("map-mini-icon")
        ? "map-mini-more"
        : image.classList.contains("icon") ? "fallback-icon" : "image-fallback";
      image.replaceWith(fallbackNode(label, fallbackClass));
    }

    function render() {
      document.getElementById("rooms").innerHTML = rooms.map(renderRoom).join("");
      renderCenterMap();
      renderProgress();
      renderSearchResults();
      applyVisibility();
      markHighlights();
    }

    function renderRoom(roomData) {
      const checked = countCheckedInRoom(roomData);
      const total = roomData.bundles.reduce((sum, bundleData) => sum + bundleData.required, 0);
      return `
        <article class="room" data-room-id="${roomData.id}">
          <header class="room-header">
            <div>
              <h2 class="room-title"><span>${roomData.icon}</span><span>${escapeHtml(roomData.name)}</span></h2>
              <p class="room-meta">${escapeHtml(roomData.unlock)} · 奖励：${escapeHtml(roomData.reward)}</p>
            </div>
            <div class="room-badge">${checked} / ${total}</div>
          </header>
          <div class="room-body">
            ${renderRoomVisuals(roomData)}
          </div>
        </article>
      `;
    }

    function renderRoomVisuals(roomData) {
      const roomImage = roomImages[roomData.id];
      const mapLayout = getBundleMapLayout(roomData);
      const core = mapLayout.core;
      return `
          <figure class="room-scene-card">
            <div class="room-scene">
              ${roomImage ? renderExternalImage("room-scene-bg", roomImage, `${roomData.name}房间背景`) : renderImageFallback(`${roomData.name}房间背景`)}
              ${renderMapLines(mapLayout)}
              <div class="map-room-core" style="--x:${core.x}%;--y:${core.y}%">${escapeHtml(roomData.name)}</div>
              <div class="map-bundle-grid" data-count="${roomData.bundles.length}">
              ${roomData.bundles.map((bundleData, bundleIndex) => {
                const checked = bundleData.items.filter((entry) => isChecked(entry.uid)).length;
                const complete = checked >= bundleData.required;
                const done = Math.min(checked, bundleData.required);
                const slot = getSlot(bundleIndex);
                const point = mapLayout.points[bundleData.id] || { x: 50, y: 50 };
                return `
                  <div class="map-bundle-node ${complete ? "done" : ""}" data-bundle-id="${bundleData.id}" data-slot="${slot}" style="--x:${point.x}%;--y:${point.y}%" title="${escapeAttribute(bundleData.name)}">
                    <div class="map-bundle-name">${escapeHtml(bundleData.name)}</div>
                    ${renderMapBundleItems(bundleData)}
                    <div class="map-bundle-meta">${escapeHtml(bundleData.rule)} · ${done}/${bundleData.required}</div>
                  </div>
                `;
              }).join("")}
              </div>
            </div>
            <figcaption class="visual-caption">${escapeHtml(roomData.name)}房间位置与收集包分支</figcaption>
          </figure>
      `;
    }

    function renderExternalImage(className, fileName, alt) {
      return `<img class="${className}" src="${iconUrl(fileName)}" alt="${escapeAttribute(alt)}" loading="lazy" data-fallback="${escapeAttribute(alt)}" />`;
    }

    function getBundleMapLayout(roomData) {
      const configured = bundleLayoutByRoom[roomData.id];
      if (configured) return configured;

      const fallbackPoints = {};
      roomData.bundles.forEach((bundleData, index) => {
        fallbackPoints[bundleData.id] = {
          x: 20 + (index % 3) * 30,
          y: index < 3 ? 28 : 76
        };
      });
      return { core: { x: 50, y: 52 }, points: fallbackPoints };
    }

    function renderMapLines(layout) {
      const core = layout.core;
      return `
        <svg class="map-tree-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          ${Object.values(layout.points).map((point) => `<line x1="${core.x}" y1="${core.y}" x2="${point.x}" y2="${point.y}" />`).join("")}
        </svg>
      `;
    }

    function renderMapBundleItems(bundleData) {
      const columns = getMapItemColumns(bundleData.items.length);
      return `
        <div class="map-item-strip" style="--item-cols:${columns}">
          ${bundleData.items.map((entry) => renderMapItem(entry)).join("")}
        </div>
      `;
    }

    function renderMapItem(entry) {
      const checked = isChecked(entry.uid);
      const title = describeItem(entry);
      return `
        <label class="map-item ${checked ? "checked" : ""}" data-item-card="${entry.uid}" title="${escapeAttribute(title)}">
          <input type="checkbox" data-item-id="${entry.uid}" ${checked ? "checked" : ""} aria-label="${escapeAttribute(title)}" />
          ${renderIcon(entry)}
          <span class="map-item-name">${escapeHtml(entry.displayName || entry.name)}</span>
          ${entry.count > 1 && !entry.displayName ? `<span class="map-item-count">×${entry.count}</span>` : ""}
        </label>
      `;
    }

    function getMapItemColumns(count) {
      if (count <= 6) return Math.max(count, 1);
      if (count === 8 || count === 10 || count === 12) return count / 2;
      if (count === 9) return 3;
      return Math.min(6, Math.ceil(count / 2));
    }

    function renderImageFallback(label) {
      return `<span class="image-fallback">${escapeHtml(label)}</span>`;
    }

    function renderBundle(roomData, bundleData, bundleIndex) {
      const checked = bundleData.items.filter((entry) => isChecked(entry.uid)).length;
      const done = Math.min(checked, bundleData.required);
      const slot = getSlot(bundleIndex);
      return `
        <section class="bundle" data-bundle-id="${bundleData.id}" data-slot="${slot}">
          <header class="bundle-head">
            <div>
              <h3 class="bundle-title">${escapeHtml(bundleData.name)}</h3>
              <p class="bundle-sub"><span class="bundle-place">图示第 ${bundleIndex + 1} 项</span>${bundleData.reward ? ` · 奖励：${escapeHtml(bundleData.reward)}` : ""} · ${escapeHtml(roomData.name)}分支</p>
            </div>
            <div class="bundle-rule">${escapeHtml(bundleData.rule)} · ${done}/${bundleData.required}</div>
          </header>
          <div class="items">
            ${bundleData.items.map((entry) => renderItem(entry)).join("")}
          </div>
        </section>
      `;
    }

    function renderItem(entry) {
      const checked = isChecked(entry.uid);
      const title = describeItem(entry);
      return `
        <label class="item ${checked ? "checked" : ""}" data-item-card="${entry.uid}" title="${escapeAttribute(title)}">
          <input type="checkbox" data-item-id="${entry.uid}" ${checked ? "checked" : ""} aria-label="${escapeAttribute(title)}" />
          ${renderIcon(entry)}
          <span class="item-text">
            <span class="item-name">${escapeHtml(entry.displayName || entry.name)}</span>
            ${entry.count > 1 && !entry.displayName ? `<span class="item-count">×${entry.count}</span>` : ""}
          </span>
        </label>
      `;
    }

    function renderIcon(entry) {
      const fileName = iconFiles[entry.name] || iconFiles[entry.displayName] || "";
      const image = fileName
        ? `<img class="icon" src="${iconUrl(fileName)}" alt="" loading="lazy" onerror="this.replaceWith(fallbackIcon('${escapeAttribute(entry.name)}'))" />`
        : `<span class="fallback-icon">${escapeHtml((entry.name || "?").slice(0, 1))}</span>`;
      const quality = entry.quality && QUALITY_ICON[entry.quality]
        ? `<img class="quality" src="${iconUrl(QUALITY_ICON[entry.quality])}" alt="金星" loading="lazy" />`
        : "";
      return `<span class="icon-wrap">${image}${quality}</span>`;
    }

    function renderProgress() {
      const grid = document.getElementById("progressGrid");
      grid.innerHTML = categories.map(([key, label]) => {
        const entries = flatItems.filter((entry) => entry.category === key);
        const total = entries.length;
        const checked = entries.filter((entry) => isChecked(entry.uid)).length;
        const percent = total ? Math.round((checked / total) * 100) : 0;
        return `
          <div class="category">
            <div class="category-top">
              <span>${escapeHtml(label)}</span>
              <span class="category-count">${checked} / ${total}</span>
            </div>
            <div class="bar"><div class="fill" style="width:${percent}%"></div></div>
          </div>
        `;
      }).join("");
    }

    function renderCenterMap() {
      document.getElementById("centerMap").innerHTML = `
        ${renderExternalImage("center-map-image", CENTER_MAP_IMAGE, "社区中心整体地图")}
        ${centerRoomPins.map((pin) => `
          <div class="center-room-pin" style="--x:${pin.x}%;--y:${pin.y}%">
            <span>${escapeHtml(pin.name)}</span>
            <small>${escapeHtml(pin.note)}</small>
          </div>
        `).join("")}
      `;
    }

    function renderSearchResults() {
      const list = document.getElementById("resultList");
      if (!state.query) {
        list.innerHTML = `<p class="empty-state">输入物品名后，这里会显示它要献到哪里、需要几个、是否已经献过。</p>`;
        return;
      }

      const query = normalize(state.query);
      const matches = flatItems.filter((entry) => {
        const haystack = [
          entry.name,
          entry.displayName,
          entry.quality === "gold" ? `金星${entry.name}` : "",
          `${entry.name}×${entry.count}`,
          entry.roomName,
          entry.bundleName
        ].map(normalize).join(" ");
        return haystack.includes(query);
      });

      if (!matches.length) {
        list.innerHTML = `<p class="empty-state">这个物品不在当前献祭清单里，可以放心处理。</p>`;
        return;
      }

      list.innerHTML = matches.map((entry) => {
        const checked = isChecked(entry.uid);
        return `
          <article class="result-card ${checked ? "done" : ""}" data-jump-id="${entry.uid}">
            <div class="result-head">
              ${renderIcon(entry)}
              <div>
                <p class="result-title">${escapeHtml(describeItem(entry))}</p>
                <p class="result-path">${escapeHtml(entry.roomName)} → ${escapeHtml(entry.bundleName)}</p>
              </div>
              <span class="status ${checked ? "done" : "need"}">${checked ? "已献祭" : "要保留"}</span>
            </div>
          </article>
        `;
      }).join("");
    }

    function applyVisibility() {
      document.querySelectorAll("[data-bundle-id]").forEach((node) => {
        const hasMissing = Boolean(node.querySelector("[data-item-id]:not(:checked)"));
        node.hidden = state.showMissingOnly && !hasMissing;
      });

      document.querySelectorAll("[data-room-id]").forEach((node) => {
        const hasVisibleBundle = Boolean(node.querySelector("[data-bundle-id]:not([hidden])"));
        node.hidden = state.showMissingOnly && !hasVisibleBundle;
      });
    }

    function markHighlights() {
      document.querySelectorAll("[data-item-card]").forEach((node) => node.classList.remove("highlight"));
      if (!state.query) return;

      const query = normalize(state.query);
      flatItems.forEach((entry) => {
        const name = normalize(`${entry.name} ${entry.displayName} ${entry.quality === "gold" ? `金星${entry.name}` : ""}`);
        if (!name.includes(query)) return;
        const node = document.querySelector(`[data-item-card="${entry.uid}"]`);
        node?.classList.add("highlight");
      });
    }

    function focusItem(uid) {
      const node = document.querySelector(`[data-item-card="${uid}"]`);
      if (!node) return;
      node.scrollIntoView({ behavior: "smooth", block: "center" });
      node.classList.add("highlight");
    }

    function jumpToFirstSearchResult() {
      if (!state.query) return;
      const query = normalize(state.query);
      const match = flatItems.find((entry) => {
        const haystack = [
          entry.name,
          entry.displayName,
          entry.quality === "gold" ? `金星${entry.name}` : "",
          `${entry.name}×${entry.count}`,
          entry.roomName,
          entry.bundleName
        ].map(normalize).join(" ");
        return haystack.includes(query);
      });
      if (match) focusItem(match.uid);
    }

    function setChecked(uid, checked) {
      if (checked) {
        state.checked.add(uid);
      } else {
        state.checked.delete(uid);
      }
      saveCheckedItems();
      render();
    }

    function flattenItems() {
      const entries = [];
      rooms.forEach((roomData) => {
        roomData.bundles.forEach((bundleData) => {
          bundleData.items.forEach((entry, index) => {
            entry.uid = `${roomData.id}:${bundleData.id}:${index}`;
            entry.roomName = roomData.name;
            entry.bundleName = bundleData.name;
            entries.push(entry);
          });
        });
      });
      return entries;
    }

    function countCheckedInRoom(roomData) {
      return roomData.bundles.reduce((sum, bundleData) => {
        const checked = bundleData.items.filter((entry) => isChecked(entry.uid)).length;
        return sum + Math.min(checked, bundleData.required);
      }, 0);
    }

    function describeItem(entry) {
      const quality = entry.quality === "gold" ? "金星" : "";
      if (entry.displayName) return entry.displayName;
      return `${quality}${entry.name}${entry.count > 1 ? ` ×${entry.count}` : ""}`;
    }

    function isChecked(uid) {
      return state.checked.has(uid);
    }

    function md5(input) {
      function add32(a, b) {
        return (a + b) & 0xffffffff;
      }

      function cmn(q, a, b, x, s, t) {
        a = add32(add32(a, q), add32(x, t));
        return add32((a << s) | (a >>> (32 - s)), b);
      }

      function ff(a, b, c, d, x, s, t) {
        return cmn((b & c) | ((~b) & d), a, b, x, s, t);
      }

      function gg(a, b, c, d, x, s, t) {
        return cmn((b & d) | (c & (~d)), a, b, x, s, t);
      }

      function hh(a, b, c, d, x, s, t) {
        return cmn(b ^ c ^ d, a, b, x, s, t);
      }

      function ii(a, b, c, d, x, s, t) {
        return cmn(c ^ (b | (~d)), a, b, x, s, t);
      }

      function md5cycle(state, block) {
        let [a, b, c, d] = state;

        a = ff(a, b, c, d, block[0], 7, -680876936);
        d = ff(d, a, b, c, block[1], 12, -389564586);
        c = ff(c, d, a, b, block[2], 17, 606105819);
        b = ff(b, c, d, a, block[3], 22, -1044525330);
        a = ff(a, b, c, d, block[4], 7, -176418897);
        d = ff(d, a, b, c, block[5], 12, 1200080426);
        c = ff(c, d, a, b, block[6], 17, -1473231341);
        b = ff(b, c, d, a, block[7], 22, -45705983);
        a = ff(a, b, c, d, block[8], 7, 1770035416);
        d = ff(d, a, b, c, block[9], 12, -1958414417);
        c = ff(c, d, a, b, block[10], 17, -42063);
        b = ff(b, c, d, a, block[11], 22, -1990404162);
        a = ff(a, b, c, d, block[12], 7, 1804603682);
        d = ff(d, a, b, c, block[13], 12, -40341101);
        c = ff(c, d, a, b, block[14], 17, -1502002290);
        b = ff(b, c, d, a, block[15], 22, 1236535329);

        a = gg(a, b, c, d, block[1], 5, -165796510);
        d = gg(d, a, b, c, block[6], 9, -1069501632);
        c = gg(c, d, a, b, block[11], 14, 643717713);
        b = gg(b, c, d, a, block[0], 20, -373897302);
        a = gg(a, b, c, d, block[5], 5, -701558691);
        d = gg(d, a, b, c, block[10], 9, 38016083);
        c = gg(c, d, a, b, block[15], 14, -660478335);
        b = gg(b, c, d, a, block[4], 20, -405537848);
        a = gg(a, b, c, d, block[9], 5, 568446438);
        d = gg(d, a, b, c, block[14], 9, -1019803690);
        c = gg(c, d, a, b, block[3], 14, -187363961);
        b = gg(b, c, d, a, block[8], 20, 1163531501);
        a = gg(a, b, c, d, block[13], 5, -1444681467);
        d = gg(d, a, b, c, block[2], 9, -51403784);
        c = gg(c, d, a, b, block[7], 14, 1735328473);
        b = gg(b, c, d, a, block[12], 20, -1926607734);

        a = hh(a, b, c, d, block[5], 4, -378558);
        d = hh(d, a, b, c, block[8], 11, -2022574463);
        c = hh(c, d, a, b, block[11], 16, 1839030562);
        b = hh(b, c, d, a, block[14], 23, -35309556);
        a = hh(a, b, c, d, block[1], 4, -1530992060);
        d = hh(d, a, b, c, block[4], 11, 1272893353);
        c = hh(c, d, a, b, block[7], 16, -155497632);
        b = hh(b, c, d, a, block[10], 23, -1094730640);
        a = hh(a, b, c, d, block[13], 4, 681279174);
        d = hh(d, a, b, c, block[0], 11, -358537222);
        c = hh(c, d, a, b, block[3], 16, -722521979);
        b = hh(b, c, d, a, block[6], 23, 76029189);
        a = hh(a, b, c, d, block[9], 4, -640364487);
        d = hh(d, a, b, c, block[12], 11, -421815835);
        c = hh(c, d, a, b, block[15], 16, 530742520);
        b = hh(b, c, d, a, block[2], 23, -995338651);

        a = ii(a, b, c, d, block[0], 6, -198630844);
        d = ii(d, a, b, c, block[7], 10, 1126891415);
        c = ii(c, d, a, b, block[14], 15, -1416354905);
        b = ii(b, c, d, a, block[5], 21, -57434055);
        a = ii(a, b, c, d, block[12], 6, 1700485571);
        d = ii(d, a, b, c, block[3], 10, -1894986606);
        c = ii(c, d, a, b, block[10], 15, -1051523);
        b = ii(b, c, d, a, block[1], 21, -2054922799);
        a = ii(a, b, c, d, block[8], 6, 1873313359);
        d = ii(d, a, b, c, block[15], 10, -30611744);
        c = ii(c, d, a, b, block[6], 15, -1560198380);
        b = ii(b, c, d, a, block[13], 21, 1309151649);
        a = ii(a, b, c, d, block[4], 6, -145523070);
        d = ii(d, a, b, c, block[11], 10, -1120210379);
        c = ii(c, d, a, b, block[2], 15, 718787259);
        b = ii(b, c, d, a, block[9], 21, -343485551);

        state[0] = add32(a, state[0]);
        state[1] = add32(b, state[1]);
        state[2] = add32(c, state[2]);
        state[3] = add32(d, state[3]);
      }

      function md5blk(s) {
        const block = [];
        for (let i = 0; i < 64; i += 4) {
          block[i >> 2] = s.charCodeAt(i) +
            (s.charCodeAt(i + 1) << 8) +
            (s.charCodeAt(i + 2) << 16) +
            (s.charCodeAt(i + 3) << 24);
        }
        return block;
      }

      function md51(s) {
        let n = s.length;
        const state = [1732584193, -271733879, -1732584194, 271733878];
        let i;
        for (i = 64; i <= n; i += 64) {
          md5cycle(state, md5blk(s.substring(i - 64, i)));
        }
        s = s.substring(i - 64);
        const tail = Array(16).fill(0);
        for (i = 0; i < s.length; i++) {
          tail[i >> 2] |= s.charCodeAt(i) << ((i % 4) << 3);
        }
        tail[i >> 2] |= 0x80 << ((i % 4) << 3);
        if (i > 55) {
          md5cycle(state, tail);
          tail.fill(0);
        }
        tail[14] = n * 8;
        md5cycle(state, tail);
        return state;
      }

      function rhex(n) {
        const hex = "0123456789abcdef";
        let s = "";
        for (let j = 0; j < 4; j++) {
          s += hex[(n >> (j * 8 + 4)) & 0x0f] + hex[(n >> (j * 8)) & 0x0f];
        }
        return s;
      }

      return md51(input).map(rhex).join("");
    }

    function iconUrl(fileName) {
      const safeName = fileName.replaceAll(" ", "_");
      const hash = md5(safeName);
      return `${WIKI_FILE_BASE}${hash.slice(0, 1)}/${hash.slice(0, 2)}/${encodeURIComponent(safeName)}`;
    }

    function getSlot(index) {
      return ["a", "b", "c", "d", "e", "f"][index] || "f";
    }

    function fallbackIcon(name) {
      return fallbackNode(String(name || "?").slice(0, 1), "fallback-icon");
    }

    function fallbackNode(label, className) {
      const span = document.createElement("span");
      span.className = className;
      span.textContent = label;
      return span;
    }

    function normalize(value) {
      return String(value || "").toLowerCase().replace(/\s+/g, "");
    }

    function loadCheckedItems() {
      try {
        return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []);
      } catch {
        return new Set();
      }
    }

    function saveCheckedItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(state.checked)));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
