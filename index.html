<!doctype html>

<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌾 星露谷 · 牧场决策助手</title>
  <!-- v8: 统一手机端选项框视觉宽度，并压缩房间背景边框留出空间 -->
  <style>
:root {
      color-scheme: light;
      --bg: #f3f0e8;
      --wood: #8a5a35;
      --wood-dark: #5f3a22;
      --paper: #fffaf0;
      --paper-deep: #f4e7c9;
      --ink: #2b2118;
      --muted: #746657;
      --line: #d8c59e;
      --green: #2d8a5f;
      --green-soft: #e8f6e8;
      --gold: #d89b2b;
      --blue: #2f6fb0;
      --red: #b84532;
      --shadow: 0 16px 38px rgba(76, 49, 29, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 250, 240, 0.82), rgba(243, 240, 232, 0.96)),
        repeating-linear-gradient(90deg, rgba(138, 90, 53, 0.035) 0 1px, transparent 1px 18px),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    button,
    input { font: inherit; }
    button { cursor: pointer; }
    [hidden] { display: none !important; }

    .page {
      width: min(1180px, calc(100% - 18px));
      margin: 0 auto;
      padding: 14px 0 34px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 10px;
      padding: 16px 18px;
      border: 2px solid var(--wood-dark);
      border-radius: 8px;
      background: linear-gradient(180deg, #a66f42, var(--wood));
      color: #fff7e8;
      box-shadow: var(--shadow);
    }

    .hero p,
    .hero h1 { margin: 0; }

    .hero-kicker {
      margin-bottom: 4px !important;
      font-size: 13px;
      font-weight: 800;
      color: #ffe0a2;
    }

    h1 {
      font-size: clamp(24px, 5vw, 40px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .button {
      min-height: 40px;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.16);
      color: #fff7e8;
      padding: 0 14px;
      font-weight: 800;
    }

    .button:hover { background: rgba(255, 250, 240, 0.24); }

    .assistant-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .search-panel,
    .progress-panel,
    .center-map-panel,
    .room-map {
      border: 1px solid #e8d8b8;
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.92);
      box-shadow: 0 10px 24px rgba(76, 49, 29, 0.08);
    }

    .search-panel {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 17px;
      font-weight: 900;
    }

    .search-panel .panel-title {
      margin: 0;
      white-space: nowrap;
    }

    .search-box {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      margin-bottom: 0;
    }

    .search-input {
      width: 100%;
      min-height: 42px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47, 111, 176, 0.16);
    }

    .clear-button,
    .search-button {
      min-width: 44px;
      border-radius: 8px;
      font-weight: 950;
    }

    .clear-button {
      border: 2px solid var(--line);
      background: var(--paper-deep);
      color: var(--ink);
    }

    .search-button {
      border: 2px solid #d39c5f;
      background: #f4c77f;
      color: #5f3a22;
      font-size: 20px;
    }

    .result-list {
      display: grid;
      gap: 8px;
      grid-column: 2 / 3;
      max-height: 178px;
      overflow: auto;
      padding-right: 3px;
    }

    .empty-state {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .result-card {
      border: 2px solid #e4d3ae;
      border-radius: 8px;
      background: #fffdf8;
      padding: 10px;
    }

    .result-card.done {
      border-color: #b8d6ad;
      background: var(--green-soft);
    }

    .result-head {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 6px;
    }

    .result-title {
      margin: 0;
      font-weight: 900;
    }

    .result-path {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status.need { background: #fff0d2; color: #9c620e; }
    .status.done { background: #dff3e4; color: #1c6f45; }

    .progress-panel {
      margin-bottom: 10px;
      padding: 12px;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .category {
      border: 1px solid #e2d0aa;
      border-radius: 8px;
      background: #fffdf8;
      padding: 9px;
    }

    .category-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 900;
    }

    .category-count {
      color: var(--muted);
      white-space: nowrap;
    }

    .bar {
      overflow: hidden;
      height: 10px;
      border-radius: 999px;
      background: #eadfc9;
    }

    .fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), var(--green));
      transition: width 0.2s ease;
    }

    .center-map-panel {
      margin-bottom: 10px;
      padding: 10px;
    }

    .center-map-frame {
      position: relative;
      overflow: hidden;
      border: 1px solid #e0c89b;
      border-radius: 8px;
      background: #fff6df;
      min-height: 280px;
    }

    .center-map-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 246, 224, 0.08);
      pointer-events: none;
    }

    .center-map-image {
      display: block;
      width: 100%;
      min-height: 280px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: saturate(1.02) contrast(1.02);
    }

    .center-room-pin {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 2;
      width: 0;
      height: 0;
      color: #5c3b20;
    }

    .center-pin-label {
      position: absolute;
      left: var(--dx);
      top: var(--dy);
      transform: translate(-50%, -50%);
      display: grid;
      justify-items: center;
      min-width: 76px;
      border: 1px solid rgba(128, 92, 48, 0.28);
      border-radius: 11px;
      background: rgba(255, 252, 242, 0.9);
      padding: 4px 9px 5px;
      text-align: center;
      box-shadow: 0 6px 14px rgba(76, 49, 29, 0.16);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(1px);
    }

    .center-pin-name {
      color: #5f3518;
      font-size: 13px;
      font-weight: 950;
      line-height: 1.12;
    }

    .center-pin-note {
      color: #7b5a36;
      font-size: 10px;
      font-weight: 850;
      line-height: 1.15;
      white-space: nowrap;
    }

    .center-pin-line {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--line-l);
      height: 0;
      border-top: 1px solid rgba(112, 78, 42, 0.42);
      transform: translate(-50%, -50%) rotate(var(--line-a));
      transform-origin: left center;
      pointer-events: none;
    }

    .center-pin-dot {
      position: absolute;
      left: 0;
      top: 0;
      width: 9px;
      height: 9px;
      border: 2px solid rgba(255, 252, 242, 0.95);
      border-radius: 50%;
      background: #ba6b16;
      box-shadow: 0 2px 6px rgba(76, 49, 29, 0.3);
      transform: translate(-50%, -50%);
    }

    .room-map { padding: 12px; }

    .room-map-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 10px;
    }

    .room-map-head .panel-title {
      margin: 0;
      min-width: 0;
    }

    .room-clear-button {
      flex-shrink: 0;
      min-height: 30px;
      border: 2px solid #e4d3ae;
      border-radius: 8px;
      background: #fffdf8;
      color: #5f3a22;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }

    .room-clear-button:hover { background: #fff6df; }

    .rooms {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .room {
      position: relative;
      border: 1px solid #e8d8b8;
      border-radius: 8px;
      background: linear-gradient(180deg, #fffaf0, #f7ebd1);
      box-shadow: 0 12px 26px rgba(76, 49, 29, 0.1);
    }

    .room-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(138, 90, 53, 0.1);
    }

    .room-title {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 0 0 5px;
      font-size: 19px;
      font-weight: 950;
    }

    .room-meta {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .room-badge {
      color: var(--green);
      font-size: 13px;
      font-weight: 950;
      white-space: nowrap;
    }

    .room-body {
      display: grid;
      grid-template-columns: 1fr;
      padding: 10px;
    }

    .room-scene-card {
      min-width: 0;
      margin: 0;
      border: 1px solid #e5cfaa;
      border-radius: 20px;
      background: rgba(255, 252, 242, 0.92);
      padding: 10px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(80, 50, 20, 0.1);
    }

    .room-scene {
      position: relative;
      overflow: hidden;
      min-height: 640px;
      aspect-ratio: 16 / 9.8;
      border: 1px solid rgba(184, 143, 84, 0.5);
      border-radius: 18px;
      background:
        linear-gradient(rgba(255, 246, 224, 0.22), rgba(255, 246, 224, 0.22)),
        linear-gradient(180deg, rgba(255, 252, 242, 0.58), rgba(244, 226, 190, 0.42));
      box-shadow: inset 0 0 0 1px rgba(255, 252, 242, 0.55), 0 8px 22px rgba(80, 50, 20, 0.1);
      isolation: isolate;
    }

    .room-scene::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: rgba(255, 246, 224, 0.22);
      backdrop-filter: blur(0.4px);
      pointer-events: none;
    }

    .room-scene::after {
      content: "";
      position: absolute;
      inset: 14px;
      z-index: 1;
      border: 1px solid rgba(150, 112, 63, 0.24);
      border-radius: 16px;
      pointer-events: none;
    }

    .room-scene-bg {
      position: absolute;
      inset: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      opacity: 0.78;
      filter: blur(0.45px) saturate(0.95) brightness(0.96);
      transform: scale(1.01);
    }

    .room[data-room-id="fish"] .room-scene-bg,
    .room[data-room-id="boiler"] .room-scene-bg,
    .room[data-room-id="board"] .room-scene-bg,
    .room[data-room-id="vault"] .room-scene-bg {
      filter: blur(0.35px) saturate(1.03) brightness(0.98);
    }

    .room-scene .image-fallback {
      position: absolute;
      inset: 16px;
      z-index: -2;
      min-height: auto;
      opacity: 0.5;
    }

    .map-bundle-grid {
      position: absolute;
      inset: 18px;
      z-index: 3;
    }

    .map-bundle-node {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: clamp(250px, 32%, 390px);
      transform: translate(-50%, -50%);
      display: grid;
      align-content: start;
      gap: 8px;
      min-height: 142px;
      border: 1px solid rgba(143, 108, 64, 0.24);
      border-radius: 16px;
      background: rgba(255, 252, 242, 0.94);
      padding: 11px 13px 10px;
      color: #2b2118;
      box-shadow: 0 6px 16px rgba(80, 50, 20, 0.14);
    }

    .map-bundle-node.done {
      border-color: rgba(76, 145, 91, 0.36);
      background: rgba(248, 254, 242, 0.95);
    }

    .map-bundle-node[data-slot="a"] { box-shadow: inset 6px 0 0 #8f67cf, 0 6px 16px rgba(80, 50, 20, 0.14); }
    .map-bundle-node[data-slot="b"] { box-shadow: inset 6px 0 0 #389d62, 0 6px 16px rgba(80, 50, 20, 0.14); }
    .map-bundle-node[data-slot="c"] { box-shadow: inset 6px 0 0 #d88d32, 0 6px 16px rgba(80, 50, 20, 0.14); }
    .map-bundle-node[data-slot="d"] { box-shadow: inset 6px 0 0 #2f6fb0, 0 6px 16px rgba(80, 50, 20, 0.14); }
    .map-bundle-node[data-slot="e"] { box-shadow: inset 6px 0 0 #b84532, 0 6px 16px rgba(80, 50, 20, 0.14); }
    .map-bundle-node[data-slot="f"] { box-shadow: inset 6px 0 0 #6f4b22, 0 6px 16px rgba(80, 50, 20, 0.14); }

    .map-bundle-name {
      color: #2f2116;
      font-size: 18px;
      font-weight: 950;
      line-height: 1.16;
      text-align: center;
      white-space: nowrap;
    }

    .map-bundle-meta {
      justify-self: center;
      border-radius: 999px;
      background: rgba(241, 226, 191, 0.9);
      color: #6f4b22;
      padding: 3px 12px;
      font-size: 12.5px;
      font-weight: 950;
      text-align: center;
    }

    .map-bundle-node.done .map-bundle-meta {
      background: rgba(223, 243, 228, 0.95);
      color: #1f7549;
    }

    .map-item-strip {
      display: grid;
      grid-template-columns: repeat(var(--item-cols), minmax(0, 1fr));
      gap: 6px;
      min-width: 0;
      justify-content: center;
      justify-items: center;
    }

    .map-item {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 2px;
      min-width: 0;
      min-height: 70px;
      border: 1px solid rgba(140, 110, 70, 0.22);
      border-radius: 10px;
      background: rgba(255, 250, 238, 0.9);
      padding: 6px 5px 5px;
      color: #2b2118;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .map-item:hover {
      border-color: #cda766;
      background: #fff6df;
    }

    .map-item.checked {
      border-color: rgba(76, 145, 91, 0.4);
      background: rgba(233, 247, 229, 0.9);
    }

    .map-item.highlight {
      outline: 3px solid rgba(47, 111, 176, 0.3);
      border-color: var(--blue);
    }

    .map-item input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .map-item.checked::after {
      content: "✓";
      position: absolute;
      right: 5px;
      bottom: 3px;
      color: var(--green);
      font-size: 12px;
      font-weight: 950;
    }

    .map-item-name {
      justify-self: center;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
      color: #3c2a1d;
      font-size: 11.5px;
      font-weight: 850;
      line-height: 1.15;
      text-align: center;
      white-space: normal;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .map-item-count {
      justify-self: center;
      width: 100%;
      color: var(--red);
      font-size: 11px;
      font-weight: 950;
      line-height: 1;
      text-align: center;
    }

    .map-item .icon-wrap,
    .map-item .icon,
    .map-item .fallback-icon {
      width: 28px;
      height: 28px;
    }

    .icon-wrap {
      position: relative;
      display: grid;
      place-items: center;
      justify-self: center;
      width: 28px;
      height: 28px;
    }

    .icon {
      display: block;
      justify-self: center;
      width: 28px;
      height: 28px;
      margin: 0 auto;
      image-rendering: pixelated;
      object-fit: contain;
      object-position: center center;
    }

    .quality {
      position: absolute;
      right: -5px;
      bottom: -5px;
      width: 15px;
      height: 15px;
      image-rendering: pixelated;
    }

    .fallback-icon {
      display: grid;
      place-items: center;
      justify-self: center;
      border-radius: 6px;
      background: #f0dfbd;
      color: #6c4b28;
      font-size: 14px;
      font-weight: 950;
      text-align: center;
    }

    .map-tree-lines {
      position: absolute;
      inset: 18px;
      z-index: 2;
      width: calc(100% - 36px);
      height: calc(100% - 36px);
      pointer-events: none;
    }

    .map-tree-lines line {
      stroke: rgba(255, 248, 232, 0.72);
      stroke-width: 2;
      stroke-linecap: round;
      filter: drop-shadow(0 1px 2px rgba(80, 50, 20, 0.24));
    }

    .map-room-core { display: none; }

    .image-fallback {
      display: grid;
      place-items: center;
      min-height: 74px;
      border: 2px dashed #d9bf8b;
      border-radius: 8px;
      background: #f5e7c9;
      color: #6f4b22;
      padding: 8px;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .visual-caption {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .room-detail-list {
      display: grid;
      gap: 14px;
    }

    .bundle-detail-card {
      --bundle-accent: #8f67cf;
      position: relative;
      overflow: hidden;
      border: 2px solid #e1d3ad;
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255, 253, 247, 0.96), rgba(255, 250, 239, 0.94)),
        var(--paper);
      padding: 16px 16px 16px 26px;
      box-shadow: 0 8px 20px rgba(80, 50, 20, 0.08);
    }

    .bundle-detail-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 9px;
      background: var(--bundle-accent);
      box-shadow: 6px 0 14px rgba(80, 50, 20, 0.08);
    }

    .bundle-detail-card[data-slot="a"] { --bundle-accent: #8f67cf; }
    .bundle-detail-card[data-slot="b"] { --bundle-accent: #389d62; }
    .bundle-detail-card[data-slot="c"] { --bundle-accent: #d88d32; }
    .bundle-detail-card[data-slot="d"] { --bundle-accent: #2f6fb0; }
    .bundle-detail-card[data-slot="e"] { --bundle-accent: #b84532; }
    .bundle-detail-card[data-slot="f"] { --bundle-accent: #6f4b22; }

    .bundle-detail-card.done {
      border-color: rgba(74, 154, 95, 0.45);
      background:
        linear-gradient(180deg, rgba(249, 255, 246, 0.96), rgba(240, 250, 233, 0.94)),
        var(--green-soft);
    }

    .bundle-detail-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 12px;
    }

    .bundle-detail-title {
      margin: 0;
      color: #231a12;
      font-size: 24px;
      font-weight: 950;
      line-height: 1.16;
      letter-spacing: 0;
    }

    .bundle-detail-sub {
      margin: 6px 0 0;
      color: #6f6253;
      font-size: 15px;
      font-weight: 750;
      line-height: 1.35;
    }

    .bundle-detail-index {
      color: #9a6a2b;
      font-weight: 950;
    }

    .bundle-detail-rule {
      border-radius: 999px;
      background: #eee2c5;
      color: #5f4528;
      padding: 7px 14px;
      font-size: 17px;
      font-weight: 950;
      line-height: 1;
      white-space: nowrap;
    }

    .bundle-detail-card.done .bundle-detail-rule {
      background: #dff3e4;
      color: #208049;
    }

    .detail-items {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 12px;
    }

    .detail-item {
      position: relative;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 62px;
      border: 2px solid #e3d7bb;
      border-radius: 10px;
      background: rgba(255, 252, 244, 0.95);
      padding: 8px 14px 8px 10px;
      color: #221910;
      cursor: pointer;
      user-select: none;

          linear-gradient(rgba(255, 236, 177, 0.16), rgba(255, 236, 177, 0.16)),
          #f4ddb0;
      }

      .room-scene::before {
        background: rgba(255, 236, 177, 0.12);
        backdrop-filter: blur(0.25px);
      }

      .room-scene-bg {
        opacity: 0.78;
        filter: blur(0.35px) saturate(1.14) contrast(1.04) brightness(1.02);
        transform: scale(1.02);
      }

      .room[data-room-id="fish"] .room-scene-bg,
      .room[data-room-id="boiler"] .room-scene-bg,
      .room[data-room-id="board"] .room-scene-bg,
      .room[data-room-id="vault"] .room-scene-bg {
        opacity: 0.76;
        filter: blur(0.3px) saturate(1.15) contrast(1.03) brightness(1.01);
      }

      .map-bundle-node,
      .room[data-room-id] .map-bundle-node {
        width: 108px !important;
        max-width: 108px !important;
        padding: 6px 6px 5px 10px !important;
        cursor: pointer;
      }

      .map-bundle-node.active {
        border-color: rgba(47, 111, 176, 0.45) !important;
        background: rgba(255, 253, 247, 0.98);
      }

      .map-bundle-name {
        font-size: 10.8px !important;
        line-height: 1.08;
      }

      .map-bundle-meta {
        font-size: 9.8px !important;
        line-height: 1.08;
      }

      .map-item .icon-wrap,
      .map-item .icon,
      .map-item .fallback-icon,
      .room[data-room-id] .map-item .icon-wrap,
      .room[data-room-id] .map-item .icon,
      .room[data-room-id] .map-item .fallback-icon {
        width: 15px !important;
        height: 15px !important;
      }

      .map-item .quality {
        right: -3px;
        bottom: -3px;
        width: 7px;
        height: 7px;
      }

      .room[data-room-id="board"] .map-bundle-node[data-bundle-id="dye"],
      .room[data-room-id="board"] .map-bundle-node[data-bundle-id="chef"],
      .room[data-room-id="board"] .map-bundle-node[data-bundle-id="field-research"] {
        width: 122px !important;
        max-width: 122px !important;
      }

      .room[data-room-id="board"] .map-bundle-node[data-bundle-id="fodder"],
      .room[data-room-id="board"] .map-bundle-node[data-bundle-id="enchanter"],
      .room[data-room-id="crafts"] .map-bundle-node[data-bundle-id="winter-forage"],
      .room[data-room-id="crafts"] .map-bundle-node[data-bundle-id="construction"],
      .room[data-room-id="pantry"] .map-bundle-node[data-bundle-id="quality-crops"],
      .room[data-room-id="pantry"] .map-bundle-node[data-bundle-id="animal"],
      .room[data-room-id="fish"] .map-bundle-node[data-bundle-id="night-fish"],
      .room[data-room-id="fish"] .map-bundle-node[data-bundle-id="specialty-fish"] {
        width: 96px !important;
        max-width: 96px !important;
      }

      .room[data-room-id="crafts"] .map-bundle-node[data-bundle-id="exotic-forage"],
      .room[data-room-id="pantry"] .map-bundle-node[data-bundle-id="artisan"],
      .room[data-room-id="fish"] .map-bundle-node[data-bundle-id="crab-pot"] {
        width: 114px !important;
        max-width: 114px !important;
      }

      .visual-caption {
        display: none !important;
      }

      .bundle-detail-card {
        padding: 12px 10px 12px 18px;
      }

      .bundle-detail-head {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        gap: 6px;
        margin-bottom: 8px;
      }

      .bundle-detail-title {
        font-size: 18px;
        line-height: 1.1;
      }

      .bundle-detail-sub {
        font-size: 12px;
        line-height: 1.18;
      }

      .bundle-detail-rule {
        justify-self: end;
        align-self: start;
        padding: 5px 10px;
        font-size: 12px;
      }

      .detail-items {
        gap: 6px;
      }

      .detail-item {
        grid-template-columns: 28px minmax(0, 1fr);
        min-height: 43px;
        padding: 5px 22px 5px 8px;
      }

      .detail-item .icon-wrap,
      .detail-item .icon,
      .detail-item .fallback-icon {
        width: 26px;
        height: 26px;
      }

      .detail-item-name {
        font-size: 14px;
        line-height: 1.08;
      }

      .detail-item.checked::after {
        font-size: 18px;
      }

      .bundle-detail-card:not(.active) {
        display: none;
      }

      .room[data-room-id="missing"] .map-bundle-node[data-bundle-id="missing-bundle"] {
        width: 150px !important;
        max-width: 150px !important;
      }

      .room[data-room-id="missing"] .map-bundle-node[data-bundle-id="missing-bundle"] .map-item-strip {
        max-width: 122px !important;
        margin: 0 auto;
        flex-wrap: nowrap;
      }

      .room[data-room-id="missing"] .map-bundle-node[data-bundle-id="missing-bundle"] .map-item .icon-wrap,
      .room[data-room-id="missing"] .map-bundle-node[data-bundle-id="missing-bundle"] .map-item .icon,
      .room[data-room-id="missing"] .map-bundle-node[data-bundle-id="missing-bundle"] .map-item .fallback-icon {
        width: 13px !important;
        height: 13px !important;
      }

      .detail-item-count {
        display: inline;
        margin: 0 0 0 3px;
        font-size: 11px;
        vertical-align: baseline;
      }
    }

    /* ===== v13：按最新手机批注压缩搜索区、微调字号与树状图留白 ===== */
    @media (max-width: 520px) {
      .assistant-panel {
        margin-bottom: 4px !important;
      }

      .search-panel {
        margin-bottom: 2px !important;
        padding: 6px !important;
      }

      .search-box {
        grid-template-columns: minmax(0, 1fr) 38px 38px !important;
        gap: 5px !important;
      }

      .search-input {
        min-height: 36px !important;
        padding: 0 10px !important;
        font-size: 14px !important;
      }

      .clear-button,

      }

      .clear-button {

      }

      .search-button {

      }

      .progress-panel {
        margin-bottom: 7px !important;
      }

      .category {
        border: 2px solid #f0d8a8 !important;

      .center-map-stage-ref .center-ref-title-dom {
        width: calc(var(--box-w) * 1.08) !important;
        height: calc(var(--box-h) * 0.84) !important;

      .center-map-stage-ref .center-ref-note-dom {

        font-weight: 750 !important;

      .center-map-stage-ref .center-map-overlay-svg .center-route,
      .center-map-stage-ref .center-map-overlay-svg .center-route-arrow {
        stroke-width: 2.4px !important;
      }

      .room-title-link {
        border-color: rgba(138, 90, 53, 0.22) !important;
        background: linear-gradient(180deg, rgba(246, 229, 190, 0.98), rgba(232, 207, 156, 0.98)) !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.52), 0 2px 7px rgba(95, 58, 34, 0.12) !important;
      }

      .room-title-link .room-title-text {
        color: inherit;
        text-shadow: none;
      }

      .room[data-room-id="crafts"] .map-bundle-node[data-bundle-id="exotic-forage"] {
        width: 126px !important;
        max-width: 126px !important;
      }

      .room[data-room-id="crafts"] .map-bundle-node[data-bundle-id="exotic-forage"] .map-bundle-name {
        font-size: 10.2px !important;
      }

      .bundle-detail-title {
        line-height: 1.18 !important;
      }

      .bundle-detail-sub {
        margin-top: 5px !important;
        color: #6f6254 !important;
        font-weight: 600 !important;
        line-height: 1.36 !important;
      }

      .detail-item {
        border-width: 2px !important;
        border-color: #decca6 !important;
        min-height: 35px !important;
        padding-top: 3px !important;
        padding-bottom: 3px !important;
      }
    }

/* ===================== 主工具样式 ===================== */
.app-shell {
  width: min(1180px, calc(100% - 18px));
  margin: 0 auto;
  padding: 14px 0 24px;
}

.app-hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 7px;
  padding: 8px 14px;
  border: 2px solid var(--wood-dark);
  border-radius: 10px;
  background: linear-gradient(180deg, #b07a48, var(--wood));
  color: #fff7e8;
  box-shadow: var(--shadow);
}

.app-hero h1 { margin: 0; font-size: 16px; line-height: 1.12; }
.app-hero p.kicker { display: none; }
.app-hero-actions { display: flex; gap: 8px; }

.app-hero-actions button {
  min-height: 38px;
  padding: 0 14px;
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 8px;
  background: rgba(255, 250, 240, 0.16);
  color: #fff7e8;
  font-weight: 800;
  font-size: 14px;
}

.app-hero-actions button:hover { background: rgba(255,250,240,0.26); }
.app-hero-actions button.primary { background: #f4c77f; color: #5f3a22; border-color: #d39c5f; }
.app-hero-actions button.primary:hover { background: #f6d294; }

.app-panel {
  margin-bottom: 8px;
  padding: 0;
  border: 2px solid var(--wood);
  border-radius: 12px;
  background: var(--paper);
  box-shadow: 0 6px 16px rgba(76, 49, 29, 0.08), inset 0 0 0 2px var(--paper);
  overflow: hidden;
}

.app-panel-title {
  margin: 0;
  padding: 7px 12px 6px;
  font-size: 13.5px;
  font-weight: 900;
  color: #fff7e8;
  display: flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(180deg, #b07a48, var(--wood));
  letter-spacing: 0.4px;
  border-bottom: 1.5px solid var(--wood-dark);
}

.app-panel-title .subtle {
  color: #ffe0a2 !important;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0;
}

.app-panel-body { padding: 9px 10px 10px; }
.app-panel > :not(.app-panel-title) {
  margin-left: 10px;
  margin-right: 10px;
}
.app-panel > :first-child:not(.app-panel-title) { margin-top: 9px; }
.app-panel > :last-child:not(.app-panel-title) { margin-bottom: 10px; }
/* 让 title 跟随父级颜色，subtle 不显示标题色 */
.app-panel-title { border-radius: 9px 9px 0 0; }

.app-panel-title .subtle {
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

/* 季节天气栏 */
.season-bar {
  display: flex;
  flex-wrap: nowrap;
  gap: 4px;
  align-items: center;
  padding: 6px 9px;
  border: 2px solid var(--wood);
  border-radius: 12px;
  background: linear-gradient(180deg, #fff7e6, #f9ecc8);
  margin-bottom: 8px;
  overflow-x: auto;
  box-shadow: 0 4px 12px rgba(76, 49, 29, 0.06);
}
.season-bar::-webkit-scrollbar { height: 0; }

.season-current {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 4px;
  font-weight: 900;
  font-size: 12px;
  color: var(--wood-dark);
  margin: 0 3px;
  white-space: nowrap;
}

.season-pill {
  flex-shrink: 0;
  padding: 3px 9px;
  border: 1.5px solid var(--line);
  border-radius: 999px;
  background: var(--paper);
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
  cursor: pointer;
  white-space: nowrap;
}
.season-pill.active { background: var(--gold); color: #fff; border-color: var(--gold); }
.weather-toggle {
  flex-shrink: 0;
  padding: 3px 9px;
  border: 1.5px solid var(--line);
  border-radius: 999px;
  background: #fffce0;
  font-size: 11px;
  font-weight: 800;
  cursor: pointer;
  white-space: nowrap;
}
.weather-toggle.rainy { background: #d8ecf6; border-color: #8db8d6; }
.day-input { flex-shrink: 0; width: 38px; padding: 2px 4px; border: 1.5px solid var(--line); border-radius: 5px; text-align: center; font-weight: 800; font-size: 12px; }
.day-step { flex-shrink: 0; padding: 2px 7px; border: 1.5px solid var(--line); border-radius: 5px; background: var(--paper); font-weight: 900; cursor: pointer; font-size: 12px; }

/* 当季主线 */
.quest-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}
@media (min-width: 720px) {
  .quest-grid { grid-template-columns: repeat(3, 1fr); }
}

.quest-card {
  position: relative;
  min-width: 0;
  padding: 6px 8px 6px 12px;
  border: 1.5px solid #e2d0aa;
  border-radius: 9px;
  background: #fffdf6;
  box-shadow: inset 4px 0 0 var(--gold);
}
.quest-card[data-priority="urgent"] { box-shadow: inset 5px 0 0 var(--red); }
.quest-card[data-priority="festival"] { box-shadow: inset 5px 0 0 #b884c8; }
.quest-card[data-priority="info"] { box-shadow: inset 5px 0 0 var(--blue); }
.quest-card.added { background: var(--green-soft); box-shadow: inset 5px 0 0 var(--green); }

.quest-card-head {
  display: flex;
  justify-content: space-between;
  gap: 6px;
  align-items: flex-start;
  margin-bottom: 2px;
}

.quest-title { font-size: 12.5px; font-weight: 900; color: var(--ink); line-height: 1.2; }
.quest-day { font-size: 10px; font-weight: 800; color: var(--muted); white-space: nowrap; }
.quest-reason {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: end;
  gap: 6px;
  min-height: 25px;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.35;
  margin-top: 2px;
}
.quest-reason-text { min-width: 0; }

.quest-add-btn {
  display: grid;
  place-items: center;
  width: 25px;
  height: 25px;
  padding: 0;
  border: 1.5px solid #d39c5f;
  border-radius: 6px;
  background: #f4c77f;
  color: #5f3a22;
  font-size: 17px;
  font-weight: 900;
  line-height: 1;
  cursor: pointer;
}
.quest-add-btn.added { background: var(--green-soft); color: var(--green); border-color: #88c19a; cursor: default; }

/* 目标列表 */
.goals-empty {
  text-align: center;
  padding: 24px 16px;
  color: var(--muted);
  font-size: 13px;
  border: 1.5px dashed var(--line);
  border-radius: 10px;
}

.goal-card {
  border: 1.5px solid #e2d0aa;
  border-radius: 10px;
  background: #fffdf6;
  margin-bottom: 8px;
  overflow: hidden;
}
.goal-card.complete { background: var(--green-soft); border-color: #88c19a; }

.goal-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: rgba(138, 90, 53, 0.06);
  cursor: pointer;
  border: none;
  width: 100%;
  text-align: left;
  font: inherit;
  color: inherit;
}
.goal-card.complete .goal-head { background: rgba(45, 138, 95, 0.08); }
.goal-emoji {
  display: grid;
  place-items: center;
  width: 36px;
  height: 36px;
  flex: 0 0 36px;
  font-size: 22px;
}
.goal-emoji img,
.goal-emoji .fallback-icon {
  width: 32px;
  height: 32px;
  image-rendering: pixelated;
}
.goal-info { flex: 1; min-width: 0; }
.goal-title { font-size: 14px; font-weight: 900; color: var(--ink); }
.goal-card.complete .goal-title { color: var(--green); }
.goal-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
.goal-how {
  display: inline-block;
  margin-top: 2px;
  padding: 1px 7px;
  font-size: 10px;
  font-weight: 800;
  border-radius: 4px;
}
.goal-how.craft   { background: #fff0d2; color: #9c620e; }
.goal-how.build   { background: #e0eef8; color: #2c5d8a; }
.goal-how.upgrade { background: #ecdcf3; color: #6e3a85; }
.goal-how.self    { background: var(--green-soft); color: var(--green); }

.goal-progress {
  flex: 0 0 58px;
  display: grid;
  justify-items: center;
  text-align: center;
}
.goal-frac {
  display: grid;
  place-items: center;
  width: 56px;
  min-height: 22px;
  padding: 0 6px;
  box-sizing: border-box;
  font-size: 12px;
  font-weight: 900;
  line-height: 1;
  color: var(--gold);
  white-space: nowrap;
}
.goal-card.complete .goal-frac { color: var(--green); }
.goal-bar { width: 56px; height: 5px; background: #eadfc9; border-radius: 999px; overflow: hidden; margin-top: 4px; }
.goal-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--green)); transition: width 0.3s ease; }

.goal-body { padding: 4px 12px 12px; }
.goal-note { font-size: 12px; color: var(--gold); font-weight: 800; margin-bottom: 6px; }
.goal-step {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid #f0e3c8;
  cursor: pointer;
  background: none;
  border-left: none;
  border-right: none;
  border-top: none;
  width: 100%;
  text-align: left;
  font: inherit;
  color: inherit;
}
.goal-step:last-of-type { border-bottom: none; }
.goal-step-check {
  width: 20px; height: 20px;
  border: 2px solid var(--line);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  background: #fff; flex-shrink: 0; margin-top: 1px;
  font-size: 12px; color: #fff; font-weight: 900;
}
.goal-step.done .goal-step-check { background: var(--green); border-color: var(--green); }
.goal-step-text { font-size: 13px; font-weight: 700; }
.goal-step.done .goal-step-text { color: var(--muted); text-decoration: line-through; }
.goal-step-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.goal-step-have { font-size: 11px; font-weight: 800; color: var(--green); margin-top: 2px; }
.goal-remove {
  margin-top: 8px;
  width: 100%;
  padding: 7px 0;
  border: 1px solid #e8c4be;
  border-radius: 7px;
  background: #fdf0ee;
  color: var(--red);
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
}

/* 背包 */
.inventory-summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  align-items: stretch;
  gap: 6px;
  margin-bottom: 8px;
  max-height: none;
  overflow: visible;
}
.inv-chip {
  position: relative;
  display: flex;
  align-items: center;
  gap: 3px;
  width: 100%;
  max-width: 100%;
  min-width: 0;
  overflow: visible;
  padding: 4px 4px;
  border: 1px solid #e2d0aa;
  border-radius: 8px;
  background: #fffdf6;
  font-size: 10.5px;
  font-weight: 800;
  cursor: pointer;
}
.inv-chip img, .inv-chip .fallback-icon {
  flex: 0 0 auto;
  width: 16px;
  height: 16px;
}
.inv-chip img { object-fit: contain; }
.inv-chip .inv-name {
  flex: 1 1 auto;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.inv-chip .inv-count {
  flex: 0 0 auto;
  color: var(--gold);
}
.inv-chip.delete-armed {
  border-color: #a94736;
  background: linear-gradient(180deg, #fff9f1, #f8eadc);
  box-shadow: inset 0 0 0 1px rgba(184, 69, 50, 0.16);
}
.inv-chip-remove {
  position: absolute;
  top: -7px;
  right: -7px;
  z-index: 3;
  display: grid;
  place-items: center;
  width: 17px;
  height: 17px;
  border: 1px solid #7a271d;
  border-radius: 50%;
  background: #963125;
  color: #fffaf0;
  padding: 0;
  font-size: 12px;
  font-weight: 850;
  line-height: 1;
  box-shadow: 0 2px 5px rgba(76, 49, 29, 0.24);
}
.inventory-empty {
  grid-column: 1 / -1;
  color: var(--muted);
  font-size: 12.5px;
  text-align: center;
  padding: 5px 2px 8px;
}

.inv-suggestion {
  font-size: 12.5px;
  padding: 7px 0;
  display: flex;
  align-items: flex-start;
  gap: 6px;
  line-height: 1.45;
}
.inv-suggestion + .inv-suggestion { border-top: 1px dashed #e2d0aa; }
.inv-suggestion .badge {
  font-size: 10px;
  font-weight: 900;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--green-soft);
  color: var(--green);
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 1px;
}
.inv-suggestion .badge.recommend { background: #fff0d2; color: #9c620e; }
.inv-suggestion .badge.bundle { background: #e0eef8; color: #2c5d8a; }
.inv-suggestion .badge.goal { background: var(--green-soft); color: var(--green); }
.sug-add-btn {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border: 1.5px solid #d39c5f;
  border-radius: 8px;
  background: #f4c77f;
  color: #5f3a22;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
  padding: 0;
  line-height: 1;
}
.sug-add-btn:active { background: #f6d294; }
.inv-empty {
  padding: 14px 8px;
  text-align: center;
  color: var(--muted);
  font-size: 12.5px;
  line-height: 1.6;
}

.add-item-btn {
  width: 100%;
  padding: 10px;
  border: 1.5px dashed var(--gold);
  border-radius: 10px;
  background: #fffce8;
  color: var(--wood-dark);
  font-size: 14px;
  font-weight: 900;
  cursor: pointer;
}
.add-item-btn:hover { background: #fff6db; }

/* 物品录入浮层 */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(60, 40, 20, 0.5);
  z-index: 90;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  overscroll-behavior: contain;
  touch-action: none;
}
.modal-backdrop > * { touch-action: auto; }
.modal-sheet {
  width: 100%;
  max-width: 720px;
  height: min(86dvh, 720px);
  max-height: calc(100dvh - 10px);
  background: var(--paper);
  border-radius: 18px 18px 0 0;
  padding: 12px 12px 14px;
  border-top: 3px solid var(--wood);
  overscroll-behavior: contain;
}
@media (min-width: 720px) {
  .modal-backdrop { align-items: center; }
  .modal-sheet { border-radius: 16px; height: 72vh; max-height: 680px; border-top: none; border: 2px solid var(--wood); }
}
body.modal-open { overflow: hidden; touch-action: none; }
body.modal-open #app-shell { pointer-events: none; }
.modal-grip { width: 100%; max-width: 280px; height: 18px; margin: 0 auto 8px; cursor: grab; position: relative; display: flex; align-items: center; justify-content: center; touch-action: none; }
.modal-grip::after { content: ""; width: 48px; height: 5px; background: var(--wood); opacity: 0.4; border-radius: 999px; }
.modal-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.modal-title { margin: 0; font-size: 17px; font-weight: 900; color: var(--wood-dark); }
.modal-close {
  width: 32px; height: 32px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  background: var(--paper-deep);
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
}

/* 物品大网格 - 信息密度优先 */
.item-cat-tabs {
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  gap: 4px;
  overflow: visible;
  padding-bottom: 8px;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--line);
}
.item-cat-tab {
  padding: 4px 9px;
  border: 1.5px solid var(--line);
  border-radius: 999px;
  background: var(--paper);
  font-size: 11.5px;
  font-weight: 800;
  cursor: pointer;
  white-space: nowrap;
  color: var(--muted);
}
.item-cat-tab.active { background: var(--gold); color: #fff; border-color: var(--gold); }

.item-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 6px;
}
@media (min-width: 720px) {
  .item-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}
/* 物品 tile - 扁长条横排，一行 2 个，图标加大 */
.item-tile {
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  border: 1.5px solid #e2d0aa;
  border-radius: 8px;
  background: #fffdf6;
  min-width: 0;
}
.item-tile.has { border-color: var(--green); background: var(--green-soft); }
.item-tile-icon { flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; }
.item-tile img, .item-tile .fallback-icon { width: 30px; height: 30px; image-rendering: pixelated; }
.item-tile img { object-fit: contain; }
.item-tile-name {
  flex: 1;
  min-width: 0;
  font-size: 12px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.15;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.item-tile-ctrl {
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}
.item-tile-btn {
  width: 24px;
  height: 24px;
  border: 1.2px solid var(--line);
  border-radius: 5px;
  font-size: 13px;
  font-weight: 900;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
  line-height: 1;
}
.item-tile-btn.minus { background: #fde9e6; border-color: #e6b8b0; color: var(--red); }
.item-tile-btn.plus { background: #e9f6e6; border-color: #a6cf9a; color: var(--green); }
.item-tile-num {
  min-width: 22px;
  max-width: 36px;
  text-align: center;
  font-size: 14px;
  font-weight: 900;
  color: var(--ink);
  padding: 0 2px;
}
.item-tile.has .item-tile-num { color: var(--green); }
.item-tile-check {
  flex-shrink: 0;
  font-size: 10.5px;
  font-weight: 800;
  padding: 3px 7px;
  border-radius: 4px;
  background: var(--paper-deep);
  color: var(--muted);
  white-space: nowrap;
}
.item-tile-check.checked { background: var(--green); color: #fff; }

/* 工具卡片网格 */
.tool-card-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
@media (min-width: 720px) {
  .tool-card-grid { grid-template-columns: repeat(3, 1fr); }
}
.tool-card {
  border: 1.5px solid var(--line);
  border-radius: 9px;
  background: var(--paper);
  padding: 8px;
}
.tool-card-head { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.tool-card-icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tool-card-icon img, .tool-card-icon .fallback-icon { width: 32px; height: 32px; image-rendering: pixelated; }
.tool-card-info { flex: 1; min-width: 0; }
.tool-card-name { font-size: 13px; font-weight: 900; color: var(--wood-dark); }
.tool-card-lv { font-size: 11px; color: var(--muted); }
.tool-card-lv b { color: var(--gold); }

/* 数量编辑浮窗 - 紧凑居中 */
.qty-backdrop {
  position: fixed; inset: 0;
  z-index: 200;
  background: rgba(60,40,20,0.35);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.qty-popover {
  width: 100%;
  max-width: 290px;
  background: #fff;
  border: 2px solid var(--wood);
  border-radius: 14px;
  padding: 12px 12px 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.qty-popover .qty-title { font-weight: 900; font-size: 14px; text-align: center; display: flex; align-items: center; gap: 6px; justify-content: center; margin-bottom: 2px; }
.qty-popover .qty-title img, .qty-popover .qty-title .fallback-icon { width: 22px; height: 22px; }
.qty-row { display: flex; align-items: center; gap: 4px; }
.qty-btn {
  flex: 1;
  min-width: 0;
  height: 34px;
  border: 1.5px solid var(--line);
  border-radius: 6px;
  background: var(--paper-deep);
  font-size: 13px;
  font-weight: 900;
  cursor: pointer;
  padding: 0;
}
.qty-btn.minus { background: #fde9e6; border-color: #e6b8b0; color: var(--red); }
.qty-btn.plus { background: #e9f6e6; border-color: #a6cf9a; color: var(--green); }
.qty-input {
  flex: 1.4;
  min-width: 0;
  height: 38px;
  text-align: center;
  border: 2px solid var(--line);
  border-radius: 6px;
  font-size: 18px;
  font-weight: 900;
  padding: 0;
}
.qty-actions { display: flex; gap: 6px; margin-top: 4px; }
.qty-actions button { flex: 1; min-height: 36px; border-radius: 6px; font-weight: 900; cursor: pointer; font-size: 13px; }
.qty-confirm { background: var(--green); color: #fff; border: 2px solid var(--green); }
.qty-cancel { background: var(--paper-deep); color: var(--ink); border: 2px solid var(--line); }
.qty-clear { background: #fde9e6; color: var(--red); border: 2px solid #e6b8b0; }
.qty-hint {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  padding: 4px 6px;
  background: #fffce8;
  border-radius: 6px;
  line-height: 1.35;
}
.qty-hint b { color: var(--gold); }

/* 工具/设备/建筑 */
.equip-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 6px;
}
/* 设备 / 建筑统一行式 */
.equip-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  border: 1.5px solid var(--line);
  border-radius: 7px;
  background: var(--paper);
  font-size: 12.5px;
  font-weight: 700;
}
.equip-row.has { background: var(--green-soft); border-color: #88c19a; }
.equip-row .tool-icon { font-size: 18px; }
.equip-row .tool-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.equip-mini-btn {
  width: 26px; height: 26px;
  border: 1.5px solid var(--line);
  border-radius: 6px;
  background: var(--paper-deep);
  font-size: 13px;
  font-weight: 900;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
}
.equip-mini-btn.minus { background: #fde9e6; border-color: #e6b8b0; color: var(--red); }
.equip-mini-btn.plus { background: #e9f6e6; border-color: #a6cf9a; color: var(--green); }
.equip-mini-btn.check { width: 38px; }
.equip-mini-btn.check.has { background: var(--green); color: #fff; border-color: var(--green); }
.equip-count-display {
  min-width: 28px;
  text-align: center;
  font-weight: 900;
  color: var(--gold);
  font-size: 13px;
}
.equip-row.has .equip-count-display { color: var(--green); }

.tool-level-picker {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}
.tool-level-picker button {
  flex: 1;
  padding: 5px 0;
  border: 1.5px solid var(--line);
  border-radius: 5px;
  background: var(--paper);
  font-size: 11px;
  font-weight: 800;
  cursor: pointer;
}
.tool-level-picker button.active { background: var(--gold); color: #fff; border-color: var(--gold); }

/* 物品决策面板 */
.decision-panel {
  margin-top: 8px;
}
.decision-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: #fffdf6;
  margin-bottom: 4px;
  font-size: 13px;
}
.decision-row.best { background: var(--green-soft); border-color: #88c19a; }
.decision-row .badge {
  font-size: 10px;
  font-weight: 900;
  padding: 2px 6px;
  border-radius: 4px;
  background: #dff3e4;
  color: #1c6f45;
}
.decision-price { color: var(--gold); font-weight: 900; margin-left: auto; }
#lookupResult > div > div:first-child img,
#lookupResult > div > div:first-child .fallback-icon {
  width: 25px;
  height: 25px;
  image-rendering: pixelated;
}
#lookupResult > div > div:first-child img { object-fit: contain; }


/* 添加目标 - 可展开 tile */
.goal-tile-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 6px;
}
@media (min-width: 720px) {
  .goal-tile-grid { grid-template-columns: 1fr 1fr; }
}
.goal-tile-wrap {
  border: 1.5px solid var(--line);
  border-radius: 9px;
  background: var(--paper);
  overflow: hidden;
}
.goal-tile-wrap.has { background: var(--green-soft); border-color: #88c19a; }
.goal-tile {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  border: none;
  background: transparent;
  font: inherit;
  text-align: left;
  font-weight: 700;
}
.goal-tile-main {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 4px 9px 11px;
  border: none;
  background: transparent;
  color: inherit;
  font: inherit;
  text-align: left;
  cursor: pointer;
}
.goal-tile .tool-icon {
  display: grid;
  place-items: center;
  width: 24px;
  height: 24px;
  flex: 0 0 24px;
  font-size: 19px;
}
.goal-tile .tool-icon img,
.goal-tile .tool-icon .fallback-icon {
  width: 22px;
  height: 22px;
  image-rendering: pixelated;
}
.goal-tile .tool-icon img { object-fit: contain; }
.goal-tile .tool-name { flex: 1; min-width: 0; font-size: 13px; }
.goal-tile .tool-level {
  font-size: 10.5px;
  font-weight: 900;
  padding: 1.5px 8px;
  border-radius: 4px;
  background: var(--paper-deep);
  color: var(--wood-dark);
}
.goal-tile-wrap.has .tool-level { background: var(--green); color: #fff; }
.goal-tile-add {
  flex-shrink: 0;
  display: grid;
  place-items: center;
  width: 30px;
  height: 30px;
  margin-right: 9px;
  border: 1.5px solid #d39c5f;
  border-radius: 7px;
  background: #f4c77f;
  color: #5f3a22;
  font-size: 18px;
  font-weight: 950;
  line-height: 1;
  cursor: pointer;
}
.goal-tile-add:active {
  background: #f6d294;
}
.goal-tile-status {
  flex-shrink: 0;
  margin-right: 9px;
  white-space: nowrap;
}
.goal-tile-detail {
  padding: 6px 12px 11px;
  border-top: 1px dashed var(--line);
  background: rgba(255, 252, 242, 0.6);
}
.goal-tile-note {
  font-size: 11px;
  color: var(--gold);
  font-weight: 800;
  margin-bottom: 4px;
}
.goal-tile-step {
  font-size: 12px;
  padding: 3px 0;
  color: var(--ink);
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.goal-tile-step.ok { color: var(--green); font-weight: 800; }
.goal-tile-step .have {
  font-size: 10.5px;
  color: var(--muted);
  font-weight: 700;
}
.goal-tile-step.ok .have { color: var(--green); }
/* 目标左滑显示删除按钮 */
.goal-card-container {
  position: relative;
  margin-bottom: 8px;
  border-radius: 12px;
  overflow: hidden;
}
.goal-card-container .goal-delete-btn {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 80px;
  background: var(--red);
  color: #fff;
  border: none;
  font-weight: 900;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  letter-spacing: 0.5px;
  z-index: 1;
}
.goal-card-container > .goal-card {
  position: relative;
  margin-bottom: 0;
  will-change: transform;
  touch-action: pan-y;
  transform: translateX(0);
  transition: transform 0.2s ease;
  z-index: 2;
}
.goal-card-container > .goal-card.revealed {
  transform: translateX(-80px);
}

/* 浮窗固定高度 - 内部滚动 */
.modal-sheet {
  display: flex !important;
  flex-direction: column;
}
.modal-grip, .modal-head, .item-cat-tabs { flex-shrink: 0; }
#invModalBody, #addGoalBody {
  flex: 1;
  overflow-y: auto;
  padding-right: 3px;
  min-height: 0;
  overscroll-behavior: contain;
  touch-action: pan-y;
  -webkit-overflow-scrolling: touch;
}

/* ===================== 献祭OVERLAY样式 ===================== */
.bundle-overlay {
  position: fixed;
  inset: 0;
  z-index: 80;
  background: var(--bg);
  overflow-y: auto;
  animation: bundleSlideUp 0.22s ease-out;
}
@keyframes bundleSlideUp {
  from { transform: translateY(100%); opacity: 0.5; }
  to   { transform: translateY(0); opacity: 1; }
}
.bundle-overlay[hidden] { display: none; }
.bundle-overlay-close {
  position: sticky;
  top: 0;
  z-index: 5;
  background: var(--wood);
  color: #fff7e8;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 2px solid var(--wood-dark);
}
.bundle-overlay-title {
  min-width: 0;
  display: grid;
  gap: 1px;
}
.bundle-overlay-title .kicker {
  color: #ffe0a2;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.2px;
  line-height: 1.1;
}
.bundle-overlay-title .ttl {
  color: #fff7e8;
  font-size: 20px;
  font-weight: 950;
  line-height: 1.12;
  letter-spacing: 0;
}
.bundle-overlay-close button {
  min-height: 32px;
  padding: 0 14px;
  border: 1.5px solid rgba(255,255,255,0.5);
  border-radius: 7px;
  background: rgba(255,250,240,0.16);
  color: #fff7e8;
  font-weight: 900;
  font-size: 13px;
  cursor: pointer;
}


/* 献祭页 - 让节点更紧凑（不动布局算法用的 width/height/transform） */
@media (max-width: 520px) {
  .map-bundle-node { min-height: 0 !important; padding: 8px 10px 9px !important; }
  .map-bundle-node .map-bundle-name { font-size: 12px !important; }
  .map-bundle-node .map-bundle-meta { font-size: 10.5px !important; }
  .map-item { min-height: 0 !important; padding: 3px 1px !important; }
  .map-item .name { font-size: 10px !important; line-height: 1.15 !important; }
}

/* 微瑕修复：禁止地图卡片内勾选 */
.map-item { cursor: pointer !important; }
.map-item input[type="checkbox"] { pointer-events: none !important; }

@media (max-width: 520px) {
  .app-shell { width: min(100% - 10px, 430px); padding: 5px 0 20px; }
  .app-hero { padding: 6px 11px; }
  .app-hero h1 { font-size: 14px; }
  .app-hero-actions button { min-height: 26px; padding: 0 8px; font-size: 11.5px; }
  .app-panel { margin-bottom: 7px; }
  .app-panel-title { font-size: 12.5px; padding: 6px 11px 5px; }
  .app-panel > :not(.app-panel-title) { margin-left: 8px; margin-right: 8px; }
  .app-panel > :first-child:not(.app-panel-title) { margin-top: 7px; }
  .app-panel > :last-child:not(.app-panel-title) { margin-bottom: 8px; }
  .quest-card { padding: 5px 7px 5px 11px; }
  .item-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 5px; }
  .item-tile { padding: 4px 7px; gap: 5px; }
  .item-tile img, .item-tile .fallback-icon { width: 28px; height: 28px; }
  .item-tile-icon { width: 28px; height: 28px; }
  .item-tile-name { font-size: 11.5px; }
  .item-tile-btn { width: 22px; height: 22px; font-size: 12px; }
  .item-tile-num { font-size: 13px; min-width: 20px; }
  .goals-empty { padding: 14px 10px; font-size: 12px; }
  .add-item-btn { padding: 8px; font-size: 13px; }
}

/* ===================== 主界面：对齐献祭页视觉 ===================== */
#app-shell {
  width: min(1180px, calc(100% - 18px));
  padding: 12px 0 28px;
}

#app-shell .app-hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: end;
  gap: 14px;
  margin-bottom: 10px;
  padding: 14px 16px;
  border-radius: 8px;
  background: linear-gradient(180deg, #a66f42, var(--wood));
}

#app-shell .app-hero p.kicker {
  display: block;
  margin: 0 0 4px;
  color: #ffe0a2;
  font-size: 12px;
  font-weight: 850;
  letter-spacing: 0;
}

#app-shell .app-hero h1 {
  margin: 0;
  color: #fff7e8;
  font-size: clamp(22px, 4vw, 34px);
  line-height: 1.12;
}

#app-shell .app-hero-actions button {
  min-height: 38px;
  border-radius: 8px;
  padding: 0 14px;
  background: rgba(255, 250, 240, 0.16);
  color: #fff7e8;
  font-size: 14px;
}

#app-shell .season-bar,
#app-shell .app-panel {
  border: 1px solid #e8d8b8;
  border-radius: 8px;
  background: rgba(255, 250, 240, 0.92);
  box-shadow: 0 10px 24px rgba(76, 49, 29, 0.08);
}

#app-shell .season-bar {
  display: grid;
  grid-template-columns: repeat(4, minmax(48px, 1fr)) 34px 44px 34px minmax(58px, 0.9fr);
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
  padding: 6px 10px;
  overflow: hidden;
  border: 1px solid #e8d8b8;
  border-radius: 8px;
  background: rgba(255, 250, 240, 0.92);
  box-shadow: 0 10px 24px rgba(76, 49, 29, 0.08);
}

#app-shell .season-pill,
#app-shell .weather-toggle,
#app-shell .day-step,
#app-shell .day-input {
  min-height: 36px;
  border: 2px solid #d8c89d;
  border-radius: 999px;
  background: #fffdf8;
  color: var(--ink);
  font-weight: 900;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
}

#app-shell .season-pill.active,
#app-shell .weather-toggle.rainy {

        ]),
