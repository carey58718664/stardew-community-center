<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社区中心献祭助手</title>
  <!-- v8: 统一手机端选项框视觉宽度，并压缩房间背景边框留出空间 -->
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f0e8;
      --wood: #8a5a35;
      --wood-dark: #5f3a22;
      --paper: #fffaf0;
      --paper-deep: #f4e7c9;
      --ink: #2b2118;
      --muted: #746657;
      --line: #d8c59e;
      --green: #2d8a5f;
      --green-soft: #e8f6e8;
      --gold: #d89b2b;
      --blue: #2f6fb0;
      --red: #b84532;
      --shadow: 0 16px 38px rgba(76, 49, 29, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 250, 240, 0.82), rgba(243, 240, 232, 0.96)),
        repeating-linear-gradient(90deg, rgba(138, 90, 53, 0.035) 0 1px, transparent 1px 18px),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    button,
    input { font: inherit; }
    button { cursor: pointer; }
    [hidden] { display: none !important; }

    .page {
      width: min(1180px, calc(100% - 18px));
      margin: 0 auto;
      padding: 14px 0 34px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 10px;
      padding: 16px 18px;
      border: 2px solid var(--wood-dark);
      border-radius: 8px;
      background: linear-gradient(180deg, #a66f42, var(--wood));
      color: #fff7e8;
      box-shadow: var(--shadow);
    }

    .hero p,
    .hero h1 { margin: 0; }

    .hero-kicker {
      margin-bottom: 4px !important;
      font-size: 13px;
      font-weight: 800;
      color: #ffe0a2;
    }

    h1 {
      font-size: clamp(24px, 5vw, 40px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .button {
      min-height: 40px;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.16);
      color: #fff7e8;
      padding: 0 14px;
      font-weight: 800;
    }

    .button:hover { background: rgba(255, 250, 240, 0.24); }

    .assistant-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .search-panel,
    .progress-panel,
    .center-map-panel,
    .room-map {
      border: 1px solid #e8d8b8;
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.92);
      box-shadow: 0 10px 24px rgba(76, 49, 29, 0.08);
    }

    .search-panel {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 17px;
      font-weight: 900;
    }

    .search-panel .panel-title {
      margin: 0;
      white-space: nowrap;
    }

    .search-box {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      margin-bottom: 0;
    }

    .search-input {
      width: 100%;
      min-height: 42px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47, 111, 176, 0.16);
    }

    .clear-button,
    .search-button {
      min-width: 44px;
      border-radius: 8px;
      font-weight: 950;
    }

    .clear-button {
      border: 2px solid var(--line);
      background: var(--paper-deep);
      color: var(--ink);
    }

    .search-button {
      border: 2px solid #d39c5f;
      background: #f4c77f;
      color: #5f3a22;
      font-size: 20px;
    }

    .result-list {
      display: grid;
      gap: 8px;
      grid-column: 2 / 3;
      max-height: 178px;
      overflow: auto;
      padding-right: 3px;
    }

    .empty-state {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .result-card {
      border: 2px solid #e4d3ae;
      border-radius: 8px;
      background: #fffdf8;
      padding: 10px;
    }

    .result-card.done {
      border-color: #b8d6ad;
      background: var(--green-soft);
    }

    .result-head {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 6px;
    }

    .result-title {
      margin: 0;
      font-weight: 900;
    }

    .result-path {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status.need { background: #fff0d2; color: #9c620e; }
    .status.done { background: #dff3e4; color: #1c6f45; }

    .progress-panel {
      margin-bottom: 10px;
      padding: 12px;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .category {
      border: 1px solid #e2d0aa;
      border-radius: 8px;
      background: #fffdf8;
      padding: 9px;
    }

    .category-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 900;
    }

    .category-count {
      color: var(--muted);
      white-space: nowrap;
    }

    .bar {
      overflow: hidden;
      height: 10px;
      border-radius: 999px;
      background: #eadfc9;
    }

    .fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), var(--green));
      transition: width 0.2s ease;
    }

    .center-map-panel {
      margin-bottom: 10px;
      padding: 10px;
    }

    .center-map-frame {
      position: relative;
      overflow: hidden;
      border: 1px solid #e0c89b;
      border-radius: 8px;
      background: #fff6df;
      min-height: 280px;
    }

    .center-map-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 246, 224, 0.08);
      pointer-events: none;
    }

    .center-map-image {
      display: block;
      width: 100%;
      min-height: 280px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: saturate(1.02) contrast(1.02);
    }

    .center-room-pin {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 2;
      width: 0;
      height: 0;
      color: #5c3b20;
    }

    .center-pin-label {
      position: absolute;
      left: var(--dx);
      top: var(--dy);
      transform: translate(-50%, -50%);
      display: grid;
      justify-items: center;
      min-width: 76px;
      border: 1px solid rgba(128, 92, 48, 0.28);
      border-radius: 11px;
      background: rgba(255, 252, 242, 0.9);
      padding: 4px 9px 5px;
      text-align: center;
      box-shadow: 0 6px 14px rgba(76, 49, 29, 0.16);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(1px);
    }

    .center-pin-name {
      color: #5f3518;
      font-size: 13px;
      font-weight: 950;
      line-height: 1.12;
    }

    .center-pin-note {
      color: #7b5a36;
      font-size: 10px;
      font-weight: 850;
      line-height: 1.15;
      white-space: nowrap;
    }

    .center-pin-line {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--line-l);
      height: 0;
      border-top: 1px solid rgba(112, 78, 42, 0.42);
      transform: translate(-50%, -50%) rotate(var(--line-a));
      transform-origin: left center;
      pointer-events: none;
    }

    .center-pin-dot {
      position: absolute;
      left: 0;
      top: 0;
      width: 9px;
      height: 9px;
      border: 2px solid rgba(255, 252, 242, 0.95);
      border-radius: 50%;
      background: #ba6b16;
      box-shadow: 0 2px 6px rgba(76, 49, 29, 0.3);
      transform: translate(-50%, -50%);
    }

    .room-map { padding: 12px; }

    .rooms {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .room {
      position: relative;
      border: 1px solid #e8d8b8;
      border-radius: 8px;
      background: linear-gradient(180deg, #fffaf0, #f7ebd1);
      box-shadow: 0 12px 26px rgba(76, 49, 29, 0.1);
    }

    .room-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(138, 90, 53, 0.1);
    }

    .room-title {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 0 0 5px;
      font-size: 19px;
      font-weight: 950;
    }

    .room-meta {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .room-badge {
      color: var(--green);
      font-size: 13px;
      font-weight: 950;
      white-space: nowrap;
    }

    .room-body {
      display: grid;
      grid-template-columns: 1fr;
      padding: 10px;
    }

    .room-scene-card {
      min-width: 0;
      margin: 0;
      border: 1px solid #e5cfaa;
      border-radius: 20px;
      background: rgba(255, 252, 242, 0.92);
      padding: 10px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(80, 50, 20, 0.1);
    }

    .room-scene {
      position: relative;
      overflow: hidden;
      min-height: 640px;
      aspect-ratio: 16 / 9.8;
      border: 1px solid rgba(184, 143, 84, 0.5);
      border-radius: 18px;
      background:
        linear-gradient(rgba(255, 246, 224, 0.22), rgba(255, 246, 224, 0.22)),
        linear-gradient(180deg, rgba(255, 252, 242, 0.58), rgba(244, 226, 190, 0.42));
      box-shadow: inset 0 0 0 1px rgba(255, 252, 242, 0.55), 0 8px 22px rgba(80, 50, 20, 0.1);
      isolation: isolate;
    }

    .room-scene::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: rgba(255, 246, 224, 0.22);
      backdrop-filter: blur(0.4px);
      pointer-events: none;
    }

    .room-scene::after {
      content: "";
      position: absolute;
      inset: 14px;
      z-index: 1;
      border: 1px solid rgba(150, 112, 63, 0.24);
      border-radius: 16px;
      pointer-events: none;
    }

    .room-scene-bg {
      position: absolute;
      inset: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      opacity: 0.78;
      filter: blur(0.45px) saturate(0.95) brightness(0.96);
      transform: scale(1.01);
    }

    .room[data-room-id="fish"] .room-scene-bg,
    .room[data-room-id="boiler"] .room-scene-bg,
    .room[data-room-id="board"] .room-scene-bg,
    .room[data-room-id="vault"] .room-scene-bg {
      filter: blur(0.35px) saturate(1.03) brightness(0.98);
    }

    .room-scene .image-fallback {
      position: absolute;
      inset: 16px;
      z-index: -2;
      min-height: auto;
      opacity: 0.5;
    }

    .map-bundle-grid {
      position: absolute;
      inset: 18px;
      z-index: 3;
    }

    .map-bundle-node {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: clamp(250px, 32%, 390px);
      transform: translate(-50%, -50%);
      display: grid;
      align-content: start;
      gap: 8px;
      min-height: 142px;
      border: 1px solid rgba(143, 108, 64, 0.24);
      border-radius: 16px;
      background: rgba(255, 252, 242, 0.94);
      padding: 11px 13px 10px;
      color: #2b2118;
      box-shadow: 0 6px 16px rgba(80, 50, 20, 0.14);
    }

    .map-bundle-node.done {
      border-color: rgba(76, 145, 91, 0.36);
      background: rgba(248, 254, 242, 0.95);
    }

    .map-bundle-node[data-slot="a"] { box-shadow: inset 6px 0 0 #8f67cf, 0 6px 16px rgba(80, 50, 20, 0.14); }
    .map-bundle-node[data-slot="b"] { box-shadow: inset 6px 0 0 #389d62, 0 6px 16px rgba(80, 50, 20, 0.14); }
    .map-bundle-node[data-slot="c"] { box-shadow: inset 6px 0 0 #d88d32, 0 6px 16px rgba(80, 50, 20, 0.14); }
    .map-bundle-node[data-slot="d"] { box-shadow: inset 6px 0 0 #2f6fb0, 0 6px 16px rgba(80, 50, 20, 0.14); }
    .map-bundle-node[data-slot="e"] { box-shadow: inset 6px 0 0 #b84532, 0 6px 16px rgba(80, 50, 20, 0.14); }
    .map-bundle-node[data-slot="f"] { box-shadow: inset 6px 0 0 #6f4b22, 0 6px 16px rgba(80, 50, 20, 0.14); }

    .map-bundle-name {
      color: #2f2116;
      font-size: 18px;
      font-weight: 950;
      line-height: 1.16;
      text-align: center;
      white-space: nowrap;
    }

    .map-bundle-meta {
      justify-self: center;
      border-radius: 999px;
      background: rgba(241, 226, 191, 0.9);
      color: #6f4b22;
      padding: 3px 12px;
      font-size: 12.5px;
      font-weight: 950;
      text-align: center;
    }

    .map-bundle-node.done .map-bundle-meta {
      background: rgba(223, 243, 228, 0.95);
      color: #1f7549;
    }

    .map-item-strip {
      display: grid;
      grid-template-columns: repeat(var(--item-cols), minmax(0, 1fr));
      gap: 6px;
      min-width: 0;
      justify-content: center;
      justify-items: center;
    }

    .map-item {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 2px;
      min-width: 0;
      min-height: 70px;
      border: 1px solid rgba(140, 110, 70, 0.22);
      border-radius: 10px;
      background: rgba(255, 250, 238, 0.9);
      padding: 6px 5px 5px;
      color: #2b2118;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .map-item:hover {
      border-color: #cda766;
      background: #fff6df;
    }

    .map-item.checked {
      border-color: rgba(76, 145, 91, 0.4);
      background: rgba(233, 247, 229, 0.9);
    }

    .map-item.highlight {
      outline: 3px solid rgba(47, 111, 176, 0.3);
      border-color: var(--blue);
    }

    .map-item input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .map-item.checked::after {
      content: "✓";
      position: absolute;
      right: 5px;
      bottom: 3px;
      color: var(--green);
      font-size: 12px;
      font-weight: 950;
    }

    .map-item-name {
      justify-self: center;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
      color: #3c2a1d;
      font-size: 11.5px;
      font-weight: 850;
      line-height: 1.15;
      text-align: center;
      white-space: normal;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .map-item-count {
      justify-self: center;
      width: 100%;
      color: var(--red);
      font-size: 11px;
      font-weight: 950;
      line-height: 1;
      text-align: center;
    }

    .map-item .icon-wrap,
    .map-item .icon,
    .map-item .fallback-icon {
      width: 28px;
      height: 28px;
    }

    .icon-wrap {
      position: relative;
      display: grid;
      place-items: center;
      justify-self: center;
      width: 28px;
      height: 28px;
    }

    .icon {
      display: block;
      justify-self: center;
      width: 28px;
      height: 28px;
      margin: 0 auto;
      image-rendering: pixelated;
      object-fit: contain;
      object-position: center center;
    }

    .quality {
      position: absolute;
      right: -5px;
      bottom: -5px;
      width: 15px;
      height: 15px;
      image-rendering: pixelated;
    }

    .fallback-icon {
      display: grid;
      place-items: center;
      justify-self: center;
      border-radius: 6px;
      background: #f0dfbd;
      color: #6c4b28;
      font-size: 14px;
      font-weight: 950;
      text-align: center;
    }

    .map-tree-lines {
      position: absolute;
      inset: 18px;
      z-index: 2;
      width: calc(100% - 36px);
      height: calc(100% - 36px);
      pointer-events: none;
    }

    .map-tree-lines line {
      stroke: rgba(255, 248, 232, 0.72);
      stroke-width: 2;
      stroke-linecap: round;
      filter: drop-shadow(0 1px 2px rgba(80, 50, 20, 0.24));
    }

    .map-room-core { display: none; }

    .image-fallback {
      display: grid;
      place-items: center;
      min-height: 74px;
      border: 2px dashed #d9bf8b;
      border-radius: 8px;
      background: #f5e7c9;
      color: #6f4b22;
      padding: 8px;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .visual-caption {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .room-detail-list {
      display: grid;
      gap: 14px;
    }

    .bundle-detail-card {
      --bundle-accent: #8f67cf;
      position: relative;
      overflow: hidden;
      border: 2px solid #e1d3ad;
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255, 253, 247, 0.96), rgba(255, 250, 239, 0.94)),
        var(--paper);
      padding: 16px 16px 16px 26px;
      box-shadow: 0 8px 20px rgba(80, 50, 20, 0.08);
    }

    .bundle-detail-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 9px;
      background: var(--bundle-accent);
      box-shadow: 6px 0 14px rgba(80, 50, 20, 0.08);
    }

    .bundle-detail-card[data-slot="a"] { --bundle-accent: #8f67cf; }
    .bundle-detail-card[data-slot="b"] { --bundle-accent: #389d62; }
    .bundle-detail-card[data-slot="c"] { --bundle-accent: #d88d32; }
    .bundle-detail-card[data-slot="d"] { --bundle-accent: #2f6fb0; }
    .bundle-detail-card[data-slot="e"] { --bundle-accent: #b84532; }
    .bundle-detail-card[data-slot="f"] { --bundle-accent: #6f4b22; }

    .bundle-detail-card.done {
      border-color: rgba(74, 154, 95, 0.45);
      background:
        linear-gradient(180deg, rgba(249, 255, 246, 0.96), rgba(240, 250, 233, 0.94)),
        var(--green-soft);
    }

    .bundle-detail-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 12px;
    }

    .bundle-detail-title {
      margin: 0;
      color: #231a12;
      font-size: 24px;
      font-weight: 950;
      line-height: 1.16;
      letter-spacing: 0;
    }

    .bundle-detail-sub {
      margin: 6px 0 0;
      color: #6f6253;
      font-size: 15px;
      font-weight: 750;
      line-height: 1.35;
    }

    .bundle-detail-index {
      color: #9a6a2b;
      font-weight: 950;
    }

    .bundle-detail-rule {
      border-radius: 999px;
      background: #eee2c5;
      color: #5f4528;
      padding: 7px 14px;
      font-size: 17px;
      font-weight: 950;
      line-height: 1;
      white-space: nowrap;
    }

    .bundle-detail-card.done .bundle-detail-rule {
      background: #dff3e4;
      color: #208049;
    }

    .detail-items {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 12px;
    }

    .detail-item {
      position: relative;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 62px;
      border: 2px solid #e3d7bb;
      border-radius: 10px;
      background: rgba(255, 252, 244, 0.95);
      padding: 8px 14px 8px 10px;
      color: #221910;
      cursor: pointer;
      user-select: none;
    }

    .detail-item:hover {
      border-color: #d0ac72;
      background: #fff7e6;
    }

    .detail-item.checked {
      border-color: rgba(74, 154, 95, 0.46);
      background: rgba(232, 247, 227, 0.92);
    }

    .detail-item.highlight {
      outline: 3px solid rgba(47, 111, 176, 0.26);
      border-color: var(--blue);
    }

    .detail-item input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .detail-item.checked::after {
      content: "✓";
      position: absolute;
      right: 14px;
      top: 50%;

        bundle("field-research", "土地研究收集包", "4选4", "", [
          item("紫蘑菇", "forage"), item("鹦鹉螺化石", "shellfish"), item("山洞萝卜", "forage"), item("石英", "mine")
        ]),
        bundle("fodder", "饲料收集包", "3选3", "", [

        bundle("vault-5000", "5,000G 收集包", "1选1", "", [item("金币", "money", 5000, "", "5,000G")]),
        bundle("vault-10000", "10,000G 收集包", "1选1", "", [item("金币", "money", 10000, "", "10,000G")]),
        bundle("vault-25000", "25,000G 收集包", "1选1", "总计: 42,500G", [item("金币", "money", 25000, "", "25,000G")])
      ]),
      room("missing", "🎬", "废弃Joja超市", "社区中心全部完成后，首个雨天或雷雨日前夜解锁（Joja路线无）", "电影院", [
        bundle("missing-bundle", "失踪收集包", "6选5", "奖 励：电影院", [
          item("葡萄酒", "animal", 1, "silver"),
          item("恐龙蛋黄酱", "animal"),
          item("五彩碎片", "mine"),

          item("虚空鲑鱼", "fish", 1, "gold"),
          item("鱼子酱", "animal")
        ])
      ])
    ];

    const state = {
      checked: loadCheckedItems(),
      showMissingOnly: false,
      query: ""
    };

    const flatItems = flattenItems();
    let layoutTimerIds = [];

    document.addEventListener("error", handleImageError, true);
    render();
    bindEvents();

    function room(id, icon, name, unlock, reward, bundles) {
      return { id, icon, name, unlock, reward, bundles };
    }

    function bundle(id, name, rule, reward, items) {
      const required = Number(rule.match(/选(\d+)/)?.[1] || items.length);
      return { id, name, rule, reward, required, items };
    }

    function item(name, category, count = 1, quality = "", displayName = "") {
      return { name, category, count, quality, displayName };
    }

    function bindEvents() {
      document.addEventListener("change", (event) => {
        const checkbox = event.target.closest("[data-item-id]");
        if (!checkbox) return;
        setChecked(checkbox.dataset.itemId, checkbox.checked);
      });

      document.addEventListener("click", (event) => {
        if (event.target.closest("#resetChecks")) {
          if (!confirm("确定要清空所有勾选吗？")) return;
          state.checked.clear();
          saveCheckedItems();
          render();
          return;
        }

        if (event.target.closest("#showMissing")) {
          state.showMissingOnly = !state.showMissingOnly;
          document.getElementById("showMissing").textContent = state.showMissingOnly ? "显示全部" : "只看未完成";
          applyVisibility();
          scheduleLayout();
          return;
        }

        const mapBundle = event.target.closest("[data-bundle-jump-id]");
        if (mapBundle) {
          event.preventDefault();
          focusBundle(mapBundle.dataset.bundleJumpId);
          return;
        }

        const result = event.target.closest("[data-jump-id]");
        if (result) focusItem(result.dataset.jumpId);

        if (event.target.closest("#jumpSearch")) jumpToFirstSearchResult();
      });

      document.getElementById("itemSearch").addEventListener("input", (event) => {
        state.query = event.target.value.trim();
        renderSearchResults();
        markHighlights();
      });

      document.getElementById("itemSearch").addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;
        jumpToFirstSearchResult();
      });

      document.getElementById("clearSearch").addEventListener("click", () => {
        state.query = "";
        document.getElementById("itemSearch").value = "";
        renderSearchResults();
        markHighlights();
      });

      window.addEventListener("resize", scheduleLayout);
      window.addEventListener("load", scheduleLayout);
      bindLayoutImages(document);
    }

    function handleImageError(event) {
      const image = event.target;
      if (!(image instanceof HTMLImageElement)) return;
      if (image.dataset.failed) return;
      image.dataset.failed = "true";
      if (image.classList.contains("quality")) {
        image.remove();
        return;
      }

      const label = image.dataset.fallback || image.alt || "图片暂不可用";
      const fallbackClass = image.classList.contains("icon") ? "fallback-icon" : "image-fallback";
      image.replaceWith(fallbackNode(label, fallbackClass));
      scheduleLayout();
    }

    function render() {
      document.getElementById("rooms").innerHTML = rooms.map(renderRoom).join("");
      renderCenterMap();
      renderProgress();
      renderSearchResults();
      applyVisibility();
      markHighlights();
      bindLayoutImages(document.getElementById("rooms"));
      scheduleLayout();
    }

    function renderRoom(roomData) {
      const checked = countCheckedInRoom(roomData);
      const total = roomData.bundles.reduce((sum, bundleData) => sum + bundleData.required, 0);
      return `
        <article class="room" id="room-${roomData.id}" data-room-id="${roomData.id}">
          <header class="room-header">
            <div>
              <h2 class="room-title"><a class="room-title-link" href="#center-map-section" aria-label="返回社区中心地图"><span>${roomData.icon}</span><span class="room-title-text">${escapeHtml(roomData.name)}</span></a></h2>
              <p class="room-meta">${escapeHtml(roomData.unlock)} · 奖励：${escapeHtml(roomData.reward)}</p>
            </div>
            <div class="room-badge">${checked} / ${total}</div>
          </header>
          <div class="room-body">
            ${renderRoomVisuals(roomData)}
          </div>
        </article>
      `;
    }

    function renderRoomVisuals(roomData) {
      const roomImage = roomImages[roomData.id];
      const mapLayout = getBundleMapLayout(roomData);
      const core = mapLayout.core;
      return `
        <figure class="room-scene-card">
          <div class="room-scene">
            ${roomImage ? renderExternalImage("room-scene-bg", roomImage, `${roomData.name}房间背景`) : renderImageFallback(`${roomData.name}房间背景`)}
            ${renderMapLines(mapLayout)}
            <div class="map-room-core" style="--x:${core.x}%;--y:${core.y}%">${escapeHtml(roomData.name)}</div>
            <div class="map-bundle-grid" data-count="${roomData.bundles.length}">
              ${roomData.bundles.map((bundleData, bundleIndex) => renderMapBundle(roomData, bundleData, bundleIndex, mapLayout)).join("")}
            </div>
          </div>
          <figcaption class="visual-caption">${escapeHtml(roomData.name)}房间位置与收集包分支</figcaption>
        </figure>
        ${renderRoomBundleDetails(roomData)}
      `;
    }

    function renderMapBundle(roomData, bundleData, bundleIndex, mapLayout) {
      const checked = bundleData.items.filter((entry) => isChecked(entry.uid)).length;
      const complete = checked >= bundleData.required;
      const done = Math.min(checked, bundleData.required);
      const slot = getSlot(bundleIndex);
      const point = mapLayout.points[bundleData.id] || { x: 50, y: 50 };
      return `
        <button class="map-bundle-node ${complete ? "done" : ""}" type="button" data-bundle-id="${bundleData.id}" data-bundle-jump-id="${bundleData.id}" data-item-count="${bundleData.items.length}" data-slot="${slot}" style="--x:${point.x}%;--y:${point.y}%" title="${escapeAttribute(bundleData.name)}" aria-label="跳转到${escapeAttribute(bundleData.name)}详情">
          <span class="map-bundle-name">${escapeHtml(bundleData.name)}</span>
          ${renderMapBundleItems(bundleData)}
          <span class="map-bundle-meta">${escapeHtml(bundleData.rule)} · ${done}/${bundleData.required}</span>
        </button>
      `;
    }

    function renderRoomBundleDetails(roomData) {
      return `
        <div class="room-detail-list" aria-label="${escapeAttribute(roomData.name)}收集包明细">
          ${roomData.bundles.map((bundleData, bundleIndex) => renderBundleDetail(roomData, bundleData, bundleIndex)).join("")}
        </div>
      `;
    }

    function renderBundleDetail(roomData, bundleData, bundleIndex) {
      const checked = bundleData.items.filter((entry) => isChecked(entry.uid)).length;
      const complete = checked >= bundleData.required;
      const done = Math.min(checked, bundleData.required);
      const slot = getSlot(bundleIndex);
      const detailMeta = [
        bundleData.reward ? `奖励：${escapeHtml(bundleData.reward)}` : "",
        `${escapeHtml(roomData.name)}分支`
      ].filter(Boolean).join(" · ");
      return `
        <section class="bundle-detail-card ${complete ? "done" : ""}" id="detail-${roomData.id}-${bundleData.id}" data-detail-bundle-id="${bundleData.id}" data-slot="${slot}">
          <header class="bundle-detail-head">
            <div>
              <h3 class="bundle-detail-title">${escapeHtml(bundleData.name)}</h3>
              <p class="bundle-detail-sub">${detailMeta}</p>
            </div>
            <div class="bundle-detail-rule">${escapeHtml(bundleData.rule)} · ${done}/${bundleData.required}</div>
          </header>
          <div class="detail-items">
            ${bundleData.items.map((entry) => renderDetailItem(entry)).join("")}
          </div>
        </section>
      `;
    }

    function renderDetailItem(entry) {
      const checked = isChecked(entry.uid);
      const title = describeItem(entry);
      return `
        <label class="detail-item ${checked ? "checked" : ""}" data-item-card="${entry.uid}" title="${escapeAttribute(title)}">
          <input type="checkbox" data-item-id="${entry.uid}" ${checked ? "checked" : ""} aria-label="${escapeAttribute(title)}" />
          ${renderIcon(entry)}
          <span class="detail-item-name">
            ${escapeHtml(entry.displayName || entry.name)}
            ${entry.count > 1 && !entry.displayName ? `<span class="detail-item-count">×${entry.count}</span>` : ""}
          </span>
        </label>
      `;
    }

    function renderExternalImage(className, fileName, alt) {
      return `<img class="${className}" src="${iconUrl(fileName)}" alt="${escapeAttribute(alt)}" loading="lazy" data-fallback="${escapeAttribute(alt)}" />`;
    }

    function getBundleMapLayout(roomData) {
      return bundleLayoutByRoom[roomData.id] || { core: { x: 50, y: 52 }, points: {} };
    }

    function renderMapLines(layout) {
      const origin = layout.linkFrom && layout.points[layout.linkFrom]
        ? layout.points[layout.linkFrom]
        : layout.core;
      const points = Object.entries(layout.points)
        .filter(([id]) => id !== layout.linkFrom)
        .map(([, point]) => point);
      return `
        <svg class="map-tree-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          ${points.map((point) => `<line x1="${origin.x}" y1="${origin.y}" x2="${point.x}" y2="${point.y}" />`).join("")}
        </svg>
      `;
    }

    function renderMapBundleItems(bundleData) {
      const columns = getMapItemColumns(bundleData);
      return `
        <div class="map-item-strip" style="--item-cols:${columns}">
          ${bundleData.items.map((entry) => renderMapItem(entry)).join("")}
        </div>
      `;
    }

    function renderMapItem(entry) {
      const checked = isChecked(entry.uid);
      const title = describeItem(entry);
      return `
        <span class="map-item ${checked ? "checked" : ""}" data-item-card="${entry.uid}" title="${escapeAttribute(title)}" aria-label="${escapeAttribute(title)}">
          ${renderIcon(entry)}
          <span class="map-item-name">${escapeHtml(entry.displayName || entry.name)}</span>
          ${entry.count > 1 && !entry.displayName ? `<span class="map-item-count">×${entry.count}</span>` : ""}
        </span>
      `;
    }

    function getMapItemColumns(bundleData) {
      const count = bundleData.items.length;
      if (bundleData.id === "summer-forage") return 3;
      if (bundleData.id === "missing-bundle") return 3;
      if (count <= 8) return 4;
      if (count === 9) return 3;
      if (count === 10) return 4;
      if (count === 12) return 4;
      return Math.min(6, Math.ceil(count / 2));
    }

    function renderImageFallback(label) {
      return `<span class="image-fallback">${escapeHtml(label)}</span>`;
    }

    function renderIcon(entry) {
      const fileName = iconFiles[entry.name] || iconFiles[entry.displayName] || "";
      const image = fileName
        ? `<img class="icon" src="${iconUrl(fileName)}" alt="" loading="lazy" onerror="this.replaceWith(fallbackIcon('${escapeAttribute(entry.name)}'))" />`
        : `<span class="fallback-icon">${escapeHtml((entry.name || "?").slice(0, 1))}</span>`;
      const quality = entry.quality && QUALITY_ICON[entry.quality]
        ? `<img class="quality" src="${iconUrl(QUALITY_ICON[entry.quality])}" alt="金星" loading="lazy" />`
        : "";
      return `<span class="icon-wrap">${image}${quality}</span>`;
    }

    function renderProgress() {
      const grid = document.getElementById("progressGrid");
      grid.innerHTML = categories.map(([key, label]) => {
        const entries = flatItems.filter((entry) => entry.category === key);
        const total = entries.length;
        const checked = entries.filter((entry) => isChecked(entry.uid)).length;
        const percent = total ? Math.round((checked / total) * 100) : 0;
        return `
          <div class="category">
            <div class="category-top">
              <span>${escapeHtml(label)}</span>
              <span class="category-count">${checked} / ${total}</span>
            </div>
            <div class="bar"><div class="fill" style="width:${percent}%"></div></div>
          </div>
        `;
      }).join("");
    }

    function renderCenterMap() {
      document.getElementById("centerMap").innerHTML = `
        <div class="center-map-stage center-map-stage-ref">
          ${renderExternalImage("center-map-image center-map-image-ref", CENTER_MAP_IMAGE, "社区中心整体地图")}
          ${centerRoomPins.map((pin) => `
            <a class="center-ref-title-dom" href="#room-${pin.id}" aria-label="跳转到${escapeHtml(pin.name)}" style="--box-x:${pin.boxX}%;--box-y:${pin.boxY}%;--box-w:${pin.boxW}%;--box-h:${pin.boxH}%">${escapeHtml(pin.name)}</a>
            <div class="center-ref-note-dom" style="--note-x:${pin.boxX + pin.boxW / 2}%;--note-y:${pin.noteY}%;--note-w:${pin.boxW}%">${escapeHtml(pin.note)}</div>
          `).join("")}
          <svg class="center-map-overlay-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            ${centerRoomPins.map((pin) => `
              <polyline class="center-route" points="${pin.path}" />
            `).join("")}
          </svg>
        </div>
      `;
    }

    function renderSearchResults() {
      const list = document.getElementById("resultList");
      if (!state.query) {
        list.innerHTML = "";
        return;
      }

      const query = normalize(state.query);
      const matches = flatItems.filter((entry) => {
        const haystack = [
          entry.name,
          entry.displayName,
          (entry.quality === "gold" ? `金星${entry.name}` : entry.quality === "silver" ? `银星${entry.name}` : ""),
          `${entry.name}×${entry.count}`,
          entry.roomName,
          entry.bundleName
        ].map(normalize).join(" ");
        return haystack.includes(query);
      });

      if (!matches.length) {
        list.innerHTML = `<p class="empty-state">这个物品不在当前献祭清单里，可以放心处理。</p>`;
        return;
      }

      list.innerHTML = matches.map((entry) => {
        const checked = isChecked(entry.uid);
        return `
          <article class="result-card ${checked ? "done" : ""}" data-jump-id="${entry.uid}">
            <div class="result-head">
              ${renderIcon(entry)}
              <div>
                <p class="result-title">${escapeHtml(describeItem(entry))}</p>
                <p class="result-path">${escapeHtml(entry.roomName)} → ${escapeHtml(entry.bundleName)}</p>
              </div>
              <span class="status ${checked ? "done" : "need"}">${checked ? "已献祭" : "要保留"}</span>
            </div>
          </article>
        `;
      }).join("");
    }

    function applyVisibility() {
      document.querySelectorAll("[data-bundle-id]").forEach((node) => {
        const hasMissing = Boolean(node.querySelector("[data-item-id]:not(:checked)"));
        node.hidden = state.showMissingOnly && !hasMissing;
      });

      document.querySelectorAll("[data-detail-bundle-id]").forEach((node) => {
        const hasMissing = Boolean(node.querySelector("[data-item-id]:not(:checked)"));
        node.hidden = state.showMissingOnly && !hasMissing;
      });

      document.querySelectorAll("[data-room-id]").forEach((node) => {
        const hasVisibleBundle = Boolean(node.querySelector("[data-bundle-id]:not([hidden]), [data-detail-bundle-id]:not([hidden])"));
        node.hidden = state.showMissingOnly && !hasVisibleBundle;
      });

      document.querySelectorAll(".map-tree-lines line").forEach((line) => {
        line.style.display = state.showMissingOnly ? "none" : "";
      });
    }

    function markHighlights() {
      document.querySelectorAll("[data-item-card]").forEach((node) => node.classList.remove("highlight"));
      if (!state.query) return;

      const query = normalize(state.query);
      flatItems.forEach((entry) => {
        const name = normalize(`${entry.name} ${entry.displayName} ${entry.quality === "gold" ? `金星${entry.name}` : entry.quality === "silver" ? `银星${entry.name}` : ""}`);
        if (!name.includes(query)) return;
        document.querySelectorAll(`[data-item-card="${entry.uid}"]`).forEach((node) => node.classList.add("highlight"));
      });
    }

    function focusItem(uid) {
      const node = document.querySelector(`.detail-item[data-item-card="${uid}"]`) || document.querySelector(`[data-item-card="${uid}"]`);
      if (!node) return;
      node.scrollIntoView({ behavior: "smooth", block: "center" });
      document.querySelectorAll(`[data-item-card="${uid}"]`).forEach((entryNode) => entryNode.classList.add("highlight"));
    }

    function focusBundle(bundleId) {
      const node = document.querySelector(`[data-detail-bundle-id="${bundleId}"]`);
      if (!node) return;
      node.hidden = false;
      node.scrollIntoView({ behavior: "smooth", block: "start" });
      node.classList.remove("jump-flash");
      void node.offsetWidth;
      node.classList.add("jump-flash");
      window.setTimeout(() => node.classList.remove("jump-flash"), 1200);
    }

    function jumpToFirstSearchResult() {
      if (!state.query) return;
      const query = normalize(state.query);
      const match = flatItems.find((entry) => {
        const haystack = [
          entry.name,
          entry.displayName,
          (entry.quality === "gold" ? `金星${entry.name}` : entry.quality === "silver" ? `银星${entry.name}` : ""),
          `${entry.name}×${entry.count}`,
          entry.roomName,
          entry.bundleName
        ].map(normalize).join(" ");
        return haystack.includes(query);
      });
      if (match) focusItem(match.uid);
    }

    function setChecked(uid, checked) {
      if (checked) state.checked.add(uid);
      else state.checked.delete(uid);
      saveCheckedItems();

      syncCheckedItem(uid, checked);
      updateRoomStats();
      renderProgress();
      renderSearchResults();
      markHighlights();
      scheduleLayout();
    }

    function syncCheckedItem(uid, checked) {
      document.querySelectorAll("[data-item-id]").forEach((input) => {
        if (input.dataset.itemId !== uid) return;
        input.checked = checked;
      });

      document.querySelectorAll("[data-item-card]").forEach((card) => {
        if (card.dataset.itemCard !== uid) return;
        card.classList.toggle("checked", checked);
      });
    }

    function updateRoomStats() {
      rooms.forEach((roomData) => {
        const roomNode = document.querySelector(`.room[data-room-id="${roomData.id}"]`);
        if (!roomNode) return;

        const checked = countCheckedInRoom(roomData);
        const total = roomData.bundles.reduce((sum, bundleData) => sum + bundleData.required, 0);
        const badge = roomNode.querySelector(".room-badge");
        if (badge) badge.textContent = `${checked} / ${total}`;

        roomData.bundles.forEach((bundleData) => {
          const bundleChecked = bundleData.items.filter((entry) => isChecked(entry.uid)).length;
          const complete = bundleChecked >= bundleData.required;
          const done = Math.min(bundleChecked, bundleData.required);

          roomNode.querySelectorAll(`[data-bundle-id="${bundleData.id}"], [data-detail-bundle-id="${bundleData.id}"]`).forEach((bundleNode) => {
            bundleNode.classList.toggle("done", complete);

            const mapMeta = bundleNode.querySelector(".map-bundle-meta");
            if (mapMeta) mapMeta.textContent = `${bundleData.rule} · ${done}/${bundleData.required}`;

            const detailRule = bundleNode.querySelector(".bundle-detail-rule");
            if (detailRule) detailRule.textContent = `${bundleData.rule} · ${done}/${bundleData.required}`;
          });
        });
      });
    }

    function flattenItems() {
      const entries = [];
      rooms.forEach((roomData) => {
        roomData.bundles.forEach((bundleData) => {
          bundleData.items.forEach((entry, index) => {
            entry.uid = `${roomData.id}:${bundleData.id}:${index}`;
            entry.roomName = roomData.name;
            entry.bundleName = bundleData.name;
            entries.push(entry);
          });
        });
      });
      return entries;
    }

    function countCheckedInRoom(roomData) {
      return roomData.bundles.reduce((sum, bundleData) => {
        const checked = bundleData.items.filter((entry) => isChecked(entry.uid)).length;
        return sum + Math.min(checked, bundleData.required);
      }, 0);
    }

    function describeItem(entry) {
      const quality = entry.quality === "gold" ? "金星" : entry.quality === "silver" ? "银星" : "";
      if (entry.displayName) return entry.displayName;
      return `${quality}${entry.name}${entry.count > 1 ? ` ×${entry.count}` : ""}`;
    }

    function isChecked(uid) {
      return state.checked.has(uid);
    }

    function bindLayoutImages(root = document) {
      root.querySelectorAll("img").forEach((image) => {
        if (image.dataset.layoutBound) return;
        image.dataset.layoutBound = "true";
        image.addEventListener("load", scheduleLayout, { once: true });
        image.addEventListener("error", scheduleLayout, { once: true });
      });
    }

    function scheduleLayout() {
      requestAnimationFrame(() => requestAnimationFrame(layoutMobileRoomVisuals));
      layoutTimerIds.forEach((timerId) => clearTimeout(timerId));
      layoutTimerIds = [80, 240, 700, 1600].map((delay) => setTimeout(layoutMobileRoomVisuals, delay));
    }

    function layoutMobileRoomVisuals() {
      const isMobile = window.matchMedia("(max-width: 520px)").matches;
      Object.keys(mobileRowsByRoom).forEach((roomId) => layoutRoomRows(roomId, isMobile));
    }

    function layoutRoomRows(roomId, isMobile) {
      const scene = document.querySelector(`.room[data-room-id="${roomId}"] .room-scene`);
      if (!scene) return;

      const grid = scene.querySelector(".map-bundle-grid");
      const lines = scene.querySelector(".map-tree-lines");
      const rows = mobileRowsByRoom[roomId];
      const config = mobileLayoutConfig[roomId] || {};
      const flatIds = rows.flat();
      const cards = Object.fromEntries(flatIds.map((id) => [id, scene.querySelector(`[data-bundle-id="${id}"]`)]));

      if (!grid || !lines || Object.values(cards).some((card) => !card)) return;

      if (!isMobile) {
        scene.style.height = "";
        scene.style.minHeight = "";
        scene.style.aspectRatio = "";

        [grid, lines].forEach((layer) => {
          layer.style.inset = "";
          layer.style.left = "";
          layer.style.top = "";
          layer.style.width = "";
          layer.style.height = "";
        });

        Object.values(cards).forEach((card) => {
          card.style.left = "";
          card.style.top = "";
          card.style.transform = "";
          card.style.transformOrigin = "";
        });
        return;
      }

      const sceneWidth = scene.clientWidth;
      if (!sceneWidth) return;

      const visibleRows = rows
        .map((row) => row.filter((id) => cards[id] && !cards[id].hidden))
        .filter((row) => row.length);

      if (!visibleRows.length) {
        lines.querySelectorAll("line").forEach((line) => { line.style.display = "none"; });
        return;
      }

      grid.style.inset = "0";
      grid.style.left = "0";
      grid.style.top = "0";
      grid.style.width = "100%";

      const shouldHideLines = roomId === "vault" || roomId === "missing";
      lines.style.display = shouldHideLines ? "none" : "block";
      lines.style.inset = "0";
      lines.style.left = "0";
      lines.style.top = "0";
      lines.style.width = "100%";

      Object.values(cards).forEach((card) => {
        card.style.left = "0px";
        card.style.top = "0px";
        card.style.transform = "none";
        card.style.transformOrigin = "top left";
      });

      const minGap = config.minGap ?? 6;
      const wantedScale = config.wantedScale ?? 1;
      const minScale = config.minScale ?? 0.82;
      const vGapBase = config.vGap ?? minGap;

      const rowBaseWidths = visibleRows.map((row) => row.reduce((sum, id) => sum + cards[id].offsetWidth, 0));
      const scaleCandidates = visibleRows.map((row, index) => {
        const available = sceneWidth - minGap * (row.length + 1);
        return available / Math.max(1, rowBaseWidths[index]);
      });

      let scale = Math.min(wantedScale, ...scaleCandidates);
      scale = Math.max(minScale, scale);

      const vGap = Math.max(vGapBase, minGap * scale);
      let top = config.topOffset ?? minGap;
      const positioned = {};

      visibleRows.forEach((row, rowIndex) => {
        const scaledWidth = row.reduce((sum, id) => sum + cards[id].offsetWidth * scale, 0);
        const gap = Math.max(minGap, (sceneWidth - scaledWidth) / (row.length + 1));
        const rowHeight = Math.max(...row.map((id) => cards[id].offsetHeight * scale));
        const xOverrides = config.xByRow?.[rowIndex] || {};
        let left = gap;

        row.forEach((id) => {
          const card = cards[id];
          const cardWidth = card.offsetWidth * scale;
          const customX = xOverrides[id];
          const currentLeft = typeof customX === "number"
            ? clamp(sceneWidth * customX - cardWidth / 2, minGap, sceneWidth - cardWidth - minGap)
            : left;

          placeMapCard(card, currentLeft, top, scale);
          positioned[id] = {
            x: currentLeft + cardWidth / 2,
            y: top + card.offsetHeight * scale / 2
          };
          left += cardWidth + gap;
        });

        top += rowHeight + vGap;
      });

      const sceneHeight = Math.ceil(top);
      scene.style.height = `${sceneHeight}px`;
      scene.style.minHeight = "0";
      scene.style.aspectRatio = "auto";
      grid.style.height = `${sceneHeight}px`;
      lines.style.height = `${sceneHeight}px`;

      if (shouldHideLines) {
        lines.querySelectorAll("line").forEach((line) => { line.style.display = "none"; });
      } else {
        updateRoomLines(roomId, lines, positioned, sceneWidth, sceneHeight);
      }
    }

    function placeMapCard(card, left, top, scale) {
      card.style.left = `${Math.round(left)}px`;
      card.style.top = `${Math.round(top)}px`;
      card.style.transform = `scale(${scale})`;
      card.style.transformOrigin = "top left";
    }

    function updateRoomLines(roomId, lines, positioned, width, height) {
      const layout = bundleLayoutByRoom[roomId];
      if (!layout) return;

      const allLines = Array.from(lines.querySelectorAll("line"));
      allLines.forEach((line) => { line.style.display = "none"; });

      // 只看未完成时，已完成的卡片会隐藏。此时保留树线会指向空位置，干脆隐藏线条，避免画面乱飞。
      if (state.showMissingOnly) return;

      const visibleIds = Object.keys(positioned);
      const originId = positioned[layout.linkFrom] ? layout.linkFrom : visibleIds[0];
      const origin = positioned[originId];
      if (!origin) return;

      const targetIds = Object.keys(layout.points).filter((id) => id !== originId && positioned[id]);
      targetIds.forEach((id, index) => {
        const line = allLines[index];
        const target = positioned[id];
        if (!line || !target) return;

        line.style.display = "";
        line.setAttribute("x1", (origin.x / width) * 100);
        line.setAttribute("y1", (origin.y / height) * 100);
        line.setAttribute("x2", (target.x / width) * 100);
        line.setAttribute("y2", (target.y / height) * 100);
      });
    }

    function md5(input) {
      function add32(a, b) { return (a + b) & 0xffffffff; }
      function cmn(q, a, b, x, s, t) {
        a = add32(add32(a, q), add32(x, t));
        return add32((a << s) | (a >>> (32 - s)), b);
      }
      function ff(a, b, c, d, x, s, t) { return cmn((b & c) | ((~b) & d), a, b, x, s, t); }
      function gg(a, b, c, d, x, s, t) { return cmn((b & d) | (c & (~d)), a, b, x, s, t); }
      function hh(a, b, c, d, x, s, t) { return cmn(b ^ c ^ d, a, b, x, s, t); }
      function ii(a, b, c, d, x, s, t) { return cmn(c ^ (b | (~d)), a, b, x, s, t); }

      function md5cycle(state, block) {
        let [a, b, c, d] = state;
        a = ff(a, b, c, d, block[0], 7, -680876936); d = ff(d, a, b, c, block[1], 12, -389564586); c = ff(c, d, a, b, block[2], 17, 606105819); b = ff(b, c, d, a, block[3], 22, -1044525330);
        a = ff(a, b, c, d, block[4], 7, -176418897); d = ff(d, a, b, c, block[5], 12, 1200080426); c = ff(c, d, a, b, block[6], 17, -1473231341); b = ff(b, c, d, a, block[7], 22, -45705983);
        a = ff(a, b, c, d, block[8], 7, 1770035416); d = ff(d, a, b, c, block[9], 12, -1958414417); c = ff(c, d, a, b, block[10], 17, -42063); b = ff(b, c, d, a, block[11], 22, -1990404162);
        a = ff(a, b, c, d, block[12], 7, 1804603682); d = ff(d, a, b, c, block[13], 12, -40341101); c = ff(c, d, a, b, block[14], 17, -1502002290); b = ff(b, c, d, a, block[15], 22, 1236535329);
        a = gg(a, b, c, d, block[1], 5, -165796510); d = gg(d, a, b, c, block[6], 9, -1069501632); c = gg(c, d, a, b, block[11], 14, 643717713); b = gg(b, c, d, a, block[0], 20, -373897302);
        a = gg(a, b, c, d, block[5], 5, -701558691); d = gg(d, a, b, c, block[10], 9, 38016083); c = gg(c, d, a, b, block[15], 14, -660478335); b = gg(b, c, d, a, block[4], 20, -405537848);
        a = gg(a, b, c, d, block[9], 5, 568446438); d = gg(d, a, b, c, block[14], 9, -1019803690); c = gg(c, d, a, b, block[3], 14, -187363961); b = gg(b, c, d, a, block[8], 20, 1163531501);
        a = gg(a, b, c, d, block[13], 5, -1444681467); d = gg(d, a, b, c, block[2], 9, -51403784); c = gg(c, d, a, b, block[7], 14, 1735328473); b = gg(b, c, d, a, block[12], 20, -1926607734);
        a = hh(a, b, c, d, block[5], 4, -378558); d = hh(d, a, b, c, block[8], 11, -2022574463); c = hh(c, d, a, b, block[11], 16, 1839030562); b = hh(b, c, d, a, block[14], 23, -35309556);
        a = hh(a, b, c, d, block[1], 4, -1530992060); d = hh(d, a, b, c, block[4], 11, 1272893353); c = hh(c, d, a, b, block[7], 16, -155497632); b = hh(b, c, d, a, block[10], 23, -1094730640);
        a = hh(a, b, c, d, block[13], 4, 681279174); d = hh(d, a, b, c, block[0], 11, -358537222); c = hh(c, d, a, b, block[3], 16, -722521979); b = hh(b, c, d, a, block[6], 23, 76029189);
        a = hh(a, b, c, d, block[9], 4, -640364487); d = hh(d, a, b, c, block[12], 11, -421815835); c = hh(c, d, a, b, block[15], 16, 530742520); b = hh(b, c, d, a, block[2], 23, -995338651);
        a = ii(a, b, c, d, block[0], 6, -198630844); d = ii(d, a, b, c, block[7], 10, 1126891415); c = ii(c, d, a, b, block[14], 15, -1416354905); b = ii(b, c, d, a, block[5], 21, -57434055);
        a = ii(a, b, c, d, block[12], 6, 1700485571); d = ii(d, a, b, c, block[3], 10, -1894986606); c = ii(c, d, a, b, block[10], 15, -1051523); b = ii(b, c, d, a, block[1], 21, -2054922799);
        a = ii(a, b, c, d, block[8], 6, 1873313359); d = ii(d, a, b, c, block[15], 10, -30611744); c = ii(c, d, a, b, block[6], 15, -1560198380); b = ii(b, c, d, a, block[13], 21, 1309151649);
        a = ii(a, b, c, d, block[4], 6, -145523070); d = ii(d, a, b, c, block[11], 10, -1120210379); c = ii(c, d, a, b, block[2], 15, 718787259); b = ii(b, c, d, a, block[9], 21, -343485551);
        state[0] = add32(a, state[0]); state[1] = add32(b, state[1]); state[2] = add32(c, state[2]); state[3] = add32(d, state[3]);
      }

      function md5blk(s) {
        const block = [];
        for (let i = 0; i < 64; i += 4) {
          block[i >> 2] = s.charCodeAt(i) + (s.charCodeAt(i + 1) << 8) + (s.charCodeAt(i + 2) << 16) + (s.charCodeAt(i + 3) << 24);
        }
        return block;
      }

      function md51(s) {
        let n = s.length;
        const state = [1732584193, -271733879, -1732584194, 271733878];
        let i;
        for (i = 64; i <= n; i += 64) md5cycle(state, md5blk(s.substring(i - 64, i)));
        s = s.substring(i - 64);
        const tail = Array(16).fill(0);
        for (i = 0; i < s.length; i++) tail[i >> 2] |= s.charCodeAt(i) << ((i % 4) << 3);
        tail[i >> 2] |= 0x80 << ((i % 4) << 3);
        if (i > 55) { md5cycle(state, tail); tail.fill(0); }
        tail[14] = n * 8;
        md5cycle(state, tail);
        return state;
      }

      function rhex(n) {
        const hex = "0123456789abcdef";
        let s = "";
        for (let j = 0; j < 4; j++) s += hex[(n >> (j * 8 + 4)) & 0x0f] + hex[(n >> (j * 8)) & 0x0f];
        return s;
      }

      return md51(input).map(rhex).join("");
    }

    function iconUrl(fileName) {
      const safeName = fileName.replaceAll(" ", "_");
      const hash = md5(safeName);
      return `${WIKI_FILE_BASE}${hash.slice(0, 1)}/${hash.slice(0, 2)}/${encodeURIComponent(safeName)}`;
    }

    function getSlot(index) { return ["a", "b", "c", "d", "e", "f"][index] || "f"; }

    function fallbackIcon(name) {
      return fallbackNode(String(name || "?").slice(0, 1), "fallback-icon");
    }

    function fallbackNode(label, className) {
      const span = document.createElement("span");
      span.className = className;
      span.textContent = label;
      return span;
    }

    function normalize(value) {
      return String(value || "").toLowerCase().replace(/\s+/g, "");
    }

    function loadCheckedItems() {
      try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []); }
      catch { return new Set(); }
    }

    function saveCheckedItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(state.checked)));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) { return escapeHtml(value); }
  </script>
